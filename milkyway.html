<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Milky Way</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080808;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        body.dragging { cursor: grabbing; }
        canvas#display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: fixed;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.15);
            font: 11px 'Courier New', monospace;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 2px;
            transition: opacity 1s ease;
        }
        #zoom-controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 2;
        }
        #zoom-controls button {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            font: bold 20px 'Courier New', monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1;
            padding: 0;
        }
        #zoom-controls button:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
        }
        #zoom-controls button:active {
            background: rgba(255,255,255,0.2);
        }
        #back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            font: 14px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-decoration: none;
            color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 6px 14px;
            z-index: 10;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <canvas id="display"></canvas>
    <div id="info">drag to rotate &middot; scroll to zoom &middot; double-click to reset</div>
    <a id="back-btn" href="index.html">&larr; back</a>
    <script>if (window !== window.top) document.getElementById('back-btn').style.display = 'none';</script>
    <div id="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">&minus;</button>
    </div>

    <script>setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 1000);</script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
    (() => {
        /* ===== Config ===== */
        const FONT_SIZE = 7;
        const SS = 2;   // supersampling factor — 2×2 pixels per cell anti-aliases stars
        const ASCII = '.,:;itf1(lcg08#@';

        /* ===== Display Canvas ===== */
        const display = document.getElementById('display');
        const ctx = display.getContext('2d');
        ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
        const charW = Math.ceil(ctx.measureText('M').width);
        const charH = Math.ceil(FONT_SIZE * 1.2);

        /* ===== Three.js Setup (offscreen) ===== */
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(1);
        renderer.setSize(1, 1);

        const scene = new THREE.Scene();
        const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        /* ===== Shader ===== */
        const vertexShader = `
            void main() {
                gl_Position = vec4(position.xy, 0.0, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;

            uniform float uTime;
            uniform vec2  uResolution;
            uniform vec3  uCamPos;
            uniform vec3  uCamUp;
            uniform float uZoom;

            #define PI  3.14159265
            #define TAU 6.28318530

            /* ---- Hash / Noise ---- */
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float a = hash(i);
                float b = hash(i + vec2(1.0, 0.0));
                float c = hash(i + vec2(0.0, 1.0));
                float d = hash(i + vec2(1.0, 1.0));
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }
            float fbm(vec2 p) {
                float v = 0.0, a = 0.5;
                mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
                for (int i = 0; i < 5; i++) {
                    v += a * noise(p);
                    p = rot * p * 2.0;
                    a *= 0.5;
                }
                return v;
            }

            /* ---- Background star field (spherical grid — wide points for stable ASCII) ---- */
            vec3 stars(vec3 dir) {
                vec3 c = vec3(0.0);
                dir = normalize(dir);
                float sTheta = acos(clamp(dir.y, -1.0, 1.0));
                float sPhi   = atan(dir.z, dir.x);

                for (int i = 0; i < 5; i++) {
                    float scale = 14.0 + float(i) * 18.0;
                    vec2 grid = vec2(sPhi * scale, sTheta * scale);
                    vec2 id = floor(grid);
                    vec2 fr = fract(grid) - 0.5;

                    float n1 = hash(id + float(i) * 100.0);
                    float n2 = hash(id * 1.73 + 37.0 + float(i) * 50.0);

                    vec2 off = vec2(n1, n2) - 0.5;
                    float d = length(fr - off * 0.35);

                    /* Wide enough to not flicker across ASCII cell boundaries */
                    /* Wide enough for stable 2×2 SS sampling, dimmed to keep count low */
                    float star = smoothstep(0.10, 0.01, d) * n1 * 0.45;

                    vec3 sc = mix(vec3(0.5, 0.65, 1.0), vec3(1.0, 0.85, 0.6), n2);
                    float brightness = (i < 2) ? 1.1 : 0.5;
                    c += sc * star * brightness;
                }
                return c;
            }

            /* ---- Spiral arm shape (Gaussian cross-section) ---- */
            float spiralArm(float r, float angle, float offset) {
                float target = log(max(r, 0.15)) * 3.2 + offset;
                float delta = mod(angle - target + PI, TAU) - PI;
                return exp(-delta * delta * 9.0);
            }

            /* ---- Ray-sphere intersection ---- */
            bool hitSphere(vec3 ro, vec3 rd, float radius, out float t0, out float t1) {
                float b = dot(ro, rd);
                float c = dot(ro, ro) - radius * radius;
                float disc = b * b - c;
                if (disc < 0.0) return false;
                float sq = sqrt(disc);
                t0 = -b - sq;
                t1 = -b + sq;
                return true;
            }

            /* ---- Galaxy volume sample ---- */
            /* Returns vec4(emission.rgb, density) */
            vec4 galaxySample(vec3 p) {
                float r = length(p.xz);
                float y = p.y;
                float angle = atan(p.z, p.x);

                /* Early exit */
                if (r > 8.5 && abs(y) > 1.5) return vec4(0.0);

                /* ---- Vertical profiles ---- */
                float diskH = 0.22 + 0.04 * r;           /* thicker disk for visibility */
                float diskVert = exp(-y * y / (2.0 * diskH * diskH));

                /* ---- Central bulge (de Vaucouleurs-ish) ---- */
                float bulgeR2 = (p.x * p.x + p.z * p.z) / (0.9 * 0.9) + y * y / (0.4 * 0.4);
                float bulge = exp(-bulgeR2 * 3.0);

                /* ---- Galactic nucleus ---- */
                float nucR = length(p);
                float nucleus = exp(-nucR * nucR * 30.0) * 3.0;

                /* ---- Central bar ---- */
                float barAng = 0.4;
                float bx = p.x * cos(barAng) + p.z * sin(barAng);
                float bz = -p.x * sin(barAng) + p.z * cos(barAng);
                float bar = exp(-(bx * bx / 4.5 + bz * bz / 0.45 + y * y / 0.18));

                /* ---- Exponential disk ---- */
                float diskR = exp(-r / 2.8);
                float diskFade = 1.0 - smoothstep(6.5, 8.0, r);

                /* ---- Spiral arms ---- */
                float rot = uTime * 0.018;
                float a1 = spiralArm(r, angle + rot, 0.0);
                float a2 = spiralArm(r, angle + rot, PI * 0.52);
                float a3 = spiralArm(r, angle + rot, PI * 1.0);
                float a4 = spiralArm(r, angle + rot, PI * 1.52);
                float arms = max(max(a1, a2), max(a3, a4));

                /* Noise texture — differential flow for animation */
                float flowAngle = angle + uTime * 0.025 / max(sqrt(r), 0.4);
                float nz = fbm(vec2(flowAngle * 3.0 + 42.0, r * 2.5));
                arms *= 0.50 + 0.50 * nz;

                /* Clumpy star-forming regions */
                float clumps = pow(fbm(vec2(angle * 10.0 + 77.0, r * 6.0)), 2.5);
                float clumpBoost = arms * clumps * 1.5;

                /* Arms exist only in the disk, not deep in the bulge */
                float armMask = smoothstep(0.5, 1.5, r) * diskFade;
                arms *= armMask;
                clumpBoost *= armMask;

                /* ---- Dust lanes (on the inner/leading edge of each arm) ---- */
                float dustOff = 0.35;
                float logR2 = log(max(r, 0.15)) * 3.2;
                float dd1 = exp(-pow(mod(angle+rot+dustOff - (logR2 + 0.0)    + PI, TAU) - PI, 2.0) * 20.0);
                float dd2 = exp(-pow(mod(angle+rot+dustOff - (logR2 + PI*0.52) + PI, TAU) - PI, 2.0) * 20.0);
                float dd3 = exp(-pow(mod(angle+rot+dustOff - (logR2 + PI*1.0)  + PI, TAU) - PI, 2.0) * 20.0);
                float dd4 = exp(-pow(mod(angle+rot+dustOff - (logR2 + PI*1.52) + PI, TAU) - PI, 2.0) * 20.0);
                float dust = max(max(dd1, dd2), max(dd3, dd4));
                dust *= smoothstep(0.5, 2.0, r) * (1.0 - smoothstep(5.5, 7.5, r));
                dust *= diskVert;

                /* ---- H II region nebulae ---- */
                float nebNoise = pow(fbm(vec2(angle * 7.0 + 200.0, r * 4.5)), 2.0);
                float nebulae = arms * nebNoise * armMask * smoothstep(1.5, 3.0, r);

                /* Arms have their own radial brightness (gentler falloff than disk) */
                float armRadial = exp(-r / 6.0) * (1.0 - exp(-r * 1.0));

                /* ============ Density ============ */
                float density = 0.0;
                density += diskR * diskVert * diskFade * 4.0;           /* smooth stellar disk (inter-arm stars) */
                density += arms * armRadial * diskVert * 7.0;           /* spiral arms */
                density += clumpBoost * armRadial * diskVert * 2.0;     /* clumps */
                density += bulge * 1.2;                                 /* bulge */
                density += bar * 1.2;                                   /* bar */
                density += nucleus * 2.0;                               /* nucleus */

                /* ============ Colors ============ */
                vec3 bulgeCol  = vec3(1.0, 0.72, 0.32);     /* warm amber */
                vec3 barCol    = vec3(0.95, 0.65, 0.30);
                vec3 nucleusCol = vec3(1.0, 0.88, 0.65);
                vec3 armBlue   = vec3(0.40, 0.58, 1.4);      /* vivid blue */
                vec3 armWhite  = vec3(1.0, 0.92, 0.75);     /* warm white (inner arms) */
                vec3 diskCol   = vec3(0.65, 0.50, 0.30);
                vec3 nebCol    = vec3(1.3, 0.2, 0.55);       /* vivid pink */
                vec3 nebBlue   = vec3(0.25, 0.4, 1.1);

                float rNorm = clamp(r / 7.0, 0.0, 1.0);
                vec3 armColor = mix(armWhite, armBlue, rNorm * 0.5 + nz * 0.2);

                vec3 emission = vec3(0.0);
                emission += bulgeCol  * bulge * 0.5;
                emission += barCol    * bar * 0.25;
                emission += nucleusCol * nucleus * 0.3;
                emission += armColor  * arms * armRadial * diskVert * 5.5;
                emission += armWhite  * clumpBoost * armRadial * diskVert * 3.0;
                emission += diskCol   * diskR * diskVert * diskFade * 3.0;
                emission += mix(nebCol, nebBlue, nebNoise) * nebulae * diskVert * 2.0;

                /* Dust absorption — darkens and slightly reddens */
                float dustAbs = dust * 0.55;
                emission *= 1.0 - dustAbs;
                emission.r *= 1.0 + dustAbs * 0.15;

                return vec4(emission, max(density, 0.0));
            }

            /* ---- Main ---- */
            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;

                /* Camera */
                vec3 fwd   = normalize(-uCamPos);
                vec3 right = normalize(cross(fwd, normalize(uCamUp)));
                vec3 up    = normalize(cross(right, fwd));
                vec3 rd    = normalize(fwd * 1.0 + right * uv.x + up * uv.y);

                vec3 col = vec3(0.0);
                float acc = 0.0;

                /* Intersect galaxy bounding sphere */
                float tNear, tFar;
                if (hitSphere(uCamPos, rd, 10.0, tNear, tFar)) {
                    tNear = max(tNear, 0.0);
                    float pathLen = tFar - tNear;
                    float dt = max(pathLen / 200.0, 0.04);
                    float t = tNear + dt * 0.5;   /* offset half-step to reduce banding */

                    for (int i = 0; i < 220; i++) {
                        if (acc > 0.99 || t > tFar) break;

                        vec3 p = uCamPos + rd * t;
                        vec4 s = galaxySample(p);

                        if (s.a > 0.001) {
                            float a = s.a * dt * 0.8;
                            col += s.rgb * a * (1.0 - acc);
                            acc += a * (1.0 - acc);
                        }

                        t += dt;
                    }
                }

                /* Background stars */
                if (acc < 0.99) {
                    col += stars(rd) * (1.0 - acc);
                }

                /* Saturation boost */
                float grey = dot(col, vec3(0.299, 0.587, 0.114));
                col = mix(vec3(grey), col, 1.5);
                col = max(col, 0.0);

                /* ACES tone mapping (preserves color saturation) + gamma */
                col = (col * (2.51 * col + 0.03)) / (col * (2.43 * col + 0.59) + 0.14);
                col = pow(clamp(col, 0.0, 1.0), vec3(0.68));

                /* Brightness lift */
                col *= 1.4;

                gl_FragColor = vec4(col, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime:       { value: 0.0 },
                uResolution: { value: new THREE.Vector2() },
                uCamPos:     { value: new THREE.Vector3() },
                uCamUp:      { value: new THREE.Vector3(0, 1, 0) },
                uZoom:       { value: 12.0 }
            },
            vertexShader,
            fragmentShader,
            depthTest: false,
            depthWrite: false
        });

        const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(quad);

        /* ===== Render Target (supersampled) ===== */
        let cols, rows, renderW, renderH, renderTarget, pixelBuffer;

        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const w = window.innerWidth;
            const h = window.innerHeight;
            display.width  = w * dpr;
            display.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;

            cols = Math.floor(w / charW);
            rows = Math.floor(h / charH);
            renderW = cols * SS;
            renderH = rows * SS;

            if (renderTarget) renderTarget.dispose();
            renderTarget = new THREE.WebGLRenderTarget(renderW, renderH, {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.LinearFilter,
                format: THREE.RGBAFormat,
                type: THREE.UnsignedByteType
            });
            pixelBuffer = new Uint8Array(renderW * renderH * 4);
            material.uniforms.uResolution.value.set(renderW, renderH);
            renderer.setSize(renderW, renderH);
        }
        resize();
        window.addEventListener('resize', resize);

        /* ===== Quaternion Trackball Camera ===== */
        const camQuat = new THREE.Quaternion();
        camQuat.setFromAxisAngle(new THREE.Vector3(1, 0, 0), 1.5708);

        let zoom = 19.0;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let inertiaDx = 0, inertiaDy = 0;

        function rotateCamera(dx, dy) {
            const angle = Math.sqrt(dx * dx + dy * dy);
            if (angle < 1e-6) return;

            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camQuat).normalize();
            const up    = new THREE.Vector3(0, 1, 0).applyQuaternion(camQuat).normalize();

            const axis = new THREE.Vector3()
                .addScaledVector(up,    dx / angle)
                .addScaledVector(right, -dy / angle)
                .normalize();

            const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
            camQuat.premultiply(q);
            camQuat.normalize();
        }

        const defaultQuat = new THREE.Quaternion();
        defaultQuat.setFromAxisAngle(new THREE.Vector3(1, 0, 0), 1.5708);

        let lastClickTime = 0;
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#zoom-controls')) return;
            const now = performance.now();
            if (now - lastClickTime < 350) {
                camQuat.copy(defaultQuat);
                inertiaDx = 0;
                inertiaDy = 0;
                zoom = 19.0;
            }
            lastClickTime = now;
        });

        /* ---- Mouse handlers ---- */
        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            inertiaDx = 0;
            inertiaDy = 0;
            document.body.classList.add('dragging');
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - lastX) * 0.008;
            const dy = (e.clientY - lastY) * 0.008;
            inertiaDx = dx;
            inertiaDy = dy;
            rotateCamera(dx, dy);
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.classList.remove('dragging');
        });

        window.addEventListener('wheel', (e) => {
            zoom = Math.max(8, Math.min(45, zoom + e.deltaY * 0.015));
        }, { passive: true });

        /* ---- Zoom buttons ---- */
        const ZOOM_STEP = 1.5;
        document.getElementById('zoom-in').addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.max(8, zoom - ZOOM_STEP);
        });
        document.getElementById('zoom-out').addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.min(45, zoom + ZOOM_STEP);
        });

        /* ===== Explosion System ===== */
        const explosions = [];
        const EXPLODE_RADIUS = 3;
        const DEBRIS_TIME = 1.4;
        const GONE_TIME = 0.5;
        const REGEN_TIME = 1.0;
        const EXPLODE_DURATION = DEBRIS_TIME + GONE_TIME + REGEN_TIME;

        /* ===== Big Crunch / Big Bang Easter Egg ===== */
        let crunchActive = false;
        let crunchStart = 0;
        const CRUNCH_TIME   = 2.0;     // spiral arms wind inward
        const UNSTABLE_TIME = 1.2;     // jittering sphere + sparks
        const BANG_TIME     = 0.8;     // explosive expansion
        const REFORM_TIME   = 2.5;     // characters rearrange into place
        const CRUNCH_TOTAL  = CRUNCH_TIME + UNSTABLE_TIME + BANG_TIME + REFORM_TIME;
        const GC_CLICK_RADIUS = 60;
        const crunchSparks = [];

        function triggerCrunch() {
            if (crunchActive) return;
            crunchActive = true;
            crunchStart = performance.now();
            crunchSparks.length = 0;
        }

        function getCrunchEffect(x, y, now) {
            const elapsed = (now - crunchStart) / 1000;
            if (elapsed > CRUNCH_TOTAL) {
                crunchActive = false;
                return { ox: 0, oy: 0, alpha: 1 };
            }

            const dx = x - centerCellX;
            const dy = y - centerCellY;
            const r = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);
            const maxDist = Math.sqrt(cols * cols + rows * rows) / 2;
            const normR = r / Math.max(maxDist, 1);

            let ox = 0, oy = 0, alpha = 1;

            if (elapsed < CRUNCH_TIME) {
                // ---- CRUNCH: spiral arms wind inward ----
                const t = elapsed / CRUNCH_TIME;
                const ease = t * t;   // ease-in (accelerating)

                // Shrink radius toward center
                const newR = r * (1 - ease * 0.97);
                // Wind: outer cells rotate more (arms tightening)
                const wind = ease * 4.0 * normR;
                const newAngle = angle + wind;

                const newX = centerCellX + newR * Math.cos(newAngle);
                const newY = centerCellY + newR * Math.sin(newAngle);

                ox = (newX - x) * charW;
                oy = (newY - y) * charH;
                alpha = 1;

            } else if (elapsed < CRUNCH_TIME + UNSTABLE_TIME) {
                // ---- UNSTABLE SPHERE: spinning, glitching, sparking ----
                const t = (elapsed - CRUNCH_TIME) / UNSTABLE_TIME;

                if (r > 15) {
                    // Far cells: hidden, parked at center
                    alpha = 0;
                    ox = (centerCellX - x) * charW;
                    oy = (centerCellY - y) * charH;
                } else {
                    // Spinning sphere — accelerating rotation
                    const spinAngle = angle + t * t * 18;
                    const sphereR = 4 + Math.sin(t * Math.PI * 3) * 0.8;
                    const squeeze = Math.min(1, r / 15);
                    const sR = squeeze * sphereR;

                    ox = (centerCellX + sR * Math.cos(spinAngle) - x) * charW;
                    oy = (centerCellY + sR * Math.sin(spinAngle) - y) * charH;

                    // Per-cell glitch: random cells teleport briefly
                    if (Math.random() < 0.07) {
                        ox += (Math.random() - 0.5) * 40;
                        oy += (Math.random() - 0.5) * 40;
                    }

                    // Global glitch: whole sphere jumps periodically
                    const gPhase = Math.sin(elapsed * 25);
                    if (gPhase > 0.85) {
                        const gStr = (gPhase - 0.85) / 0.15;
                        ox += Math.sin(elapsed * 137) * 14 * gStr;
                        oy += Math.cos(elapsed * 173) * 14 * gStr;
                    }

                    // Flickery brightness
                    alpha = 0.5 + 0.5 * Math.random();
                }

            } else if (elapsed < CRUNCH_TIME + UNSTABLE_TIME + BANG_TIME) {
                // ---- BIG BANG: explosive expansion ----
                const t = (elapsed - CRUNCH_TIME - UNSTABLE_TIME) / BANG_TIME;
                const ease = t * (2 - t);   // ease-out

                const expandR = ease * maxDist * 3;
                const bangAngle = angle + (1 - t) * 0.5; // residual spin

                if (r < 0.5) {
                    ox = 0; oy = 0;
                } else {
                    const targetR = expandR * normR;
                    ox = (centerCellX + targetR * Math.cos(bangAngle) - x) * charW;
                    oy = (centerCellY + targetR * Math.sin(bangAngle) - y) * charH;
                }
                alpha = Math.max(0, 1 - t * 1.3);

            } else {
                // ---- REFORM: characters fly in from scattered positions ----
                const t = (elapsed - CRUNCH_TIME - UNSTABLE_TIME - BANG_TIME) / REFORM_TIME;

                // Stagger: center cells arrive first, edges last
                const delay = normR * 0.4;
                const localT = Math.max(0, (t - delay) / (1 - delay));
                const ease = localT < 1 ? localT * localT * (3 - 2 * localT) : 1;

                // Each cell flies in from a random direction
                const rand = getCellRand(x, y);
                const startDist = 12 + rand.speed * 25;
                const startAngle = rand.angle;

                ox = Math.cos(startAngle) * startDist * charW * (1 - ease);
                oy = Math.sin(startAngle) * startDist * charH * (1 - ease);
                alpha = Math.min(1, localT * 1.8);
            }

            return { ox, oy, alpha: Math.max(0, Math.min(1, alpha)) };
        }

        function renderCrunchOverlay(now) {
            const elapsed = (now - crunchStart) / 1000;
            const cxPx = centerCellX * charW;
            const cyPx = centerCellY * charH;

            // ---- Unstable core: glow + sparks ----
            if (elapsed >= CRUNCH_TIME && elapsed < CRUNCH_TIME + UNSTABLE_TIME) {
                const t = (elapsed - CRUNCH_TIME) / UNSTABLE_TIME;

                // Pulsating radial glow
                const pulse = 0.3 + 0.2 * Math.sin(t * Math.PI * 6);
                const radius = 40 + 25 * Math.sin(t * Math.PI * 4);
                const grad = ctx.createRadialGradient(cxPx, cyPx, 0, cxPx, cyPx, radius);
                grad.addColorStop(0, `rgba(255,240,200,${pulse})`);
                grad.addColorStop(0.3, `rgba(255,180,100,${pulse * 0.6})`);
                grad.addColorStop(0.6, `rgba(200,120,255,${pulse * 0.3})`);
                grad.addColorStop(1, 'rgba(100,80,200,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(cxPx - radius, cyPx - radius, radius * 2, radius * 2);

                // Spawn sparks randomly
                if (Math.random() < 0.4) {
                    const count = 3 + Math.floor(Math.random() * 5);
                    for (let i = 0; i < count; i++) {
                        crunchSparks.push({
                            angle: Math.random() * Math.PI * 2,
                            speed: 1.5 + Math.random() * 4,
                            dist: 0,
                            char: ASCII[6 + Math.floor(Math.random() * (ASCII.length - 6))],
                            born: now,
                            life: 300 + Math.random() * 600,
                            r: 200 + Math.floor(Math.random() * 55),
                            g: 150 + Math.floor(Math.random() * 100),
                            b: 80 + Math.floor(Math.random() * 175)
                        });
                    }
                }
            }

            // Draw sparks (fly outward from core, decelerate, fade)
            ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
            for (let i = crunchSparks.length - 1; i >= 0; i--) {
                const sp = crunchSparks[i];
                const age = now - sp.born;
                if (age > sp.life) { crunchSparks.splice(i, 1); continue; }

                const t = age / sp.life;
                sp.dist += sp.speed * (1 - t * 0.5);

                const px = cxPx + Math.cos(sp.angle) * sp.dist;
                const py = cyPx + Math.sin(sp.angle) * sp.dist;

                if (px < -10 || px > display.width + 10 ||
                    py < -10 || py > display.height + 10) continue;

                ctx.globalAlpha = (1 - t) * (1 - t);
                ctx.fillStyle = `rgb(${sp.r},${sp.g},${sp.b})`;
                ctx.fillText(sp.char, px, py + charH * 0.85);
            }
            ctx.globalAlpha = 1;

            // ---- Big Bang flash ----
            const bangT = CRUNCH_TIME + UNSTABLE_TIME;
            if (elapsed >= bangT - 0.1 && elapsed < bangT + 0.25) {
                const ft = (elapsed - (bangT - 0.1)) / 0.35;
                const flashA = ft < 0.25 ? (ft / 0.25) * 0.85 : 0.85 * (1 - (ft - 0.25) / 0.75);
                ctx.fillStyle = `rgba(255,250,230,${Math.max(0, flashA)})`;
                ctx.fillRect(0, 0, display.width, display.height);
            }
        }

        const cellRand = {};
        function getCellRand(x, y) {
            const key = x + ',' + y;
            if (!(key in cellRand)) {
                cellRand[key] = {
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.4 + Math.random() * 1.0,
                    delay: Math.random() * 0.06
                };
            }
            return cellRand[key];
        }

        function createExplosion(clientX, clientY) {
            const worldPos = clickToWorldPos(clientX, clientY);
            explosions.push({ worldPos, time: performance.now() });
        }

        let clickDownX = 0, clickDownY = 0, clickDownTime = 0;
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#zoom-controls')) return;
            clickDownX = e.clientX;
            clickDownY = e.clientY;
            clickDownTime = performance.now();
        });
        window.addEventListener('mouseup', (e) => {
            const dx = Math.abs(e.clientX - clickDownX);
            const dy = Math.abs(e.clientY - clickDownY);
            const dt = performance.now() - clickDownTime;
            if (dx < 6 && dy < 6 && dt < 250) {
                if (crunchActive) return;
                const gcSx = centerCellX * charW;
                const gcSy = centerCellY * charH;
                const dGC = Math.sqrt((e.clientX - gcSx) ** 2 + (e.clientY - gcSy) ** 2);
                if (dGC < GC_CLICK_RADIUS) {
                    triggerCrunch();
                } else {
                    createExplosion(e.clientX, e.clientY);
                }
            }
        });

        let tapX = 0, tapY = 0, tapTime = 0;
        window.addEventListener('touchstart', (e) => {
            tapX = e.touches[0].clientX;
            tapY = e.touches[0].clientY;
            tapTime = performance.now();
        }, { passive: true });
        window.addEventListener('touchend', (e) => {
            const dx = Math.abs(e.changedTouches[0].clientX - tapX);
            const dy = Math.abs(e.changedTouches[0].clientY - tapY);
            const dt = performance.now() - tapTime;
            if (dx < 12 && dy < 12 && dt < 300) {
                if (crunchActive) return;
                const gcSx = centerCellX * charW;
                const gcSy = centerCellY * charH;
                const dGC = Math.sqrt((tapX - gcSx) ** 2 + (tapY - gcSy) ** 2);
                if (dGC < GC_CLICK_RADIUS) {
                    triggerCrunch();
                } else {
                    createExplosion(tapX, tapY);
                }
            }
        });

        let centerCellX = 0, centerCellY = 0;

        function getExplosionEffect(x, y, now) {
            let ox = 0, oy = 0, alpha = 1;
            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                const elapsed = (now - exp.time) / 1000;
                if (elapsed > EXPLODE_DURATION) { explosions.splice(i, 1); continue; }
                if (!exp.visible) continue;

                const dx = x - exp.cx;
                const dy = y - exp.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > EXPLODE_RADIUS) continue;
                const rand = getCellRand(x, y);
                const threshold = EXPLODE_RADIUS * (0.5 + rand.speed * 0.5);
                if (dist > threshold) continue;
                const waveDelay = dist * 0.06 + rand.delay;
                const localT = Math.max(0, elapsed - waveDelay);
                if (localT < DEBRIS_TIME) {
                    const t = localT / DEBRIS_TIME;
                    const speed = rand.speed * 45;

                    const toC_x = centerCellX - x;
                    const toC_y = centerCellY - y;
                    const toC_len = Math.sqrt(toC_x * toC_x + toC_y * toC_y) || 1;

                    const expToC = Math.sqrt((exp.cx - centerCellX) ** 2 + (exp.cy - centerCellY) ** 2);
                    const grav = Math.min(1, 12 / (expToC + 4));

                    const rx = Math.cos(rand.angle);
                    const ry = Math.sin(rand.angle);
                    const bx = toC_x / toC_len;
                    const by = toC_y / toC_len;
                    const fx = rx * (1 - grav) + bx * grav;
                    const fy = ry * (1 - grav) + by * grav;
                    const flen = Math.sqrt(fx * fx + fy * fy) || 1;

                    const normalDrift = t * (1.2 - 0.2 * t);
                    const gravDrift = t * t * 1.5;
                    const drift = normalDrift * (1 - grav) + gravDrift * grav;

                    ox += (fx / flen) * speed * drift;
                    oy += (fy / flen) * speed * drift;

                    const fadeT = Math.max(0, (t - 0.35) / 0.65);
                    alpha *= 1 - fadeT;
                } else if (localT < DEBRIS_TIME + GONE_TIME) {
                    alpha = 0;
                } else {
                    const t = (localT - DEBRIS_TIME - GONE_TIME) / REGEN_TIME;
                    alpha *= t * t * (3 - 2 * t);
                }
            }
            return { ox, oy, alpha: Math.max(0, Math.min(1, alpha)) };
        }

        /* ---- Touch support ---- */
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
            inertiaDx = 0;
            inertiaDy = 0;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = (e.touches[0].clientX - lastX) * 0.008;
            const dy = (e.touches[0].clientY - lastY) * 0.008;
            inertiaDx = dx;
            inertiaDy = dy;
            rotateCamera(dx, dy);
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        /* ===== Camera basis vectors (for 3D explosion tracking) ===== */
        const _camFwd   = new THREE.Vector3();
        const _camRight = new THREE.Vector3();
        const _camUpB   = new THREE.Vector3();
        const FOCAL = 1.0; // must match shader: fwd * 1.0

        function cellToRayDir(cx, cy) {
            const uvx = (cx * SS + SS / 2 - renderW * 0.5) / renderH;
            const uvy = ((renderH - 1 - (cy * SS + SS / 2)) - renderH * 0.5) / renderH;
            return new THREE.Vector3()
                .addScaledVector(_camFwd, FOCAL)
                .addScaledVector(_camRight, uvx)
                .addScaledVector(_camUpB, uvy)
                .normalize();
        }

        function clickToWorldPos(clientX, clientY) {
            const cx = clientX / charW;
            const cy = clientY / charH;
            const rd = cellToRayDir(cx, cy);
            const cam = _camPos.clone();

            // Try galaxy disk plane y=0
            if (Math.abs(rd.y) > 0.01) {
                const t = -cam.y / rd.y;
                if (t > 0) {
                    const hit = cam.clone().addScaledVector(rd, t);
                    const r = Math.sqrt(hit.x * hit.x + hit.z * hit.z);
                    if (r > 0.3 && r < 30) return hit;
                }
            }

            const b = 2 * cam.dot(rd);
            const c = cam.lengthSq() - 50 * 50;
            const disc = b * b - 4 * c;
            if (disc >= 0) {
                const t = (-b + Math.sqrt(disc)) / 2;
                return cam.clone().addScaledVector(rd, Math.max(0.1, t));
            }
            return rd.clone().multiplyScalar(60);
        }

        function worldPosToCell(pos) {
            const toP = new THREE.Vector3().subVectors(pos, _camPos);
            const f = toP.dot(_camFwd);
            if (f <= 0.001) return null;
            const r = toP.dot(_camRight);
            const u = toP.dot(_camUpB);
            const uvx = r * FOCAL / f;
            const uvy = u * FOCAL / f;
            const rpx = uvx * renderH + renderW * 0.5;
            const rpy = uvy * renderH + renderH * 0.5;
            return { cx: rpx / SS, cy: (renderH - 1 - rpy) / SS };
        }

        /* ===== Animation Loop ===== */
        const _camDir = new THREE.Vector3();
        const _camUp2 = new THREE.Vector3();
        const _camPos = new THREE.Vector3();

        function animate(time) {
            requestAnimationFrame(animate);

            const t = time * 0.001;

            if (!isDragging) {
                inertiaDx *= 0.95;
                inertiaDy *= 0.95;
                rotateCamera(inertiaDx, inertiaDy);
                rotateCamera(0, -0.003);  // gentle auto-spin (X axis, reversed)
            }

            _camDir.set(0, 0, 1).applyQuaternion(camQuat);
            _camUp2.set(0, 1, 0).applyQuaternion(camQuat);
            _camPos.copy(_camDir).multiplyScalar(zoom);

            _camFwd.copy(_camPos).negate().normalize();
            _camRight.crossVectors(_camFwd, _camUp2).normalize();
            _camUpB.crossVectors(_camRight, _camFwd).normalize();

            material.uniforms.uTime.value = t;
            material.uniforms.uCamPos.value.copy(_camPos);
            material.uniforms.uCamUp.value.copy(_camUp2);
            material.uniforms.uZoom.value = zoom;

            renderer.setRenderTarget(renderTarget);
            renderer.render(scene, cam);
            renderer.setRenderTarget(null);
            renderer.readRenderTargetPixels(renderTarget, 0, 0, renderW, renderH, pixelBuffer);

            /* ---- Draw ASCII with supersampled colors + background glow ---- */
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, display.width, display.height);

            const asciiLen = ASCII.length;
            const ss2 = SS * SS;

            const now = performance.now();
            const hasExplosions = explosions.length > 0;

            // Project galactic center to screen
            const cProj = worldPosToCell(new THREE.Vector3(0, 0, 0));
            if (cProj) { centerCellX = cProj.cx; centerCellY = cProj.cy; }

            if (hasExplosions) {
                for (const exp of explosions) {
                    const proj = worldPosToCell(exp.worldPos);
                    if (proj) {
                        exp.cx = proj.cx;
                        exp.cy = proj.cy;
                        exp.visible = true;
                    } else {
                        exp.visible = false;
                    }
                }
            }

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let rSum = 0, gSum = 0, bSum = 0;
                    for (let sy = 0; sy < SS; sy++) {
                        for (let sx = 0; sx < SS; sx++) {
                            const px = x * SS + sx;
                            const py = (renderH - 1) - (y * SS + sy);
                            const idx = (py * renderW + px) * 4;
                            rSum += pixelBuffer[idx];
                            gSum += pixelBuffer[idx + 1];
                            bSum += pixelBuffer[idx + 2];
                        }
                    }
                    const r = (rSum / ss2) | 0;
                    const g = (gSum / ss2) | 0;
                    const b = (bSum / ss2) | 0;

                    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255.0;
                    const ci  = Math.min(asciiLen - 1, Math.floor(lum * asciiLen));

                    let ox = 0, oy = 0, eAlpha = 1;
                    if (hasExplosions) {
                        const eff = getExplosionEffect(x, y, now);
                        ox = eff.ox;
                        oy = eff.oy;
                        eAlpha = eff.alpha;
                    }

                    // Big Crunch / Big Bang effect (scaled by luminance: galaxy moves, sky stays)
                    if (crunchActive) {
                        const cr = getCrunchEffect(x, y, now);
                        const galS = Math.min(1, lum * 4);
                        ox += cr.ox * galS;
                        oy += cr.oy * galS;
                        eAlpha *= 1 - (1 - cr.alpha) * galS;
                    }

                    if (eAlpha < 0.01) continue;

                    const drawX = x * charW + ox;
                    const drawY = y * charH + oy;

                    if (lum > 0.15) {
                        const bgAlpha = Math.min(0.35, lum * lum * 1.2) * eAlpha;
                        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + bgAlpha + ')';
                        ctx.fillRect(drawX, drawY, charW, charH);
                    }

                    if (ci > 0) {
                        ctx.globalAlpha = eAlpha;
                        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                        ctx.fillText(ASCII[ci], drawX, drawY + charH * 0.85);
                        ctx.globalAlpha = 1;
                    }
                }
            }

            // Big Crunch / Big Bang overlay (glow + flash)
            if (crunchActive) {
                renderCrunchOverlay(now);
            }
        }

        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
