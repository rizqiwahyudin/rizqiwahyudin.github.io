    <script>
    (function logoDither() {
        const LOGO_PX    = 1.2;
        const SPEED       = 2;
        const BLACK_FLOOR = 0.0035;
        const COLOR_BOOST = 0.8;
        const DITHER_SPREAD = 0.5;
        const LOGO_SIZE   = 36;

        const canvas = document.getElementById('logo-dither');
        const ctx    = canvas.getContext('2d', { willReadFrequently: true });
        const video  = document.getElementById('logo-video');

        const dW = Math.floor(LOGO_SIZE / LOGO_PX);
        const dH = dW;
        canvas.width  = dW;
        canvas.height = dH;

        const sampler    = document.createElement('canvas');
        const samplerCtx = sampler.getContext('2d', { willReadFrequently: true });
        sampler.width  = dW;
        sampler.height = dH;

        const BAYER8 = new Float32Array([
             0, 32,  8, 40,  2, 34, 10, 42,
            48, 16, 56, 24, 50, 18, 58, 26,
            12, 44,  4, 36, 14, 46,  6, 38,
            60, 28, 52, 20, 62, 30, 54, 22,
             3, 35, 11, 43,  1, 33,  9, 41,
            51, 19, 59, 27, 49, 17, 57, 25,
            15, 47,  7, 39, 13, 45,  5, 37,
            63, 31, 55, 23, 61, 29, 53, 21
        ]);
        for (let i = 0; i < 64; i++) BAYER8[i] /= 64.0;

        function frame() {
            requestAnimationFrame(frame);
            if (video.readyState < 2) return;

            const w = dW, h = dH;
            const vidAspect = video.videoWidth / video.videoHeight;
            let drawW, drawH, drawX, drawY;
            if (vidAspect > 1) {
                drawH = h;
                drawW = h * vidAspect;
                drawX = (w - drawW) / 2;
                drawY = 0;
            } else {
                drawW = w;
                drawH = w / vidAspect;
                drawX = 0;
                drawY = (h - drawH) / 2;
            }

            samplerCtx.fillStyle = '#000';
            samplerCtx.fillRect(0, 0, w, h);
            samplerCtx.drawImage(video, drawX, drawY, drawW, drawH);

            const srcData = samplerCtx.getImageData(0, 0, w, h);
            const src = srcData.data;
            const outData = ctx.createImageData(w, h);
            const out = outData.data;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    let r = src[i]     / 255.0;
                    let g = src[i + 1] / 255.0;
                    let b = src[i + 2] / 255.0;

                    const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                    if (lum < BLACK_FLOOR) {
                        out[i] = 0; out[i+1] = 0; out[i+2] = 0; out[i+3] = 255;
                        continue;
                    }

                    r = Math.min(1.0, r * COLOR_BOOST);
                    g = Math.min(1.0, g * COLOR_BOOST);
                    b = Math.min(1.0, b * COLOR_BOOST);

                    const threshold = BAYER8[(y & 7) * 8 + (x & 7)] * DITHER_SPREAD;
                    out[i]     = r > threshold ? 255 : 0;
                    out[i + 1] = g > threshold ? 255 : 0;
                    out[i + 2] = b > threshold ? 255 : 0;
                    out[i + 3] = 255;
                }
            }
            ctx.putImageData(outData, 0, 0);
        }

        video.playbackRate = SPEED;
        video.play().then(() => {
            requestAnimationFrame(frame);
        }).catch(() => {
            document.addEventListener('click', () => {
                video.play();
                requestAnimationFrame(frame);
            }, { once: true });
        });
    })();
    </script>

    <!-- ===== Glass Tuner ===== -->
    <style>
        #glass-tuner-toggle {
            position: fixed;
            bottom: 16px;

            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            display: none;
        }
        #glass-tuner.open { display: block; }

        #glass-tuner .gt-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: lowercase;
            color: var(--text-dim);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        #glass-tuner .gt-row {
            margin-bottom: 10px;
        }
        #glass-tuner .gt-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: var(--text-mid);

        }
        #glass-tuner .gt-val {

    <button id="glass-tuner-toggle">&#9881; glass tuner</button>

    <div id="glass-tuner">

        <div class="gt-row">
            <div class="gt-label"><span>frost blur</span><span class="gt-val" id="gt-blur-val">10px</span></div>

        <div class="gt-row">
            <div class="gt-label"><span>tint opacity</span><span class="gt-val" id="gt-tint-val">0.18</span></div>

        </div>
        <div class="gt-row">
            <div class="gt-label"><span>color wash</span><span class="gt-val" id="gt-wash-val">1.00</span></div>
            <input type="range" id="gt-wash" min="0" max="3" step="0.05" value="1">
        </div>
        <div class="gt-row">
            <div class="gt-label"><span>corner radius</span><span class="gt-val" id="gt-radius-val">10px</span></div>
            <input type="range" id="gt-radius" min="0" max="30" step="1" value="10">
        </div>
        <div class="gt-row">
            <div class="gt-label"><span>border glow</span><span class="gt-val" id="gt-border-val">0.00</span></div>
            <input type="range" id="gt-border" min="0" max="0.3" step="0.005" value="0">
        </div>

        <div class="gt-actions">
            <button class="gt-btn" id="gt-copy">copy css</button>
            <button class="gt-btn" id="gt-reset">reset</button>
        </div>
        <div class="gt-copied" id="gt-copied">copied to clipboard</div>
    </div>

    <script>
    (function glassTuner() {
        const root = document.documentElement.style;
        const toggle = document.getElementById('glass-tuner-toggle');
        const panel  = document.getElementById('glass-tuner');

        toggle.addEventListener('click', () => panel.classList.toggle('open'));

        const defaults = {
            blur: 10, tint: 0.18, wash: 1, radius: 10, border: 0
        };

        const sliders = {
            blur:   document.getElementById('gt-blur'),
            tint:   document.getElementById('gt-tint'),
            wash:   document.getElementById('gt-wash'),
            radius: document.getElementById('gt-radius'),
            border: document.getElementById('gt-border')
        };

        const labels = {
            blur:   document.getElementById('gt-blur-val'),
            tint:   document.getElementById('gt-tint-val'),
            wash:   document.getElementById('gt-wash-val'),
            radius: document.getElementById('gt-radius-val'),
            border: document.getElementById('gt-border-val')
        };

        function update() {
            const b  = parseFloat(sliders.blur.value);
            const t  = parseFloat(sliders.tint.value);
            const w  = parseFloat(sliders.wash.value);
            const r  = parseFloat(sliders.radius.value);
            const bd = parseFloat(sliders.border.value);

            root.setProperty('--glass-blur',   b + 'px');
            root.setProperty('--glass-tint',   t);
            root.setProperty('--glass-wash',   w);
            root.setProperty('--glass-radius', r + 'px');
            root.setProperty('--glass-border', bd);

            labels.blur.textContent   = b.toFixed(1) + 'px';
            labels.tint.textContent   = t.toFixed(2);
            labels.wash.textContent   = w.toFixed(2);
            labels.radius.textContent = r + 'px';
            labels.border.textContent = bd.toFixed(3);
        }

        Object.values(sliders).forEach(s => s.addEventListener('input', update));

        document.getElementById('gt-reset').addEventListener('click', () => {
            sliders.blur.value   = defaults.blur;
            sliders.tint.value   = defaults.tint;
            sliders.wash.value   = defaults.wash;
            sliders.radius.value = defaults.radius;
            sliders.border.value = defaults.border;
            update();
        });

        document.getElementById('gt-copy').addEventListener('click', () => {
            const b  = parseFloat(sliders.blur.value);
            const t  = parseFloat(sliders.tint.value);
            const w  = parseFloat(sliders.wash.value);
            const r  = parseFloat(sliders.radius.value);
            const bd = parseFloat(sliders.border.value);

            const css = `.card-sim .card-body-inner {\n`
                + `    background: rgb(5 5 5 / ${t.toFixed(2)});\n`
                + `    backdrop-filter: blur(${b.toFixed(1)}px);\n`
                + `    -webkit-backdrop-filter: blur(${b.toFixed(1)}px);\n`
                + `    border: 1px solid rgb(255 255 255 / ${bd.toFixed(3)});\n`
                + `    border-radius: ${r}px;\n`
                + `}\n\n`
                + `.card-sim .card-body-inner::before {\n`
                + `    opacity: ${w.toFixed(2)};\n`
                + `}`;

            navigator.clipboard.writeText(css).then(() => {
                const msg = document.getElementById('gt-copied');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 1600);
            });
        });
    })();
    </script>
