<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #reset-btn {
            position: fixed;
            top: 16px; right: 20px;
            color: rgba(255,255,255,0.4);
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #reset-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #label {
            position: fixed;
            bottom: 16px; right: 20px;
            color: rgba(255,255,255,0.2);
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="index.html">&larr; back</a>
<button id="reset-btn">reset</button>
<div id="label">canvas // physics // bayer dither</div>

<script>
(function() {
    'use strict';

    // Bayer 4x4 matrix, normalized to [0, 1)
    const BAYER4 = [
         0/16,  8/16,  2/16, 10/16,
        12/16,  4/16, 14/16,  6/16,
         3/16, 11/16,  1/16,  9/16,
        15/16,  7/16, 13/16,  5/16
    ];

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    const G         = 500;
    const EPS       = 8;
    const DT        = 0.15;
    const TRAIL_LEN = 300;
    const FADE      = 0.94;   // brightness buffer fade per frame
    const PIX       = 4;      // logical pixel size

    // Each body gets R, G, B channel weights (summed into luminance buffer)
    // Using distinct tints; kept subtle so dither blends them naturally.
    const BODY_TINTS = [
        [1.00, 0.40, 0.40],  // red
        [0.40, 0.60, 1.00],  // blue
        [1.00, 0.90, 0.50],  // gold
        [0.90, 0.90, 0.95],  // near white
        [0.40, 1.00, 0.75],  // teal
        [0.90, 0.55, 0.90],  // purple
        [1.00, 0.70, 0.35],  // amber
    ];

    // Separate R/G/B float buffers so each body's tint accumulates per channel
    let simW, simH;
    let bufR, bufG, bufB;
    let imgData;

    function initBuffers() {
        simW   = Math.floor(window.innerWidth  / PIX);
        simH   = Math.floor(window.innerHeight / PIX);
        canvas.width  = simW;
        canvas.height = simH;
        bufR   = new Float32Array(simW * simH);
        bufG   = new Float32Array(simW * simH);
        bufB   = new Float32Array(simW * simH);
        imgData = ctx.createImageData(simW, simH);
    }

    // Deposit brightness into RGB buffers at a given sim-space coordinate
    function deposit(sx, sy, tint, amount) {
        const col = Math.floor(sx);
        const row = Math.floor(sy);
        if (col < 0 || col >= simW || row < 0 || row >= simH) return;
        const i = row * simW + col;
        bufR[i] = Math.min(1.0, bufR[i] + tint[0] * amount);
        bufG[i] = Math.min(1.0, bufG[i] + tint[1] * amount);
        bufB[i] = Math.min(1.0, bufB[i] + tint[2] * amount);
    }

    let bodies = [];

    function makeBodies() {
        bodies = [];

        // Sim space coordinates (will map to buffer after centering on CoM)
        const cx = simW / 2;
        const cy = simH / 2;

        const M = 1200;
        bodies.push({ x: cx, y: cy, vx: 0, vy: 0, mass: M, tint: BODY_TINTS[3], trail: [] });

        const orbitData = [
            { r: 80,  angle: 0,            mass: 60,  ti: 0 },
            { r: 120, angle: Math.PI/3,    mass: 30,  ti: 1 },
            { r: 155, angle: 2*Math.PI/3,  mass: 80,  ti: 2 },
            { r: 100, angle: Math.PI,      mass: 20,  ti: 4 },
            { r: 185, angle: 4*Math.PI/3,  mass: 45,  ti: 5 },
            { r: 60,  angle: 5*Math.PI/3,  mass: 15,  ti: 6 },
        ];

        for (const o of orbitData) {
            const bx = cx + Math.cos(o.angle) * o.r;
            const by = cy + Math.sin(o.angle) * o.r;
            const vc = Math.sqrt(G * M / o.r);
            bodies.push({
                x: bx, y: by,
                vx: -Math.sin(o.angle) * vc,
                vy:  Math.cos(o.angle) * vc,
                mass: o.mass,
                tint: BODY_TINTS[o.ti],
                trail: []
            });
        }
    }

    function computeForces() {
        const ax = new Float64Array(bodies.length);
        const ay = new Float64Array(bodies.length);
        for (let i = 0; i < bodies.length; i++) {
            for (let j = i + 1; j < bodies.length; j++) {
                const dx = bodies[j].x - bodies[i].x;
                const dy = bodies[j].y - bodies[i].y;
                const r2 = dx*dx + dy*dy + EPS*EPS;
                const r  = Math.sqrt(r2);
                const F  = G / r2;
                const fx = F * dx / r;
                const fy = F * dy / r;
                ax[i] += fx * bodies[j].mass;
                ay[i] += fy * bodies[j].mass;
                ax[j] -= fx * bodies[i].mass;
                ay[j] -= fy * bodies[i].mass;
            }
        }
        return { ax, ay };
    }

    function step() {
        const { ax, ay } = computeForces();
        for (let i = 0; i < bodies.length; i++) {
            bodies[i].vx += ax[i] * DT;
            bodies[i].vy += ay[i] * DT;
            bodies[i].x  += bodies[i].vx * DT;
            bodies[i].y  += bodies[i].vy * DT;
            bodies[i].trail.push({ x: bodies[i].x, y: bodies[i].y });
            if (bodies[i].trail.length > TRAIL_LEN) bodies[i].trail.shift();
        }
    }

    function centerOfMass() {
        let totalM = 0, cx = 0, cy = 0;
        for (const b of bodies) {
            totalM += b.mass;
            cx += b.x * b.mass;
            cy += b.y * b.mass;
        }
        return { x: cx / totalM, y: cy / totalM };
    }

    function render() {
        // Fade buffers
        for (let i = 0; i < bufR.length; i++) {
            bufR[i] *= FADE;
            bufG[i] *= FADE;
            bufB[i] *= FADE;
        }

        const com  = centerOfMass();
        const offX = simW / 2 - com.x;
        const offY = simH / 2 - com.y;

        for (const b of bodies) {
            const n = b.trail.length;
            // Deposit trail with recency-weighted brightness
            for (let i = 0; i < n; i++) {
                const bri = (i / n) * 0.22;
                deposit(b.trail[i].x + offX, b.trail[i].y + offY, b.tint, bri);
            }
            // Deposit body itself at full brightness
            deposit(b.x + offX, b.y + offY, b.tint, 0.9);
        }

        // Bayer dither per channel, composite to final pixel
        const d = imgData.data;
        for (let y = 0; y < simH; y++) {
            for (let x = 0; x < simW; x++) {
                const i   = y * simW + x;
                const thr = BAYER4[(y % 4) * 4 + (x % 4)];
                const rOn = bufR[i] > thr ? 255 : 0;
                const gOn = bufG[i] > thr ? 255 : 0;
                const bOn = bufB[i] > thr ? 255 : 0;
                const p   = i * 4;
                d[p]     = rOn;
                d[p + 1] = gOn;
                d[p + 2] = bOn;
                d[p + 3] = 255;
            }
        }

        ctx.imageSmoothingEnabled = false;
        ctx.putImageData(imgData, 0, 0);
    }

    function loop() {
        for (let i = 0; i < 3; i++) step();
        render();
        requestAnimationFrame(loop);
    }

    function reset() {
        bufR.fill(0);
        bufG.fill(0);
        bufB.fill(0);
        makeBodies();
    }

    function resize() {
        initBuffers();
        makeBodies();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') window.location.href = 'index.html';
        if (e.key === 'r' || e.key === 'R') reset();
    });

    document.getElementById('reset-btn').addEventListener('click', reset);
    window.addEventListener('resize', resize);

    resize();
    loop();
})();
</script>
</body>
</html>
