            console.error('routing error:', err);
            routeStatus.textContent = 'error';
        }

        routeBtn.disabled = false;
    }

    // Update turn instruction panel (called from animation loop)
    function updateTurnPanel() {
        if (!routeState.active || routeState.steps.length === 0 || smoothLat === null) {
            turnPanel.style.display = 'none';
            return;
        }

        // Find the next step ahead: the step whose maneuver location is closest
        // but that we haven't passed yet. We detect "passed" by checking if
        // the user is within 15m of the step location.
        const userLat = smoothLat;
        const userLon = smoothLon;

        let nextStep = null;
        let nextDist = Infinity;

        for (const step of routeState.steps) {
            if (step.instruction === 'arrive') {
                // Always keep arrive as fallback
                const d = haversineM(userLat, userLon, step.lat, step.lon);
                if (nextStep === null) { nextStep = step; nextDist = d; }
                continue;
            }
            const d = haversineM(userLat, userLon, step.lat, step.lon);
            // Consider steps more than 15m away (not yet passed)
            if (d > 15 && d < nextDist) {
                nextDist = d;
                nextStep = step;
            }
        }

        if (!nextStep) {
            turnPanel.style.display = 'none';
            return;
        }

        const distLabel = nextDist < 1000
            ? `${Math.round(nextDist)}m`
            : `${(nextDist / 1000).toFixed(1)}km`;

        turnPanel.textContent = `${nextStep.instruction} in ${distLabel}`;
        turnPanel.style.display = 'block';

        // Pulse when close
        if (nextDist < 50) {
            turnPanel.classList.add('pulse');
        } else {
            turnPanel.classList.remove('pulse');
        }
    }

    // Route input event listeners
    routeBtn.addEventListener('click', () => {
        geocodeAndRoute(routeInput.value);
    });
    routeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') geocodeAndRoute(routeInput.value);
    });
    routeClearBtn.addEventListener('click', () => {
        clearRoute();
        routeInput.value = '';
    });

    // ─── Animation loop ───────────────────────────────────────────────────────
    let clock = new THREE.Clock();
    let _lastAnimTime = 0;
    const TILE_FADE_DURATION = 1000; // ms

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();   // seconds since last frame
        const t = clock.elapsedTime;      // total elapsed (updated by getDelta)
        const nowMs = performance.now();

        // ── Tile fade-in animation ─────────────────────────────────────────────
        for (const [key, entry] of tileCache.entries()) {
            if (entry.fadeComplete || !entry.points || !entry.origColors) continue;
            const elapsed = nowMs - entry.loadStartTime;
            const lerpT = Math.min(elapsed / TILE_FADE_DURATION, 1.0);
            const colorAttr = entry.points.geometry.getAttribute('color');
            const arr = colorAttr.array;
            const src = entry.origColors;
            const len = arr.length;
            for (let j = 0; j < len; j++) {
                arr[j] = src[j] * lerpT;
            }
            colorAttr.needsUpdate = true;
            if (lerpT >= 1.0) {
                entry.fadeComplete = true;
                // If route is active, re-apply focus mode at full brightness
                if (routeState.active && routeState.waypoints.length > 0) {
                    applyFocusModeTile(key);
                }
            }
        }

        // ── Aircraft interpolation ─────────────────────────────────────────────
        if (aircraftData.size > 0) {
            updateAircraftInterpolation(nowMs);
        }

        // ── Wind particles ─────────────────────────────────────────────────────
        updateWindParticles(delta);

        // GPS ring pulse: scale 1.0 -> 1.5 -> 1.0, period 2s
        if (gpsRing.visible) {
            const pulse = 1.0 + 0.25 * (1 - Math.cos(Math.PI * t));
            gpsRing.scale.set(pulse, pulse, pulse);
        }

        // Destination ring pulse (same style, period 2.5s, offset phase)
        if (destRing) {
            const pulse = 1.0 + 0.3 * (1 - Math.cos(0.8 * Math.PI * t + 1));
            destRing.scale.set(pulse, pulse, pulse);
        }

        // Destination beacon opacity flicker
        if (destBeacon) {
            destBeacon.material.opacity = 0.4 + 0.3 * Math.sin(t * 2);
        }

        // Update GPS dot position if we have a position
        if (smoothLat !== null && worldOriginLat !== null) {
            const wp = latLonToWorld(smoothLat, smoothLon);
            updateGPSIndicator(wp.x, wp.z);

            if (cameraMode === 'birdseye' && followGPS) {
                camTarget.set(wp.x, 0, wp.z);
            }

            // Update turn instructions
            updateTurnPanel();
        }

        if (cameraMode === 'birdseye') {
            // Bird's eye: standard ortho camera update
            updateCameraPosition();
        } else if (cameraMode === 'followme') {
            // Follow-me: update perspective camera with lerp
            const { targetPos, targetLookAt } = computeFollowCamTarget();

            if (camTransition !== null) {
                // Animated transition from bird's eye to follow-me
                camTransition.elapsed += delta;
                const rawT = Math.min(camTransition.elapsed / CAM_TRANSITION_DURATION, 1.0);
                // Smooth ease: smoothstep
                const tt = rawT * rawT * (3 - 2 * rawT);

                followCamPos.lerpVectors(camTransition.startPos, camTransition.endPos, tt);
                followCamTarget.lerpVectors(camTransition.startTarget, camTransition.endTarget, tt);

                if (rawT >= 1.0) {
                    camTransition = null; // transition done
                }
            } else {
                // Steady-state follow: smooth lerp each frame (alpha 0.05)
                const LERP_ALPHA = 0.05;
                followCamPos.lerp(targetPos, LERP_ALPHA);
                followCamTarget.lerp(targetLookAt, LERP_ALPHA);
            }

            followCam.position.copy(followCamPos);
            followCam.lookAt(followCamTarget);
            followCamInitialized = true;
        } else if (cameraMode === 'anchor') {
            // Anchor mode: OrbitControls around a fixed/GPS target
            if (anchorEntryTransition !== null) {
                // Play entry animation (smoothstep over 1.5s), controls disabled during this
                anchorEntryTransition.elapsed += delta;
                const rawT = Math.min(anchorEntryTransition.elapsed / CAM_TRANSITION_DURATION, 1.0);
                const tt = rawT * rawT * (3 - 2 * rawT);
                anchorCam.position.lerpVectors(anchorEntryTransition.startPos, anchorEntryTransition.endPos, tt);
                const tgt = new THREE.Vector3().lerpVectors(anchorEntryTransition.startTarget, anchorEntryTransition.endTarget, tt);
                anchorControls.target.copy(tgt);
                anchorCam.lookAt(tgt);
                if (rawT >= 1.0) {
                    anchorEntryTransition = null;
                    anchorControls.enabled = true;
                    // Sync OrbitControls internal state with current camera position
                    anchorControls.update();
                }
            } else {
                if (anchorSubMode === 'me' && smoothLat !== null && worldOriginLat !== null) {
                    // Lerp the anchor target toward current GPS position
                    const wp = latLonToWorld(smoothLat, smoothLon);
                    const desiredTarget = new THREE.Vector3(wp.x, 0, wp.z);
                    anchorTargetCurrent.lerp(desiredTarget, 0.03);
                    anchorControls.target.copy(anchorTargetCurrent);
                }
                anchorControls.update();
            }
        }

        // ── Main render ────────────────────────────────────────────────────────
        // Restore full viewport for the composer pass
        renderer.setScissorTest(false);
        renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
        composer.render();

        // ── Minimap render (follow-me and anchor mode, after composer) ─────────
        if ((cameraMode === 'followme' || cameraMode === 'anchor') && smoothLat !== null && worldOriginLat !== null) {
            const wp = latLonToWorld(smoothLat, smoothLon);

            // Position minimap camera directly above GPS position
            minimapCamera.position.set(wp.x, 500, wp.z);
            minimapCamera.lookAt(wp.x, 0, wp.z);

            const MM = 160; // minimap pixel size
            const pixelRatio = renderer.getPixelRatio();
            const vpX = window.innerWidth - MM - 14;
            const vpY = 14; // 14px from bottom in CSS; renderer coords are bottom-left
            // renderer viewport Y=0 is bottom of canvas
            const vpXpx = Math.round(vpX * pixelRatio);
            const vpYpx = Math.round(vpY * pixelRatio);
            const MMpx = Math.round(MM * pixelRatio);

            renderer.setScissorTest(true);
            renderer.setScissor(vpXpx, vpYpx, MMpx, MMpx);
            renderer.setViewport(vpXpx, vpYpx, MMpx, MMpx);
            renderer.render(scene, minimapCamera);
            renderer.setScissorTest(false);
        }
    }

    animate();

    // Initial HUD state
    updateCoordsHUD();
    updateTileHUD();

    </script>
</body>
</html>
