<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>citywatch // live map</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
        }
        .vt323 {
            font-family: 'DotGothic16', monospace;
            letter-spacing: 1px;
            font-size: 11px;
            line-height: 1.8;
            color: #ffffff;
            text-transform: lowercase;
        }
        #back-btn {
            position: fixed;
            top: 14px; left: 14px;
            font-size: 14px;
            text-transform: lowercase;
            text-decoration: none;
            color: rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 6px 14px;
            z-index: 20;
            transition: color 0.15s, border-color 0.15s;
            font-family: 'DotGothic16', monospace;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
        }
        #hint {
            position: fixed;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
            z-index: 20;
            font-size: 11px;
            font-family: 'DotGothic16', monospace;
            letter-spacing: 1px;
            text-transform: lowercase;
        }
        .hud-panel {
            position: fixed;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 10px;
            z-index: 20;
            white-space: pre;
            pointer-events: none;
            font-family: 'DotGothic16', monospace;
            font-size: 10px;
            line-height: 1.7;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: #ffffff;
        }
        .hud-panel span { color: #00ffff; }
        .hud-panel .warn { color: #ffaa00; }
        .hud-panel .err { color: #ff2244; }
        #coords-panel { top: 60px; left: 14px; }
        #tile-panel { top: 14px; right: 14px; }
        #gps-denied {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'DotGothic16', monospace;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #ff2244;
            border: 1px solid #ff2244;
            background: rgba(0,0,0,0.85);
            padding: 12px 20px;
            z-index: 30;
            display: none;
        }

        /* ── Routing input panel ── */
        #route-panel {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.22);
            padding: 7px 10px;
            pointer-events: all;
        }
        #route-input {
            font-family: 'DotGothic16', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: lowercase;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            width: 200px;
            caret-color: #00ffff;
        }
        #route-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        #route-btn, #route-clear-btn {
            font-family: 'DotGothic16', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: lowercase;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff;
            padding: 2px 8px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        #route-btn:hover { border-color: #00ffff; color: #00ffff; }
        #route-clear-btn {
            border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.4);
            display: none;
            padding: 2px 6px;
        }
        #route-clear-btn:hover { border-color: #ff2244; color: #ff2244; }
        #route-status {
            font-family: 'DotGothic16', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.4);
            min-width: 80px;
            text-align: right;
        }

        /* ── Camera mode switcher ── */
        #cam-mode-panel {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            flex-direction: column;
            gap: 0;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.22);
            pointer-events: all;
        }
        #cam-btn-row {
            display: flex;
            align-items: center;
        }
        .cam-mode-btn {
            font-family: 'DotGothic16', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: lowercase;
            background: transparent;
            border: none;
            border-right: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 6px 14px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .cam-mode-btn:last-child { border-right: none; }
        .cam-mode-btn:hover { color: rgba(255,255,255,0.85); }
        .cam-mode-btn.active { color: #00ffff; }

        /* ── Anchor sub-buttons ── */
        #anchor-sub-row {
            display: none;
            justify-content: center;
            gap: 0;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .anchor-sub-btn {
            font-family: 'DotGothic16', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: lowercase;
            background: transparent;
            border: none;
            border-right: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.4);
            padding: 2px 8px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .anchor-sub-btn:last-child { border-right: none; }
        .anchor-sub-btn:hover { color: rgba(255,255,255,0.85); }
        .anchor-sub-btn.active { color: #00ffff; }
        .anchor-sub-btn:disabled { color: rgba(255,255,255,0.2); cursor: default; }

        /* ── Minimap ── */
        #minimap-container {
            position: fixed;
            bottom: 14px;
            right: 14px;
            width: 160px;
            height: 160px;
            z-index: 25;
            border: 1px solid rgba(255,255,255,0.4);
            display: none;
            pointer-events: none;
        }
        #minimap-label {
            position: absolute;
            top: 4px;
            left: 6px;
            font-family: 'DotGothic16', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.55);
            pointer-events: none;
            z-index: 1;
        }

        /* ── Turn-by-turn panel ── */
        #turn-panel {
            position: fixed;
            bottom: 82px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            background: rgba(0,0,0,0.82);
            border: 1px solid rgba(255,255,255,0.22);
            padding: 8px 14px;
            pointer-events: none;
            font-family: 'DotGothic16', monospace;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: #ffffff;
            white-space: nowrap;
            display: none;
        }
        #turn-panel.pulse {
            animation: turnPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes turnPulse {
            from { opacity: 1; }
            to   { opacity: 0.35; }
        }
    </style>
</head>
<body>
    <a id="back-btn" href="index.html">← back</a>
    <div id="hint" class="vt323">pan // drag &nbsp;&nbsp; zoom // scroll</div>
    <div id="coords-panel" class="hud-panel"></div>
    <div id="tile-panel" class="hud-panel"></div>
    <div id="gps-denied">gps_denied // enable location</div>

    <!-- Camera mode switcher -->
    <div id="cam-mode-panel">
        <div id="cam-btn-row">
            <button class="cam-mode-btn active" id="btn-birdseye">bird's eye</button>
            <button class="cam-mode-btn" id="btn-followme">follow me</button>
            <button class="cam-mode-btn" id="btn-anchor">anchor</button>
        </div>
        <div id="anchor-sub-row">
            <button class="anchor-sub-btn active" id="btn-anchor-me">me</button>
            <button class="anchor-sub-btn" id="btn-anchor-dest" disabled>dest</button>
        </div>
    </div>

    <!-- Minimap (bottom-right, follow-me mode only) -->
    <div id="minimap-container">
        <span id="minimap-label">minimap</span>
    </div>

    <!-- Turn-by-turn instruction (shows above route input when route active) -->
    <div id="turn-panel"></div>

    <!-- Route input panel -->
    <div id="route-panel">
        <input id="route-input" type="text" placeholder="destination..." autocomplete="off" spellcheck="false" />
        <button id="route-btn">route</button>
        <button id="route-clear-btn" title="clear route">×</button>
        <span id="route-status"></span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
    'use strict';

    // ─── Config ───────────────────────────────────────────────────────────────
    const ZOOM = 16;
    const OVERPASS_URL = 'https://overpass-api.de/api/interpreter';
    const FALLBACK_LAT = 56.9496;
    const FALLBACK_LON = 24.1052;
    const SMOOTH_ALPHA = 0.2; // exponential smoothing: 0.8 * old + 0.2 * new

    // ─── Time-of-day color temperature ───────────────────────────────────────
    // Local hour = UTC + 2 (Riga EET approximation)
    function getTimeOfDayMultiplier() {
        const utcHour = new Date().getUTCHours();
        const localHour = (utcHour + 2) % 24;
        if (localHour >= 22 || localHour < 5)  return [1.00, 1.00, 1.00]; // night
        if (localHour >= 5  && localHour < 8)  return [1.10, 1.00, 0.85]; // dawn
        if (localHour >= 8  && localHour < 18) return [0.90, 1.00, 1.05]; // day
        /* dusk 18-22 */                        return [1.15, 0.95, 0.75];
    }

    // ─── Tile Math ────────────────────────────────────────────────────────────
    function latLonToTile(lat, lon, z) {
        const n = Math.pow(2, z);
        const x = Math.floor((lon + 180) / 360 * n);
        const latRad = lat * Math.PI / 180;
        const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
        return { x, y };
    }

    function tileToBbox(z, x, y) {
        const n = Math.pow(2, z);
        const west = x / n * 360 - 180;
        const east = (x + 1) / n * 360 - 180;
        const north = Math.atan(Math.sinh(Math.PI * (1 - 2 * y / n))) * 180 / Math.PI;
        const south = Math.atan(Math.sinh(Math.PI * (1 - 2 * (y + 1) / n))) * 180 / Math.PI;
        return { south, west, north, east };
    }

    function tileCenter(z, x, y) {
        const bbox = tileToBbox(z, x, y);
        return {
            lat: (bbox.south + bbox.north) / 2,
            lon: (bbox.west + bbox.east) / 2,
        };
    }

    // Tile width in meters at a given latitude (for zoom 16)
    function tileWidthMeters(lat) {
        const n = Math.pow(2, ZOOM);
        const DEG_TO_RAD = Math.PI / 180;
        const METERS_PER_DEG = 111320;
        const lonPerTile = 360 / n;
        return lonPerTile * Math.cos(lat * DEG_TO_RAD) * METERS_PER_DEG;
    }

    // ─── Mercator projection (meters from world origin) ───────────────────────
    // World origin is set once (center of first tile loaded).
    // All Three.js positions are in meters from this origin.
    const DEG_TO_RAD = Math.PI / 180;
    const METERS_PER_DEG_LAT = 111320;

    let worldOriginLat = null;
    let worldOriginLon = null;
    let worldOriginFromFallback = false;

    function setWorldOrigin(lat, lon, fromFallback = false) {
        worldOriginLat = lat;
        worldOriginLon = lon;
        worldOriginFromFallback = fromFallback;
    }

    function latLonToWorld(lat, lon) {
        // Equirectangular relative to world origin
        const x = (lon - worldOriginLon) * Math.cos(worldOriginLat * DEG_TO_RAD) * METERS_PER_DEG_LAT;
        const z = -(lat - worldOriginLat) * METERS_PER_DEG_LAT; // negative: north is -z in Three.js top-down
        return { x, z };
    }

    // ─── Scene setup ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x050810, 0.004);

    // Orthographic camera, top-down
    const frustumSize = 400; // meters across initially
    const aspect = window.innerWidth / window.innerHeight;
    const camera = new THREE.OrthographicCamera(
        -frustumSize * aspect / 2,
         frustumSize * aspect / 2,
         frustumSize / 2,
        -frustumSize / 2,
        0.1, 5000
    );
    camera.position.set(0, 500, 0);
    camera.lookAt(0, 0, 0);
    camera.up.set(0, 0, -1); // north is up on screen

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 2.5;
    document.body.appendChild(renderer.domElement);

    // ─── Post-processing (bloom) ──────────────────────────────────────────────
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.6, // strength -- reduced, bird's eye doesn't need heavy bloom
        0.3, // radius
        0.0  // threshold -- lower so dim points still glow
    );
    composer.addPass(bloomPass);

    // ─── Follow-me (perspective) camera ──────────────────────────────────────
    const followCam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    followCam.position.set(0, 25, 40);
    followCam.lookAt(0, 0, -20);

    // ─── Anchor (perspective) camera + OrbitControls ──────────────────────────
    const anchorCam = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    anchorCam.position.set(0, 80 * Math.sin(Math.PI / 4), 80 * Math.cos(Math.PI / 4));
    anchorCam.lookAt(0, 0, 0);

    const anchorControls = new THREE.OrbitControls(anchorCam, renderer.domElement);
    anchorControls.enablePan = false;
    anchorControls.enableDamping = true;
    anchorControls.dampingFactor = 0.08;
    anchorControls.minDistance = 20;
    anchorControls.maxDistance = 500;
    anchorControls.enabled = false; // only enabled in anchor mode

    // Anchor mode state
    let anchorSubMode = 'me'; // 'me' or 'dest'
    let anchorTargetCurrent = new THREE.Vector3(0, 0, 0); // lerped target for anchorControls
    let anchorEntryTransition = null; // {startPos, startTarget, endPos, endTarget, elapsed} for entry anim

    // Smooth follow-me camera state (lerp targets)
    const followCamPos = new THREE.Vector3();   // current lerped position
    const followCamTarget = new THREE.Vector3(); // current lerped look-at point
    let followCamInitialized = false;

    // ─── Minimap orthographic camera ─────────────────────────────────────────
    const minimapSize = 200; // frustum half-size in meters
    const minimapCamera = new THREE.OrthographicCamera(
        -minimapSize, minimapSize,
         minimapSize, -minimapSize,
        0.1, 2000
    );
    minimapCamera.position.set(0, 500, 0);
    minimapCamera.lookAt(0, 0, 0);
    minimapCamera.up.set(0, 0, -1); // north up

    // ─── Camera mode state ────────────────────────────────────────────────────
    // 'birdseye' | 'followme' | 'anchor'
    let cameraMode = 'birdseye';

    // Transition state: animate from bird's eye to follow-me over 1.5s
    const CAM_TRANSITION_DURATION = 1.5;
    let camTransition = null; // null when not animating
    // camTransition = { startPos, startTarget, endPos, endTarget, elapsed }

    const minimapContainer = document.getElementById('minimap-container');
    const btnBirdseye = document.getElementById('btn-birdseye');
    const btnFollowme = document.getElementById('btn-followme');
    const btnAnchor = document.getElementById('btn-anchor');
    const anchorSubRow = document.getElementById('anchor-sub-row');
    const btnAnchorMe = document.getElementById('btn-anchor-me');
    const btnAnchorDest = document.getElementById('btn-anchor-dest');

    // Helper to update point material size/attenuation on all cached tiles
    function updateTileMaterials(usePerspective) {
        for (const entry of tileCache.values()) {
            if (!entry.points) continue;
            const m = entry.points.material;
            if (usePerspective) {
                m.size = 1.5;
                m.sizeAttenuation = true;
            } else {
                m.size = 1.2;
                m.sizeAttenuation = false;
            }
            m.needsUpdate = true;
        }
    }

    function setCameraMode(mode) {
        if (mode === cameraMode) return;
        const prev = cameraMode;
        cameraMode = mode;

        btnBirdseye.classList.toggle('active', mode === 'birdseye');
        btnFollowme.classList.toggle('active', mode === 'followme');
        btnAnchor.classList.toggle('active', mode === 'anchor');

        // Anchor sub-row visibility
        anchorSubRow.style.display = mode === 'anchor' ? 'flex' : 'none';

        // Disable orbit controls initially; re-enable after entry animation completes
        anchorControls.enabled = false;

        if (mode === 'followme') {
            minimapContainer.style.display = 'block';
            document.getElementById('hint').textContent = 'follow-me mode';

            // Disable anchor controls (already done above)
            updateTileMaterials(true);

            // Kick off transition from current ortho camera position
            const startPos = new THREE.Vector3(camTarget.x, 25, camTarget.z + 40);
            const startTarget = new THREE.Vector3(camTarget.x, 0, camTarget.z - 20);

            // Compute desired follow-me end position based on current GPS
            const { targetPos, targetLookAt } = computeFollowCamTarget();

            if (!followCamInitialized) {
                followCamPos.copy(startPos);
                followCamTarget.copy(startTarget);
                followCamInitialized = true;
            }

            camTransition = {
                startPos: followCamPos.clone(),
                startTarget: followCamTarget.clone(),
                endPos: targetPos,
                endTarget: targetLookAt,
                elapsed: 0,
            };

            composer.passes[0].camera = followCam;

        } else if (mode === 'anchor') {
            minimapContainer.style.display = 'block';
            document.getElementById('hint').textContent = 'anchor mode // drag to orbit';
            updateTileMaterials(true);

            // Determine anchor target position
            let anchorWorldPos;
            if (anchorSubMode === 'dest' && routeState.active && routeState.destLat !== null && worldOriginLat !== null) {
                const dw = latLonToWorld(routeState.destLat, routeState.destLon);
                anchorWorldPos = new THREE.Vector3(dw.x, 0, dw.z);
            } else {
                // Default to GPS position
                if (smoothLat !== null && worldOriginLat !== null) {
                    const wp = latLonToWorld(smoothLat, smoothLon);
                    anchorWorldPos = new THREE.Vector3(wp.x, 0, wp.z);
                } else {
                    anchorWorldPos = new THREE.Vector3(0, 0, 0);
                }
            }

            anchorTargetCurrent.copy(anchorWorldPos);
            anchorControls.target.copy(anchorWorldPos);

            // Position camera 80m from target at 45° elevation
            const dist = 80;
            const elevAngle = Math.PI / 4; // 45°
            const azimuth = 0; // facing south initially
            const startCamPos = prev === 'birdseye'
                ? new THREE.Vector3(camTarget.x, 500, camTarget.z) // from ortho cam pos
                : anchorCam.position.clone();

            const endCamPos = new THREE.Vector3(
                anchorWorldPos.x + dist * Math.cos(elevAngle) * Math.sin(azimuth),
                dist * Math.sin(elevAngle),
                anchorWorldPos.z + dist * Math.cos(elevAngle) * Math.cos(azimuth)
            );

            anchorCam.position.copy(startCamPos);
            anchorCam.lookAt(anchorWorldPos);

            anchorEntryTransition = {
                startPos: startCamPos.clone(),
                startTarget: anchorWorldPos.clone(),
                endPos: endCamPos,
                endTarget: anchorWorldPos.clone(),
                elapsed: 0,
            };

            composer.passes[0].camera = anchorCam;

        } else {
            // Back to bird's eye
            minimapContainer.style.display = 'none';
            document.getElementById('hint').textContent = "pan // drag \u00a0\u00a0 zoom // scroll";
            camTransition = null;
            anchorEntryTransition = null;
            updateTileMaterials(false);
            composer.passes[0].camera = camera;
            followGPS = true;
        }
    }

    function setAnchorSubMode(subMode) {
        anchorSubMode = subMode;
        btnAnchorMe.classList.toggle('active', subMode === 'me');
        btnAnchorDest.classList.toggle('active', subMode === 'dest');

        if (cameraMode !== 'anchor') return;

        // Reposition anchor target
        let anchorWorldPos;
        if (subMode === 'dest' && routeState.active && routeState.destLat !== null && worldOriginLat !== null) {
            const dw = latLonToWorld(routeState.destLat, routeState.destLon);
            anchorWorldPos = new THREE.Vector3(dw.x, 0, dw.z);
        } else {
            if (smoothLat !== null && worldOriginLat !== null) {
                const wp = latLonToWorld(smoothLat, smoothLon);
                anchorWorldPos = new THREE.Vector3(wp.x, 0, wp.z);
            } else {
                anchorWorldPos = new THREE.Vector3(0, 0, 0);
            }
        }
        anchorTargetCurrent.copy(anchorWorldPos);
        anchorControls.target.copy(anchorWorldPos);
    }

    btnBirdseye.addEventListener('click', () => setCameraMode('birdseye'));
    btnFollowme.addEventListener('click', () => setCameraMode('followme'));
    btnAnchor.addEventListener('click', () => setCameraMode('anchor'));
    btnAnchorMe.addEventListener('click', () => setAnchorSubMode('me'));
    btnAnchorDest.addEventListener('click', () => {
        if (!btnAnchorDest.disabled) setAnchorSubMode('dest');
    });

    // ─── Resize handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = window.innerWidth, h = window.innerHeight;
        const a = w / h;
        const half = (frustumSize / currentZoom) / 2;
        camera.left = -half * a;
        camera.right = half * a;
        camera.top = half;
        camera.bottom = -half;
        camera.updateProjectionMatrix();
        followCam.aspect = w / h;
        followCam.updateProjectionMatrix();
        anchorCam.aspect = w / h;
        anchorCam.updateProjectionMatrix();
        renderer.setSize(w, h);
        composer.setSize(w, h);
    });

    // ─── Camera pan / zoom state ──────────────────────────────────────────────
    let currentZoom = 1.0; // multiplier: higher = more zoomed in (smaller frustum)
    let camTarget = new THREE.Vector3(0, 0, 0); // world XZ center of view
    let followGPS = true;
    let panTimer = null;

    // Pan via mouse drag
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };

    renderer.domElement.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastMouse = { x: e.clientX, y: e.clientY };
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        lastMouse = { x: e.clientX, y: e.clientY };
        panBy(dx, dy);
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // Touch pan
    let lastTouch = null;
    renderer.domElement.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        e.preventDefault();
    }, { passive: false });

    renderer.domElement.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && lastTouch) {
            const dx = e.touches[0].clientX - lastTouch.x;
            const dy = e.touches[0].clientY - lastTouch.y;
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            panBy(dx, dy);
        }
        e.preventDefault();
    }, { passive: false });

    renderer.domElement.addEventListener('touchend', () => { lastTouch = null; });

    function panBy(screenDx, screenDy) {
        // Convert screen pixels to world meters
        const a = window.innerWidth / window.innerHeight;
        const frustumW = (frustumSize / currentZoom) * a;
        const frustumH = frustumSize / currentZoom;
        const metersPerPixelX = frustumW / window.innerWidth;
        const metersPerPixelY = frustumH / window.innerHeight;

        // In top-down view: screen right = world +X, screen down = world +Z (south)
        camTarget.x -= screenDx * metersPerPixelX;
        camTarget.z -= screenDy * metersPerPixelY;

        followGPS = false;
        if (panTimer) clearTimeout(panTimer);
        panTimer = setTimeout(() => { followGPS = true; }, 5000);
    }

    // Scroll wheel zoom
    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        currentZoom = Math.max(0.2, Math.min(10, currentZoom * delta));
        updateCameraFrustum();
    }, { passive: false });

    function updateCameraFrustum() {
        const a = window.innerWidth / window.innerHeight;
        const half = (frustumSize / currentZoom) / 2;
        camera.left = -half * a;
        camera.right = half * a;
        camera.top = half;
        camera.bottom = -half;
        camera.updateProjectionMatrix();
    }

    function updateCameraPosition() {
        camera.position.set(camTarget.x, 500, camTarget.z);
        camera.lookAt(camTarget.x, 0, camTarget.z);
    }

    // ─── GPS state ────────────────────────────────────────────────────────────
    let smoothLat = null;
    let smoothLon = null;
    let gpsAccuracy = null;
    let gpsError = null;

    // ─── GPS position history (for direction of travel) ───────────────────────
    // Ring buffer of recent world-space positions, max 10 entries
    const GPS_HISTORY_MAX = 10;
    const gpsHistory = []; // [{x, z, time}]
    // Last known heading (unit vector {x, z}) -- persisted when speed < 0.3 m/s
    let lastHeadingX = 0;
    let lastHeadingZ = -1; // default: facing north (-Z is north in Three.js)

    function pushGPSHistory(worldX, worldZ) {
        gpsHistory.push({ x: worldX, z: worldZ, time: performance.now() });
        if (gpsHistory.length > GPS_HISTORY_MAX) gpsHistory.shift();
        // Recompute heading from oldest to newest with speed gate
        if (gpsHistory.length >= 2) {
            const oldest = gpsHistory[0];
            const newest = gpsHistory[gpsHistory.length - 1];
            const dx = newest.x - oldest.x;
            const dz = newest.z - oldest.z;
            const dt = (newest.time - oldest.time) / 1000; // seconds
            const dist = Math.sqrt(dx * dx + dz * dz);
            const speed = dt > 0 ? dist / dt : 0; // m/s
            if (speed >= 0.3 && dist > 0.01) {
                lastHeadingX = dx / dist;
                lastHeadingZ = dz / dist;
            }
            // If speed < 0.3 m/s, keep lastHeadingX/Z unchanged
        }
    }

    // Returns {targetPos: Vector3, targetLookAt: Vector3} for the follow-me camera
    // based on current GPS position and heading.
    function computeFollowCamTarget() {
        if (smoothLat === null || worldOriginLat === null) {
            // No GPS yet -- use origin with default heading
            const targetPos = new THREE.Vector3(0 - lastHeadingX * 40, 25, 0 - lastHeadingZ * 40);
            const targetLookAt = new THREE.Vector3(lastHeadingX * 20, 0, lastHeadingZ * 20);
            return { targetPos, targetLookAt };
        }
        const wp = latLonToWorld(smoothLat, smoothLon);
        // Camera position: 40m behind user (opposite to heading), 25m above
        const targetPos = new THREE.Vector3(
            wp.x - lastHeadingX * 40,
            25,
            wp.z - lastHeadingZ * 40
        );
        // Look-at point: 20m ahead of user along heading, at ground level
        const targetLookAt = new THREE.Vector3(
            wp.x + lastHeadingX * 20,
            0,
            wp.z + lastHeadingZ * 20
        );
        return { targetPos, targetLookAt };
    }

    // ─── GPS dot + ring ───────────────────────────────────────────────────────
    // Single white point (no attenuation)
    const gpsDotGeo = new THREE.BufferGeometry();
    gpsDotGeo.setAttribute('position', new THREE.Float32BufferAttribute([0, 1, 0], 3));
    const gpsDotMat = new THREE.PointsMaterial({ color: 0xffffff, size: 8, sizeAttenuation: false });
    const gpsDot = new THREE.Points(gpsDotGeo, gpsDotMat);
    gpsDot.visible = false;
    scene.add(gpsDot);

    // Ring (circle, radius 2, 32 segments)
    const ringSegments = 32;
    const ringGeoPositions = [];
    for (let i = 0; i <= ringSegments; i++) {
        const angle = (i / ringSegments) * Math.PI * 2;
        ringGeoPositions.push(Math.cos(angle) * 2, 1, Math.sin(angle) * 2);
    }
    const ringGeo = new THREE.BufferGeometry();
    ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringGeoPositions, 3));
    const ringMat = new THREE.LineBasicMaterial({ color: 0x00ffff });
    const gpsRing = new THREE.Line(ringGeo, ringMat);
    gpsRing.visible = false;
    scene.add(gpsRing);

    function updateGPSIndicator(worldX, worldZ) {
        gpsDot.position.set(worldX, 1, worldZ);
        gpsRing.position.set(worldX, 1, worldZ);
        gpsDot.visible = true;
        gpsRing.visible = true;
    }

    // ─── Tile cache + manager ─────────────────────────────────────────────────
    // Cache: key "z/x/y" -> { points: THREE.Points, loading: bool, error: bool }
    const tileCache = new Map();
    const loadingSet = new Set(); // keys currently being fetched
    let currentTileKeys = new Set(); // the 4 tiles currently desired

    // Returns the 2x2 grid of tile coords around a lat/lon.
    // Strategy: determine which quadrant of the current tile the user is in,
    // then pick the 4 tiles that surround that quadrant corner.
    function get2x2Tiles(lat, lon) {
        const center = latLonToTile(lat, lon, ZOOM);
        const bbox = tileToBbox(ZOOM, center.x, center.y);
        const midLat = (bbox.south + bbox.north) / 2;
        const midLon = (bbox.west + bbox.east) / 2;

        // Determine offset based on which half of the tile we're in
        const dx = lon >= midLon ? 0 : -1;  // right half: include tile to right; left half: include tile to left
        const dy = lat < midLat ? 0 : -1;   // south half: include tile below; north half: include tile above
        // (y increases southward in slippy map: lower lat = higher y)

        const tiles = [];
        for (let oy = 0; oy <= 1; oy++) {
            for (let ox = 0; ox <= 1; ox++) {
                tiles.push({ x: center.x + dx + ox, y: center.y + dy + oy });
            }
        }
        return tiles;
    }

    async function loadTile(z, x, y) {
        const key = `${z}/${x}/${y}`;
        if (tileCache.has(key) || loadingSet.has(key)) return;
        loadingSet.add(key);

        // Set world origin from first tile loaded
        if (worldOriginLat === null) {
            const c = tileCenter(z, x, y);
            setWorldOrigin(c.lat, c.lon, worldOriginFromFallback);
        }

        updateTileHUD();

        try {
            // ── Fetch OSM data from Overpass ────────────────────────────────
            const bbox = tileToBbox(z, x, y);
            const query = `[out:json][timeout:25];(way["building"](${bbox.south},${bbox.west},${bbox.north},${bbox.east}););out body;>;out skel qt;`;
            const overpassRes = await fetch(OVERPASS_URL, {
                method: 'POST',
                body: `data=${encodeURIComponent(query)}`,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            });
            if (!overpassRes.ok) throw new Error(`Overpass HTTP ${overpassRes.status}`);
            const osmData = await overpassRes.json();

            // ── Parse nodes ─────────────────────────────────────────────────
            const nodes = {};
            for (const el of osmData.elements) {
                if (el.type === 'node') nodes[el.id] = { lat: el.lat, lon: el.lon };
            }

            // ── Process buildings → points ──────────────────────────────────
            const tileC = tileCenter(z, x, y);
            const tileWorldOffset = latLonToWorld(tileC.lat, tileC.lon);
            const METERS_PER_DEG_LAT = 111320;
            const METERS_PER_DEG_LON = Math.cos(tileC.lat * Math.PI / 180) * 111320;
            const MAX_HEIGHT = 40;
            const DENSITY = 6; // points per m²

            const posArr = [], colArr = [];

            const todMult = getTimeOfDayMultiplier();

            function heightColor(t, worldY) {
                const j = (Math.random() - 0.5) * 0.1;
                let r, g, b;
                // Brighter floor: start at 0.4 teal, go to full cyan
                if (t < 0.5) { const s = t * 2; r = 0; g = 0.4 + s * 0.6; b = 0.4 + s * 0.6; }
                else { const s = (t - 0.5) * 2; r = s * 0.7; g = 1.0; b = 1.0; }
                // Apply time-of-day shift
                r = r * todMult[0];
                g = g * todMult[1];
                b = b * todMult[2];
                // Height-based opacity: ground points (y < 1) get multiplied by 0.45
                const opacityMult = (worldY < 1) ? 0.45 : 1.0;
                r = r * opacityMult;
                g = g * opacityMult;
                b = b * opacityMult;
                return [Math.max(0,Math.min(1,r+j)), Math.max(0,Math.min(1,g+j)), Math.max(0,Math.min(1,b+j))];
            }

            function getHeight(tags) {
                if (tags.height) return parseFloat(tags.height) || 8;
                if (tags['building:levels']) return parseFloat(tags['building:levels']) * 3.5;
                const t = tags.building || '';
                if (t === 'residential') return 10;
                if (t === 'commercial' || t === 'retail') return 15;
                if (t === 'industrial' || t === 'warehouse') return 8;
                if (t === 'church' || t === 'cathedral') return 20;
                return 8;
            }

            function sampleFace(ax, ay, az, bx, by, bz, cx, cy, cz, count, h) {
                for (let i = 0; i < count; i++) {
                    const s = Math.random(), tt = Math.random();
                    const px = ax + s * bx + tt * cx;
                    const py = ay + s * by + tt * cy;
                    const pz = az + s * bz + tt * cz;
                    const [r, g, b] = heightColor(Math.max(0, py / MAX_HEIGHT), py);
                    posArr.push(px, py, pz);
                    colArr.push(r, g, b);
                }
            }

            for (const el of osmData.elements) {
                if (el.type !== 'way' || !el.tags || !el.tags.building) continue;
                const nodeIds = el.nodes;
                if (!nodeIds || nodeIds.length < 3) continue;

                // Convert footprint to local meters relative to tileWorldOffset
                const footprint = [];
                for (const nid of nodeIds) {
                    const nd = nodes[nid];
                    if (!nd) continue;
                    const ex = (nd.lon - tileC.lon) * METERS_PER_DEG_LON;
                    const ey = (nd.lat - tileC.lat) * METERS_PER_DEG_LAT;
                    footprint.push({ x: ex, y: ey });
                }
                if (footprint.length < 3) continue;

                const h = getHeight(el.tags);
                const wx = tileWorldOffset.x;
                const wz = tileWorldOffset.z;

                // Sample roof and walls
                // Roof: random points inside polygon (bounding box sample)
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const p of footprint) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); }
                const area = (maxX - minX) * (maxY - minY);
                const roofCount = Math.max(4, Math.floor(area * DENSITY * 0.5));
                for (let i = 0; i < roofCount; i++) {
                    const rx = minX + Math.random() * (maxX - minX);
                    const ry = minY + Math.random() * (maxY - minY);
                    const [r, g, b] = heightColor(h / MAX_HEIGHT, h);
                    posArr.push(wx + rx, h, wz - ry);
                    colArr.push(r, g, b);
                }

                // Walls: sample along each edge
                for (let i = 0; i < footprint.length - 1; i++) {
                    const p0 = footprint[i], p1 = footprint[i + 1];
                    const edgeLen = Math.hypot(p1.x - p0.x, p1.y - p0.y);
                    const wallCount = Math.max(2, Math.floor(edgeLen * h * DENSITY * 0.4));
                    for (let j = 0; j < wallCount; j++) {
                        const t = Math.random();
                        const wallH = Math.random() * h;
                        const wx2 = p0.x + t * (p1.x - p0.x);
                        const wy2 = p0.y + t * (p1.y - p0.y);
                        const [r, g, b] = heightColor(wallH / MAX_HEIGHT, wallH);
                        posArr.push(wx + wx2, wallH, wz - wy2);
                        colArr.push(r, g, b);
                    }

                    // Edge emphasis: wall top strip (y = h-0.3 to h), 3x density, brighter
                    const topStripCount = Math.max(2, Math.floor(edgeLen * DENSITY * 1.2));
                    for (let j = 0; j < topStripCount; j++) {
                        const t = Math.random();
                        const wallH = (h - 0.3) + Math.random() * 0.3;
                        const wx2 = p0.x + t * (p1.x - p0.x);
                        const wy2 = p0.y + t * (p1.y - p0.y);
                        const [r, g, b] = heightColor(wallH / MAX_HEIGHT, wallH);
                        posArr.push(wx + wx2, wallH, wz - wy2);
                        colArr.push(Math.min(1, r * 1.4), Math.min(1, g * 1.4), Math.min(1, b * 1.4));
                    }

                    // Edge emphasis: wall base strip (y = 0 to 0.5), 2x density, dimmer
                    const baseStripCount = Math.max(2, Math.floor(edgeLen * DENSITY * 0.8));
                    for (let j = 0; j < baseStripCount; j++) {
                        const t = Math.random();
                        const wallH = Math.random() * 0.5;
                        const wx2 = p0.x + t * (p1.x - p0.x);
                        const wy2 = p0.y + t * (p1.y - p0.y);
                        const [r, g, b] = heightColor(0, wallH);
                        posArr.push(wx + wx2, wallH, wz - wy2);
                        colArr.push(r * 0.7, g * 0.7, b * 0.7);
                    }
                }

                // Edge emphasis: roof perimeter at height h, 3x density, brighter
                for (let i = 0; i < footprint.length - 1; i++) {
                    const p0 = footprint[i], p1 = footprint[i + 1];
                    const edgeLen = Math.hypot(p1.x - p0.x, p1.y - p0.y);
                    const perimCount = Math.max(3, Math.floor(edgeLen * DENSITY * 1.5));
                    for (let j = 0; j < perimCount; j++) {
                        const t = j / (perimCount - 1);
                        const px = p0.x + t * (p1.x - p0.x);
                        const py = p0.y + t * (p1.y - p0.y);
                        const [r, g, b] = heightColor(h / MAX_HEIGHT, h);
                        posArr.push(wx + px, h, wz - py);
                        colArr.push(Math.min(1, r * 1.4), Math.min(1, g * 1.4), Math.min(1, b * 1.4));
                    }
                }
            }

            // ── Fetch roads for this tile and append to posArr/colArr ────────
            try {
                const roadQuery = `[out:json][timeout:20];(way["highway"~"^(primary|secondary|tertiary|residential|service|footway|pedestrian|path)$"](${bbox.south},${bbox.west},${bbox.north},${bbox.east}););out body;>;out skel qt;`;
                const roadRes = await fetch(OVERPASS_URL, {
                    method: 'POST',
                    body: `data=${encodeURIComponent(roadQuery)}`,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                });
                if (roadRes.ok) {
                    const roadData = await roadRes.json();
                    // Build node lookup for road data
                    const roadNodes = {};
                    for (const el of roadData.elements) {
                        if (el.type === 'node') roadNodes[el.id] = { lat: el.lat, lon: el.lon };
                    }

                    for (const el of roadData.elements) {
                        if (el.type !== 'way' || !el.tags || !el.tags.highway) continue;
                        const hwType = el.tags.highway;
                        const nodeIds = el.nodes;
                        if (!nodeIds || nodeIds.length < 2) continue;

                        // Convert node coords to local XY (same reference as buildings)
                        const roadPts = [];
                        for (const nid of nodeIds) {
                            const nd = roadNodes[nid];
                            if (!nd) continue;
                            const rx = (nd.lon - tileC.lon) * METERS_PER_DEG_LON;
                            const ry = (nd.lat - tileC.lat) * METERS_PER_DEG_LAT;
                            roadPts.push({ x: rx, y: ry });
                        }
                        if (roadPts.length < 2) continue;

                        // Determine color and strip offsets by highway type
                        let rc, gc, bc;
                        let strips;
                        if (hwType === 'primary') {
                            rc = 0.55; gc = 0.55; bc = 0.6;
                            strips = [-3, 0, 3];
                        } else if (hwType === 'secondary') {
                            rc = 0.4; gc = 0.4; bc = 0.45;
                            strips = [-3, 0, 3];
                        } else if (hwType === 'tertiary') {
                            rc = 0.4; gc = 0.4; bc = 0.45;
                            strips = [-2, 2];
                        } else if (hwType === 'residential') {
                            rc = 0.3; gc = 0.3; bc = 0.35;
                            strips = [-2, 2];
                        } else if (hwType === 'service' || hwType === 'pedestrian') {
                            rc = 0.3; gc = 0.3; bc = 0.35;
                            strips = [0];
                        } else { // footway, path
                            rc = 0.2; gc = 0.35; bc = 0.35;
                            strips = [0];
                        }

                        // Apply time-of-day to road colors
                        rc *= todMult[0]; gc *= todMult[1]; bc *= todMult[2];

                        // Sample points every 1.5m along each segment
                        for (let si = 0; si < roadPts.length - 1; si++) {
                            const rp0 = roadPts[si], rp1 = roadPts[si + 1];
                            const segDx = rp1.x - rp0.x;
                            const segDy = rp1.y - rp0.y;
                            const segLen = Math.hypot(segDx, segDy);
                            if (segLen < 0.01) continue;
                            const segUx = segDx / segLen; // unit along segment
                            const segUy = segDy / segLen;
                            // Perpendicular unit vector (rotate 90°)
                            const perpX = -segUy;
                            const perpY = segUx;

                            const numSamples = Math.max(2, Math.ceil(segLen / 1.5));
                            for (let k = 0; k <= numSamples; k++) {
                                const t = k / numSamples;
                                const basePx = rp0.x + t * segDx;
                                const basePy = rp0.y + t * segDy;
                                for (const offset of strips) {
                                    const finalX = basePx + perpX * offset;
                                    const finalY = basePy + perpY * offset;
                                    posArr.push(tileWorldOffset.x + finalX, 0.05, tileWorldOffset.z - finalY);
                                    colArr.push(rc, gc, bc);
                                }
                            }
                        }
                    }
                }
            } catch (roadErr) {
                // Road fetch failure is non-fatal -- continue with buildings only
                console.warn(`Road fetch for tile ${key} failed:`, roadErr.message);
            }

            const actualCount = posArr.length / 3;
            if (actualCount === 0) throw new Error('No buildings in tile');

            const positions = new Float32Array(posArr);
            const colors = new Float32Array(colArr);

            // Store original colors for focus mode and tile animation
            const origColors = new Float32Array(colArr);
            // Start with zero colors (tile fade-in animation)
            const animColors = new Float32Array(colors.length);
            // animColors starts at 0 -- animate toward origColors over 1s

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(animColors, 3));

            const isPerspectiveMode = (cameraMode === 'followme' || cameraMode === 'anchor');
            const mat = new THREE.PointsMaterial({
                size: isPerspectiveMode ? 1.5 : 1.2,
                sizeAttenuation: isPerspectiveMode,
                vertexColors: true,
            });

            const points = new THREE.Points(geo, mat);

            // Only add to scene if this tile is still wanted
            // (GPS may have moved to different tiles while we were loading)
            if (currentTileKeys.has(key)) {
                scene.add(points);
                tileCache.set(key, {
                    points,
                    loading: false,
                    error: false,
                    pointCount: actualCount,
                    origColors,       // full-brightness colors (base, before focus dim)
                    loadStartTime: performance.now(), // for fade-in animation
                    fadeComplete: false,
                });
                // If a route is active, apply focus mode to this new tile immediately
                if (routeState.active && routeState.waypoints.length > 0) {
                    applyFocusModeTile(key);
                }
            } else {
                // Stale tile: dispose immediately
                geo.dispose();
                mat.dispose();
            }
            loadingSet.delete(key);
            updateTileHUD();

        } catch (err) {
            console.error(`Tile ${key} failed:`, err.message);
            const isOffline = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
            tileCache.set(key, { points: null, loading: false, error: true, offline: isOffline, msg: err.message });
            loadingSet.delete(key);
            updateTileHUD();
        }
    }

    function disposeTile(key) {
        const entry = tileCache.get(key);
        if (!entry) return;
        if (entry.points) {
            entry.points.geometry.dispose();
            entry.points.material.dispose();
            scene.remove(entry.points);
        }
        tileCache.delete(key);
    }

    // Called whenever GPS position updates -- manages the 2x2 tile grid
    function updateTileManager(lat, lon) {
        const desired = get2x2Tiles(lat, lon);
        const desiredKeys = new Set(desired.map(t => `${ZOOM}/${t.x}/${t.y}`));

        // Evict tiles no longer needed (not in desired set, not loading)
        for (const key of tileCache.keys()) {
            if (!desiredKeys.has(key)) {
                disposeTile(key);
            }
        }
        // Also evict from loadingSet if no longer needed (they'll finish but won't be added)
        // (we just let them finish and then they'll be evicted on next update)

        // Load new tiles
        for (const t of desired) {
            const key = `${ZOOM}/${t.x}/${t.y}`;
            if (!tileCache.has(key) && !loadingSet.has(key)) {
                loadTile(ZOOM, t.x, t.y);
            }
        }

        currentTileKeys = desiredKeys;
        updateTileHUD();
    }

    // ─── Focus mode: dim tiles outside route corridor ─────────────────────────
    // Call when route is set or cleared. Only recalculates on route change.
    const FOCUS_CORRIDOR_M = 30;
    const FOCUS_DIM_MULT = 0.25;

    function applyFocusModeTile(key) {
        const entry = tileCache.get(key);
        if (!entry || !entry.points || !entry.origColors) return;
        if (!entry.fadeComplete) return; // let fade-in finish first
        const geo = entry.points.geometry;
        const colorAttr = geo.getAttribute('color');
        const pos = geo.getAttribute('position');
        const count = pos.count;
        const waypoints = routeState.waypoints; // [{lat, lon}]

        const posArr = pos.array;
        const colArr2 = colorAttr.array;
        const R2 = FOCUS_CORRIDOR_M * FOCUS_CORRIDOR_M;

        // Pre-compute waypoint world positions once per call
        const wpWorld = [];
        if (worldOriginLat !== null) {
            for (const wp of waypoints) {
                wpWorld.push(latLonToWorld(wp.lat, wp.lon));
            }
        }

        for (let i = 0; i < count; i++) {
            const wx = posArr[i * 3];
            const wz = posArr[i * 3 + 2];

            let inCorridor = false;
            for (const ww of wpWorld) {
                const dx = wx - ww.x;
                const dz = wz - ww.z;
                if (dx * dx + dz * dz <= R2) { inCorridor = true; break; }
            }

            const mult = inCorridor ? 1.0 : FOCUS_DIM_MULT;
            colArr2[i * 3]     = entry.origColors[i * 3]     * mult;
            colArr2[i * 3 + 1] = entry.origColors[i * 3 + 1] * mult;
            colArr2[i * 3 + 2] = entry.origColors[i * 3 + 2] * mult;
        }
        colorAttr.needsUpdate = true;
    }

    function applyFocusModeAll() {
        for (const key of tileCache.keys()) {
            applyFocusModeTile(key);
        }
    }

    function clearFocusModeAll() {
        for (const [key, entry] of tileCache.entries()) {
            if (!entry.points || !entry.origColors || !entry.fadeComplete) continue;
            const geo = entry.points.geometry;
            const colorAttr = geo.getAttribute('color');
            const arr = colorAttr.array;
            const src = entry.origColors;
            for (let j = 0; j < arr.length; j++) arr[j] = src[j];
            colorAttr.needsUpdate = true;
        }
    }

    // ─── OpenSky aircraft ─────────────────────────────────────────────────────
    // Separate THREE.Points for aircraft -- never mixed into tile geometry
    let aircraftPoints = null;
    let aircraftCount = 0;

    // Interpolation data: [{icao24, prevX, prevY, prevZ, targetX, targetY, targetZ, updateTime}]
    const aircraftData = new Map(); // icao24 -> state

    function degreesToCardinal(deg) {
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        return dirs[Math.round(deg / 45) % 8];
    }

    function buildAircraftGeometry() {
        if (!aircraftPoints) return;
        const states = [...aircraftData.values()];
        if (states.length === 0) {
            aircraftPoints.visible = false;
            return;
        }
        aircraftPoints.visible = true;

        // Each aircraft gets 7 points: center + 4 arm tips + 2 diagonal tips (cross pattern)
        const CROSS_OFFSETS = [
            [0, 0, 0],
            [3, 0, 0], [-3, 0, 0],
            [0, 0, 3], [0, 0, -3],
            [2, 0, 2], [-2, 0, -2],
        ];
        const totalPoints = states.length * CROSS_OFFSETS.length;
        const posArr = new Float32Array(totalPoints * 3);
        const colArr = new Float32Array(totalPoints * 3);

        let idx = 0;
        for (const ac of states) {
            const cx = ac.currentX, cy = ac.currentY, cz = ac.currentZ;
            for (const [dx, dy, dz] of CROSS_OFFSETS) {
                posArr[idx * 3]     = cx + dx;
                posArr[idx * 3 + 1] = cy + dy;
                posArr[idx * 3 + 2] = cz + dz;
                // Bright white-blue tint
                colArr[idx * 3]     = 0.7;
                colArr[idx * 3 + 1] = 0.85;
                colArr[idx * 3 + 2] = 1.0;
                idx++;
            }
        }

        const geo = aircraftPoints.geometry;
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));
        geo.getAttribute('position').needsUpdate = true;
    }

    function initAircraftPoints() {
        const geo = new THREE.BufferGeometry();
        // Start with an empty geometry
        geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(0), 3));
        geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(0), 3));
        const mat = new THREE.PointsMaterial({
            size: 4,
            sizeAttenuation: false,
            vertexColors: true,
        });
        aircraftPoints = new THREE.Points(geo, mat);
        aircraftPoints.visible = false;
        scene.add(aircraftPoints);
    }
    initAircraftPoints();

    async function fetchAircraft() {
        if (smoothLat === null || worldOriginLat === null) return;
        const lat = smoothLat;
        const lon = smoothLon;
        const D = 0.03;
        const url = `https://opensky-network.org/api/states/all?lamin=${lat - D}&lomin=${lon - D}&lamax=${lat + D}&lomax=${lon + D}`;
        try {
            const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
            if (res.status === 429) return; // rate limited, skip silently
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !data.states) {
                aircraftData.clear();
                aircraftCount = 0;
                buildAircraftGeometry();
                updateTileHUD();
                return;
            }

            const now = performance.now();
            const seen = new Set();

            for (const state of data.states) {
                // [icao24, callsign, origin_country, time_position, last_contact,
                //  longitude, latitude, baro_altitude, on_ground, velocity,
                //  true_track, vertical_rate, sensors, geo_altitude, squawk, spi, position_source]
                const icao24    = state[0];
                const lon2      = state[5];
                const lat2      = state[6];
                const baroAlt   = state[7];
                const onGround  = state[8];

                if (lon2 === null || lat2 === null || onGround) continue;

                const ww = latLonToWorld(lat2, lon2);
                const rawY = baroAlt !== null ? Math.min(baroAlt / 20, 150) : 80;

                if (aircraftData.has(icao24)) {
                    const ac = aircraftData.get(icao24);
                    // Store previous as interpolation source
                    ac.prevX = ac.currentX;
                    ac.prevY = ac.currentY;
                    ac.prevZ = ac.currentZ;
                    ac.targetX = ww.x;
                    ac.targetY = rawY;
                    ac.targetZ = ww.z;
                    ac.updateTime = now;
                } else {
                    aircraftData.set(icao24, {
                        prevX: ww.x, prevY: rawY, prevZ: ww.z,
                        targetX: ww.x, targetY: rawY, targetZ: ww.z,
                        currentX: ww.x, currentY: rawY, currentZ: ww.z,
                        updateTime: now,
                    });
                }
                seen.add(icao24);
            }

            // Remove aircraft no longer in response
            for (const icao of aircraftData.keys()) {
                if (!seen.has(icao)) aircraftData.delete(icao);
            }

            aircraftCount = aircraftData.size;
            updateTileHUD();
        } catch (e) {
            // Network error or timeout -- skip silently
        }
    }

    // Update aircraft interpolation each frame (called from animation loop)
    const AIRCRAFT_UPDATE_INTERVAL = 15000; // ms
    function updateAircraftInterpolation(nowMs) {
        let changed = false;
        for (const ac of aircraftData.values()) {
            const elapsed = nowMs - ac.updateTime;
            const t = Math.min(elapsed / AIRCRAFT_UPDATE_INTERVAL, 1.0);
            ac.currentX = ac.prevX + (ac.targetX - ac.prevX) * t;
            ac.currentY = ac.prevY + (ac.targetY - ac.prevY) * t;
            ac.currentZ = ac.prevZ + (ac.targetZ - ac.prevZ) * t;
            changed = true;
        }
        if (changed) buildAircraftGeometry();
    }

    // Start aircraft fetch interval
    fetchAircraft();
    setInterval(fetchAircraft, AIRCRAFT_UPDATE_INTERVAL);

    // ─── Open-Meteo wind particles ────────────────────────────────────────────
    const WIND_PARTICLE_COUNT = 30;
    let windSpeed = 0;       // m/s
    let windDirDeg = 0;      // meteorological: direction wind comes FROM
    let windDirX = 0;        // world-space drift direction unit vector X
    let windDirZ = 0;        // world-space drift direction unit vector Z
    let windLabel = 'calm';  // HUD string

    // Particle world-space positions
    const windParticlePos = new Float32Array(WIND_PARTICLE_COUNT * 3);
    // Tile half-extent in world meters (approximate, based on zoom 16 tile ~600m wide)
    const WIND_AREA = 300; // ±300m from origin

    function randomWindParticle(i) {
        windParticlePos[i * 3]     = (Math.random() - 0.5) * WIND_AREA * 2;
        windParticlePos[i * 3 + 1] = 0.5 + Math.random() * 2.5; // y: 0.5 to 3
        windParticlePos[i * 3 + 2] = (Math.random() - 0.5) * WIND_AREA * 2;
    }

    for (let i = 0; i < WIND_PARTICLE_COUNT; i++) randomWindParticle(i);

    const windGeo = new THREE.BufferGeometry();
    windGeo.setAttribute('position', new THREE.BufferAttribute(windParticlePos, 3));
    const windColors = new Float32Array(WIND_PARTICLE_COUNT * 3);
    for (let i = 0; i < WIND_PARTICLE_COUNT; i++) {
        windColors[i * 3] = 0.3; windColors[i * 3 + 1] = 0.3; windColors[i * 3 + 2] = 0.3;
    }
    windGeo.setAttribute('color', new THREE.BufferAttribute(windColors, 3));
    const windMat = new THREE.PointsMaterial({
        size: 2,
        sizeAttenuation: false,
        vertexColors: true,
        transparent: true,
        opacity: 0.3,
    });
    const windParticles = new THREE.Points(windGeo, windMat);
    scene.add(windParticles);

    function updateWindParticles(delta) {
        if (windSpeed < 0.1) return; // no wind, no drift
        const speed = windSpeed * 2; // scale for visual effect (world m/s)
        const posAttr = windGeo.getAttribute('position');
        for (let i = 0; i < WIND_PARTICLE_COUNT; i++) {
            let px = posAttr.getX(i) + windDirX * speed * delta;
            let py = posAttr.getY(i);
            let pz = posAttr.getZ(i) + windDirZ * speed * delta;

            // Reset if out of bounds
            if (Math.abs(px) > WIND_AREA || Math.abs(pz) > WIND_AREA) {
                randomWindParticle(i);
                px = posAttr.getX(i);
                py = posAttr.getY(i);
                pz = posAttr.getZ(i);
            }
            posAttr.setXYZ(i, px, py, pz);
        }
        posAttr.needsUpdate = true;
    }

    async function fetchWind() {
        const lat = smoothLat !== null ? smoothLat : FALLBACK_LAT;
        const lon = smoothLon !== null ? smoothLon : FALLBACK_LON;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`;
        try {
            const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
            if (!res.ok) return;
            const data = await res.json();
            if (!data.current) return;
            windSpeed  = data.current.wind_speed_10m    ?? 0;
            windDirDeg = data.current.wind_direction_10m ?? 0;
            // Meteorological: wind comes FROM windDirDeg, so it blows TOWARD opposite
            // Convert to world drift vector. In Three.js top-down: north = -Z, east = +X
            // windDirDeg=0 means wind from north, blowing south (+Z)
            const blowDeg = (windDirDeg + 180) % 360; // direction wind blows toward
            const blowRad = blowDeg * Math.PI / 180;
            windDirX = Math.sin(blowRad);   // east component
            windDirZ = -Math.cos(blowRad);  // north component (inverted for Three.js)
            windLabel = `${windSpeed.toFixed(1)}m/s ${degreesToCardinal(windDirDeg)}`;
            updateTileHUD();
        } catch (e) {
            // Skip silently
        }
    }

    fetchWind();
    setInterval(fetchWind, 5 * 60 * 1000); // every 5 minutes

    // ─── HUD updates ──────────────────────────────────────────────────────────
    const coordsPanel = document.getElementById('coords-panel');
    const tilePanel = document.getElementById('tile-panel');

    function updateCoordsHUD() {
        if (smoothLat === null) {
            coordsPanel.innerHTML = 'lat  <span>--</span>\nlon  <span>--</span>\nacc  <span>waiting...</span>';
            return;
        }
        const lat = smoothLat.toFixed(6);
        const lon = smoothLon.toFixed(6);
        const acc = gpsAccuracy !== null ? gpsAccuracy.toFixed(0) + 'm' : '--';
        let html = `lat  <span>${lat}</span>\nlon  <span>${lon}</span>\nacc  <span>${acc}</span>`;
        if (routeState.active) {
            const distKm = (routeState.distanceM / 1000).toFixed(1);
            const etaMin = Math.ceil(routeState.distanceM / 1000 / 5 * 60);
            html += `\ndist <span>${distKm}km</span>\neta  <span>${etaMin}min</span>`;
        }
        if (gpsError) {
            html += `\n<span class="warn">${gpsError}</span>`;
        }
        coordsPanel.innerHTML = html;
    }

    function updateTileHUD() {
        const loaded = [...tileCache.values()].filter(e => !e.error && !e.loading).length;
        const loading = loadingSet.size;
        const errors = [...tileCache.values()].filter(e => e.error).length;
        const offline = [...tileCache.values()].some(e => e.offline);

        let html = `tiles     <span>${loaded}/4</span>`;
        if (loading > 0) {
            const loadingKeys = [...loadingSet];
            for (const k of loadingKeys) {
                const parts = k.split('/');
                html += `\n<span class="warn">loading sector ${parts[1]}/${parts[2]}...</span>`;
            }
        }
        if (errors > 0) {
            if (offline) {
                html += `\n<span class="err">tile_server_offline</span>`;
            } else {
                html += `\n<span class="err">${errors} tile error(s)</span>`;
            }
        }
        html += `\naircraft  <span>${aircraftCount}</span>`;
        html += `\nwind      <span>${windLabel}</span>`;
        tilePanel.innerHTML = html;
    }

    // ─── GPS watch ────────────────────────────────────────────────────────────
    function onGPSPosition(pos) {
        const rawLat = pos.coords.latitude;
        const rawLon = pos.coords.longitude;
        gpsAccuracy = pos.coords.accuracy;

        if (smoothLat === null) {
            smoothLat = rawLat;
            smoothLon = rawLon;
        } else {
            smoothLat = 0.8 * smoothLat + SMOOTH_ALPHA * rawLat;
            smoothLon = 0.8 * smoothLon + SMOOTH_ALPHA * rawLon;
        }

        // If world origin was set from fallback tiles and GPS is now available,
        // reset the world origin so tiles load relative to user's actual position
        if (worldOriginFromFallback) {
            worldOriginLat = null;
            worldOriginLon = null;
            worldOriginFromFallback = false;
            // Dispose all existing fallback tiles to force reload at correct offset
            for (const key of [...tileCache.keys()]) {
                disposeTile(key);
            }
        }

        updateCoordsHUD();
        updateTileManager(smoothLat, smoothLon);

        if (worldOriginLat !== null) {
            const wp = latLonToWorld(smoothLat, smoothLon);
            pushGPSHistory(wp.x, wp.z);

            if (followGPS) {
                camTarget.set(wp.x, 0, wp.z);
            }
        }
    }

    function onGPSError(err) {
        console.warn('GPS error:', err.message);
        document.getElementById('gps-denied').style.display = 'block';
        gpsError = 'gps_denied';

        // Fall back to Riga
        if (smoothLat === null) {
            smoothLat = FALLBACK_LAT;
            smoothLon = FALLBACK_LON;
            if (worldOriginLat === null) worldOriginFromFallback = true;
            updateCoordsHUD();
            updateTileManager(smoothLat, smoothLon);
        }
    }

    if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(onGPSPosition, onGPSError, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
        });
        // If GPS hasn't reported in 5s, load fallback tiles so the map is visible
        setTimeout(() => {
            if (smoothLat === null) {
                console.log('GPS timeout -- loading fallback tiles for Riga');
                smoothLat = FALLBACK_LAT;
                smoothLon = FALLBACK_LON;
                // Mark that the world origin will be set from fallback
                if (worldOriginLat === null) worldOriginFromFallback = true;
                updateTileManager(FALLBACK_LAT, FALLBACK_LON);
            }
        }, 5000);
    } else {
        onGPSError(new Error('Geolocation not available'));
    }

    // ─── Routing state ────────────────────────────────────────────────────────
    const routeState = {
        active: false,
        destLat: null,
        destLon: null,
        distanceM: 0,
        // Array of {lat, lon} route waypoints (from OSRM geometry)
        waypoints: [],
        // OSRM steps for turn-by-turn: [{instruction, distanceM, lat, lon}]
        steps: [],
    };

    // Three.js objects for route rendering (null when no route)
    let routeLine = null;
    let destDot = null;
    let destRing = null;
    let destBeacon = null;

    // DOM refs for routing UI
    const routeInput = document.getElementById('route-input');
    const routeBtn = document.getElementById('route-btn');
    const routeClearBtn = document.getElementById('route-clear-btn');
    const routeStatus = document.getElementById('route-status');
    const turnPanel = document.getElementById('turn-panel');

    // ─── Routing helpers ──────────────────────────────────────────────────────

    // Great-circle distance in meters between two lat/lon points
    function haversineM(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2)
            + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
            * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Map OSRM maneuver type + modifier to simple text
    function maneuverText(type, modifier) {
        if (type === 'arrive') return 'arrive';
        if (type === 'depart') return 'continue';
        if (type === 'roundabout' || type === 'rotary') {
            return modifier ? `roundabout ${modifier}` : 'roundabout';
        }
        if (type === 'fork' || type === 'merge' || type === 'on ramp' || type === 'off ramp') {
            return modifier ? `${type} ${modifier}` : type;
        }
        // turn, new name, notification, etc.
        if (modifier) {
            // modifier: straight, slight left/right, left, right, sharp left/right, uturn
            if (modifier === 'straight') return 'continue';
            if (modifier === 'uturn') return 'u-turn';
            return modifier; // "turn left", "turn right", etc.
        }
        return 'continue';
    }

    // Clear all route scene objects and reset state
    function clearRoute() {
        if (routeLine) {
            routeLine.geometry.dispose();
            routeLine.material.dispose();
            scene.remove(routeLine);
            routeLine = null;
        }
        if (destDot) {
            destDot.geometry.dispose();
            destDot.material.dispose();
            scene.remove(destDot);
            destDot = null;
        }
        if (destRing) {
            destRing.geometry.dispose();
            destRing.material.dispose();
            scene.remove(destRing);
            destRing = null;
        }
        if (destBeacon) {
            destBeacon.geometry.dispose();
            destBeacon.material.dispose();
            scene.remove(destBeacon);
            destBeacon = null;
        }

        routeState.active = false;
        routeState.destLat = null;
        routeState.destLon = null;
        routeState.distanceM = 0;
        routeState.waypoints = [];
        routeState.steps = [];

        turnPanel.style.display = 'none';
        turnPanel.textContent = '';
        turnPanel.classList.remove('pulse');
        routeClearBtn.style.display = 'none';
        routeStatus.textContent = '';
        // Disable anchor dest sub-button when route is cleared
        btnAnchorDest.disabled = true;
        btnAnchorDest.classList.remove('active');
        if (anchorSubMode === 'dest') {
            anchorSubMode = 'me';
            btnAnchorMe.classList.add('active');
        }
        updateCoordsHUD();
        // Restore full brightness on all tiles
        clearFocusModeAll();
    }

    // Draw route in Three.js scene (requires worldOriginLat to be set)
    function drawRoute(waypoints, destLat, destLon) {
        // Remove existing route objects first
        if (routeLine) { routeLine.geometry.dispose(); routeLine.material.dispose(); scene.remove(routeLine); routeLine = null; }
        if (destDot) { destDot.geometry.dispose(); destDot.material.dispose(); scene.remove(destDot); destDot = null; }
        if (destRing) { destRing.geometry.dispose(); destRing.material.dispose(); scene.remove(destRing); destRing = null; }
        if (destBeacon) { destBeacon.geometry.dispose(); destBeacon.material.dispose(); scene.remove(destBeacon); destBeacon = null; }

        if (waypoints.length < 2) return;

        // Route line
        const pts = [];
        for (const wp of waypoints) {
            const wc = latLonToWorld(wp.lat, wp.lon);
            pts.push(new THREE.Vector3(wc.x, 0.5, wc.z));
        }
        const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1 });
        routeLine = new THREE.Line(lineGeo, lineMat);
        scene.add(routeLine);

        // Destination dot (cyan)
        const dw = latLonToWorld(destLat, destLon);
        const dotGeo = new THREE.BufferGeometry();
        dotGeo.setAttribute('position', new THREE.Float32BufferAttribute([dw.x, 1, dw.z], 3));
        const dotMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 10, sizeAttenuation: false });
        destDot = new THREE.Points(dotGeo, dotMat);
        scene.add(destDot);

        // Destination ring (cyan, pulsing)
        const rSegs = 32;
        const rPts = [];
        for (let i = 0; i <= rSegs; i++) {
            const a = (i / rSegs) * Math.PI * 2;
            rPts.push(Math.cos(a) * 2, 1, Math.sin(a) * 2);
        }
        const ringGeoD = new THREE.BufferGeometry();
        ringGeoD.setAttribute('position', new THREE.Float32BufferAttribute(rPts, 3));
        const ringMatD = new THREE.LineBasicMaterial({ color: 0x00ffff });
        destRing = new THREE.Line(ringGeoD, ringMatD);
        destRing.position.set(dw.x, 1, dw.z);
        scene.add(destRing);

        // Vertical beacon line above destination
        const beaconPts = [new THREE.Vector3(dw.x, 1, dw.z), new THREE.Vector3(dw.x, 30, dw.z)];
        const beaconGeo = new THREE.BufferGeometry().setFromPoints(beaconPts);
        const beaconMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
        destBeacon = new THREE.Line(beaconGeo, beaconMat);
        scene.add(destBeacon);
    }

    // Geocode via Nominatim, then fetch OSRM route
    async function geocodeAndRoute(query) {
        if (!query.trim()) return;

        // Require world origin to be established before drawing
        if (worldOriginLat === null) {
            routeStatus.textContent = 'gps not ready';
            return;
        }

        // Use current GPS position as origin
        const originLat = smoothLat !== null ? smoothLat : FALLBACK_LAT;
        const originLon = smoothLon !== null ? smoothLon : FALLBACK_LON;

        routeStatus.textContent = 'geocoding...';
        routeBtn.disabled = true;

        try {
            // Step 1: Nominatim geocode
            const geocodeUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
            const geoRes = await fetch(geocodeUrl, {
                headers: { 'Accept-Language': 'en', 'User-Agent': 'citywatch/1.0' }
            });
            if (!geoRes.ok) throw new Error(`geocode http ${geoRes.status}`);
            const geoData = await geoRes.json();

            if (!geoData || geoData.length === 0) {
                routeStatus.textContent = 'not found';
                routeBtn.disabled = false;
                return;
            }

            // Nominatim returns lat/lon as strings -- parse as floats
            const destLat = parseFloat(geoData[0].lat);
            const destLon = parseFloat(geoData[0].lon);

            routeStatus.textContent = 'routing...';

            // Step 2: OSRM route
            // Endpoint: /route/v1/driving/{lon1},{lat1};{lon2},{lat2}
            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${originLon},${originLat};${destLon},${destLat}?overview=full&geometries=geojson&steps=true`;
            const osrmRes = await fetch(osrmUrl);
            if (!osrmRes.ok) throw new Error(`osrm http ${osrmRes.status}`);
            const osrmData = await osrmRes.json();

            if (!osrmData.routes || osrmData.routes.length === 0) {
                routeStatus.textContent = 'no route';
                routeBtn.disabled = false;
                return;
            }

            const route = osrmData.routes[0];

            // Extract geometry: routes[0].geometry.coordinates is [[lon, lat], ...]
            const coords = route.geometry.coordinates;
            const waypoints = coords.map(([lon, lat]) => ({ lat, lon }));

            // Extract steps for turn-by-turn
            // routes[0].legs[0].steps -> [{maneuver: {type, modifier}, distance, geometry: {coordinates}}]
            const steps = [];
            if (route.legs && route.legs.length > 0 && route.legs[0].steps) {
                for (const step of route.legs[0].steps) {
                    const m = step.maneuver;
                    const instruction = maneuverText(m.type, m.modifier);
                    // Step location: maneuver.location is [lon, lat]
                    const [sLon, sLat] = m.location;
                    steps.push({
                        instruction,
                        distanceM: step.distance,
                        lat: sLat,
                        lon: sLon,
                    });
                }
            }

            // Update state
            clearRoute(); // clears old objects but resets state -- we re-populate below
            routeState.active = true;
            routeState.destLat = destLat;
            routeState.destLon = destLon;
            routeState.distanceM = route.distance;
            routeState.waypoints = waypoints;
            routeState.steps = steps;

            drawRoute(waypoints, destLat, destLon);
            // Apply focus mode now that route waypoints are set
            applyFocusModeAll();

            routeClearBtn.style.display = 'inline-block';
            routeStatus.textContent = '';
            // Enable anchor dest sub-button now that a route is active
            btnAnchorDest.disabled = false;
            updateCoordsHUD();

        } catch (err) {
