<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Black Hole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080808;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        body.dragging { cursor: grabbing; }
        canvas#display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: fixed;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.15);
            font: 11px 'Courier New', monospace;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 2px;
            transition: opacity 1s ease;
        }
        #zoom-controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 2;
        }
        #zoom-controls button {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            font: bold 20px 'Courier New', monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            line-height: 1;
            padding: 0;
        }
        #zoom-controls button:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
        }
        #zoom-controls button:active {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <canvas id="display"></canvas>
    <div id="info">drag to rotate &middot; scroll to zoom &middot; double-click to reset</div>
    <div id="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">&minus;</button>
    </div>

    <script>setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 1000);</script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script>
    (() => {
        /* ===== Config ===== */
        const FONT_SIZE = 6;
        const SS = 1;   // supersampling factor (2×2 pixels per ASCII cell)
        const ASCII = '.,:;itf1(lcg08#@';  // 16 brightness levels

        /* ===== Display Canvas ===== */
        const display = document.getElementById('display');
        const ctx = display.getContext('2d');
        ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
        const charW = Math.ceil(ctx.measureText('M').width);
        const charH = Math.ceil(FONT_SIZE * 1.2);

        /* ===== Three.js Setup (offscreen) ===== */
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(1);
        renderer.setSize(1, 1);

        const scene = new THREE.Scene();
        const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        /* ===== Shader ===== */
        const vertexShader = `
            void main() {
                gl_Position = vec4(position.xy, 0.0, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;

            uniform float uTime;
            uniform vec2  uResolution;
            uniform vec3  uCamPos;
            uniform vec3  uCamUp;
            uniform float uZoom;

            /* ---- Hash / Noise ---- */
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }
            float hash1(float n) {
                return fract(sin(n) * 43758.5453123);
            }
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float a = hash(i);
                float b = hash(i + vec2(1.0, 0.0));
                float c = hash(i + vec2(0.0, 1.0));
                float d = hash(i + vec2(1.0, 1.0));
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            /* ---- Star field (spherical grid — wide points for stable ASCII) ---- */
            vec3 stars(vec3 dir) {
                vec3 c = vec3(0.0);
                dir = normalize(dir);
                float sTheta = acos(clamp(dir.y, -1.0, 1.0));
                float sPhi   = atan(dir.z, dir.x);

                for (int i = 0; i < 3; i++) {
                    float scale = 18.0 + float(i) * 25.0;
                    vec2 grid = vec2(sPhi * scale, sTheta * scale);
                    vec2 id = floor(grid);
                    vec2 fr = fract(grid) - 0.5;

                    float n1 = hash(id + float(i) * 100.0);
                    float n2 = hash(id * 1.73 + 37.0 + float(i) * 50.0);

                    vec2 off = vec2(n1, n2) - 0.5;
                    float d = length(fr - off * 0.35);

                    /* Wide enough to not flicker across ASCII cell boundaries */
                    float star = smoothstep(0.10, 0.0, d) * n1;

                    vec3 sc = mix(vec3(0.5, 0.65, 1.0), vec3(1.0, 0.85, 0.6), n2);
                    c += sc * star * (i == 0 ? 1.1 : 0.5);
                }
                return c;
            }

            /* ---- Accretion Disk ---- */
            #define DISK_INNER 2.4
            #define DISK_OUTER 9.0

            vec4 diskColor(vec3 pos, vec3 rd) {
                float r = length(pos.xz);
                if (r < DISK_INNER || r > DISK_OUTER) return vec4(0.0);

                float t = (r - DISK_INNER) / (DISK_OUTER - DISK_INNER);

                /* Brightness — hotter toward centre */
                float brightness = (1.0 - pow(t, 0.5)) * 4.5;

                float angle = atan(pos.z, pos.x);

                /* Logarithmic spiral arms (whooshing inflow) */
                float logR = log(max(r, 0.1));
                float sp1 = pow(max(0.0, cos(angle * 2.0 + logR * 3.5 - uTime * 0.55)), 4.0);
                float sp2 = pow(max(0.0, cos(angle * 2.0 + logR * 3.5 - uTime * 0.55 + 2.094)), 4.0);
                float spirals = max(sp1, sp2);

                /* Blend spirals with turbulence */
                float turb = noise(vec2(r * 3.0 - uTime * 0.15, angle * 4.0 / 3.14159));
                brightness *= 0.3 + 0.5 * spirals + 0.2 * turb;

                /* Infalling radial streaks */
                float streaks = noise(vec2(angle * 12.0 / 3.14159, r * 1.5 - uTime * 0.35));
                brightness *= 0.82 + 0.18 * streaks;

                /* Doppler beaming */
                vec3 diskVel = normalize(vec3(-pos.z, 0.0, pos.x));
                float doppler = pow(1.0 / (1.0 + 0.5 * dot(diskVel, rd)), 3.0);
                brightness *= doppler;

                /* Color gradient: vivid hot plasma */
                vec3 color;
                if (t < 0.1) {
                    color = mix(vec3(1.2, 1.3, 1.8), vec3(1.1, 1.0, 0.6), t / 0.1);
                } else if (t < 0.3) {
                    color = mix(vec3(1.1, 1.0, 0.6), vec3(1.2, 0.6, 0.1), (t - 0.1) / 0.2);
                } else if (t < 0.55) {
                    color = mix(vec3(1.2, 0.6, 0.1), vec3(0.9, 0.15, 0.04), (t - 0.3) / 0.25);
                } else {
                    color = mix(vec3(0.9, 0.15, 0.04), vec3(0.25, 0.03, 0.01), (t - 0.55) / 0.45);
                }

                /* Disk density (slightly thicker for visible secondary images) */
                float thick = 0.04 + 0.1 * t;
                float density = exp(-abs(pos.y) / thick);

                return vec4(color * brightness, density * 0.92);
            }

            /* ---- Main ---- */
            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;

                /* Camera matrix from position + up (no gimbal lock) */
                vec3 fwd   = normalize(-uCamPos);
                vec3 right = normalize(cross(fwd, normalize(uCamUp)));
                vec3 up    = normalize(cross(right, fwd));
                vec3 rd    = normalize(fwd * 1.1 + right * uv.x + up * uv.y);

                /* Raymarching with gravitational lensing */
                vec3 pos = uCamPos;
                vec3 vel = rd;
                vec3 col = vec3(0.0);
                float acc = 0.0;
                float rs  = 1.35;

                for (int i = 0; i < 300; i++) {
                    float r = length(pos);

                    /* Event horizon — pure black void */
                    if (r < rs * 1.01) {
                        col = mix(col, vec3(0.0), 1.0 - acc);
                        acc = 1.0;
                        break;
                    }

                    float r2 = r * r;
                    vec3 accel = -2.0 * rs * rs * pos / (r2 * r2 * r);
                    float dt = clamp(r * 0.12, 0.015, 0.6);

                    vec3 newVel = normalize(vel + accel * dt);
                    vec3 newPos = pos + newVel * dt;

                    /* Accretion disk crossing */
                    if (pos.y * newPos.y < 0.0 && acc < 0.99) {
                        float crossT = abs(pos.y) / (abs(pos.y) + abs(newPos.y));
                        vec3 crossPos = mix(pos, newPos, crossT);
                        crossPos.y = 0.0;

                        vec4 disk = diskColor(crossPos, newVel);
                        if (disk.a > 0.001) {
                            col += disk.rgb * disk.a * (1.0 - acc);
                            acc += disk.a * (1.0 - acc);
                        }
                    }

                    /* ---- Photon ring glow at r ≈ 1.5 rs ---- */
                    float photonDist = abs(r - 1.5 * rs);
                    if (photonDist < 0.6 && acc < 0.99) {
                        float ring = exp(-photonDist * 18.0) * 0.18 * dt;
                        vec3 ringCol = mix(vec3(1.0, 0.6, 0.18), vec3(0.35, 0.12, 0.6), photonDist / 0.6);
                        col += ringCol * ring * (1.0 - acc);
                    }

                    /* Corona removed — keep the void dark */

                    /* ---- Relativistic jets — polar outflows ---- */
                    if (acc < 0.99) {
                        float jetH = abs(pos.y);
                        float jetR = length(pos.xz);
                        float coneW = jetH * 0.13 + 0.3;
                        if (jetH > 0.9 && jetR < coneW) {
                            float coneEdge = jetR / coneW;
                            float jb = exp(-coneEdge * coneEdge * 3.5) * exp(-jetH * 0.045) * 0.35 * dt;
                            // Multi-scale flowing turbulence
                            float ang = atan(pos.x, pos.z) * 4.0 / 3.14159;
                            float jn1 = noise(vec2(jetH * 2.0 - uTime * 3.5, ang));           // large fast blobs
                            float jn2 = noise(vec2(jetH * 5.0 - uTime * 6.0, ang * 2.5));     // small fast wisps
                            float jn3 = noise(vec2(jetH * 1.0 - uTime * 1.5, ang * 0.8));     // slow large pulse
                            float jn = jn1 * 0.5 + jn2 * 0.3 + jn3 * 0.2;
                            jn = pow(jn, 0.6);  // boost contrast — bright streaks pop more
                            jb *= 0.15 + 0.85 * jn;
                            vec3 jc = mix(vec3(0.6, 0.7, 1.8), vec3(0.8, 0.25, 1.2), coneEdge);
                            col += jc * jb * (1.0 - acc);
                        }
                    }

                    vel = newVel;
                    pos = newPos;

                    if (r > 35.0) {
                        col += stars(vel) * (1.0 - acc);
                        acc = 1.0;
                        break;
                    }
                }

                col = max(col, 0.0);

                /* Saturation boost */
                float grey = dot(col, vec3(0.299, 0.587, 0.114));
                col = mix(vec3(grey), col, 1.4);

                /* ACES tone mapping + gamma */
                vec3 x = max(vec3(0.0), col - 0.004);
                col = (x * (6.2 * x + 0.5)) / (x * (6.2 * x + 1.7) + 0.06);
                col = pow(col, vec3(0.68));

                /* Brightness lift */
                col *= 1.5;

                gl_FragColor = vec4(col, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime:       { value: 0.0 },
                uResolution: { value: new THREE.Vector2() },
                uCamPos:     { value: new THREE.Vector3() },
                uCamUp:      { value: new THREE.Vector3(0, 1, 0) },
                uZoom:       { value: 13.0 }
            },
            vertexShader,
            fragmentShader,
            depthTest: false,
            depthWrite: false
        });

        const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(quad);

        /* ===== Render Target (supersampled) ===== */
        let cols, rows, renderW, renderH, renderTarget, pixelBuffer;

        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const w = window.innerWidth;
            const h = window.innerHeight;
            display.width  = w * dpr;
            display.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;

            cols = Math.floor(w / charW);
            rows = Math.floor(h / charH);
            renderW = cols * SS;
            renderH = rows * SS;

            if (renderTarget) renderTarget.dispose();
            renderTarget = new THREE.WebGLRenderTarget(renderW, renderH, {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.LinearFilter,
                format: THREE.RGBAFormat,
                type: THREE.UnsignedByteType
            });
            pixelBuffer = new Uint8Array(renderW * renderH * 4);
            material.uniforms.uResolution.value.set(renderW, renderH);
            renderer.setSize(renderW, renderH);
        }
        resize();
        window.addEventListener('resize', resize);

        /* ===== Quaternion Trackball Camera ===== */
        const camQuat = new THREE.Quaternion();
        camQuat.setFromAxisAngle(new THREE.Vector3(0, 0, 1), 0.55);

        let zoom = 16.0;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let inertiaDx = 0, inertiaDy = 0;

        // True trackball: single combined rotation axis for diagonal support
        function rotateCamera(dx, dy) {
            const angle = Math.sqrt(dx * dx + dy * dy);
            if (angle < 1e-6) return;

            // Camera-local basis vectors
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camQuat).normalize();
            const up    = new THREE.Vector3(0, 1, 0).applyQuaternion(camQuat).normalize();

            // Single rotation axis perpendicular to drag direction in camera space
            const axis = new THREE.Vector3()
                .addScaledVector(up,    dx / angle)
                .addScaledVector(right, -dy / angle)
                .normalize();

            const q = new THREE.Quaternion().setFromAxisAngle(axis, angle);
            camQuat.premultiply(q);
            camQuat.normalize();
        }

        // Double-click to reset camera to default view
        const defaultQuat = new THREE.Quaternion();
        defaultQuat.setFromAxisAngle(new THREE.Vector3(0, 0, 1), 0.55);

        let lastClickTime = 0;
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#zoom-controls')) return;
            const now = performance.now();
            if (now - lastClickTime < 350) {
                // Double-click: animate back to default view
                camQuat.copy(defaultQuat);
                inertiaDx = 0;
                inertiaDy = 0;
                zoom = 16.0;
            }
            lastClickTime = now;
        });

        /* ---- Mouse handlers ---- */
        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            inertiaDx = 0;
            inertiaDy = 0;
            document.body.classList.add('dragging');
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - lastX) * 0.008;
            const dy = (e.clientY - lastY) * 0.008;
            inertiaDx = dx;
            inertiaDy = dy;
            rotateCamera(dx, dy);
            lastX = e.clientX;
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.classList.remove('dragging');
        });

        window.addEventListener('wheel', (e) => {
            zoom = Math.max(4, Math.min(30, zoom + e.deltaY * 0.012));
        }, { passive: true });

        /* ---- Zoom buttons ---- */
        const ZOOM_STEP = 1.2;
        document.getElementById('zoom-in').addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.max(4, zoom - ZOOM_STEP);
        });
        document.getElementById('zoom-out').addEventListener('click', (e) => {
            e.stopPropagation();
            zoom = Math.min(30, zoom + ZOOM_STEP);
        });

        /* ===== Explosion System ===== */
        const explosions = [];
        const EXPLODE_RADIUS = 3;       // tight splash radius (cells)
        const DEBRIS_TIME = 1.1;        // slow drift outward
        const GONE_TIME = 0.3;          // brief empty gap
        const REGEN_TIME = 0.4;         // quick fade back
        const EXPLODE_DURATION = DEBRIS_TIME + GONE_TIME + REGEN_TIME;

        /* ===== Hyperspace Easter Egg ===== */
        let hyperspaceActive = false;
        let hyperspaceStart = 0;
        let hyperPrevFrame = 0;
        let preHyperZoom = 13.0;
        const HYPER_ENTRY = 1.0;
        const HYPER_WARP  = 2.5;
        const HYPER_EXIT  = 1.5;
        const HYPER_TOTAL = HYPER_ENTRY + HYPER_WARP + HYPER_EXIT;
        const BH_CLICK_RADIUS = 60;
        const hyperStreaks = [];

        function makeStreak(randomDist) {
            return {
                angle: Math.random() * Math.PI * 2,
                dist: randomDist ? Math.random() * 0.8 : 0.01,
                speed: 0.2 + Math.random() * 0.5,
                char: ASCII[4 + Math.floor(Math.random() * (ASCII.length - 4))],
                brightness: 0.3 + Math.random() * 0.7,
                r: 140 + Math.floor(Math.random() * 115),
                g: 170 + Math.floor(Math.random() * 85),
                b: 230 + Math.floor(Math.random() * 25),
                trailLen: 2 + Math.floor(Math.random() * 10)
            };
        }

        function triggerHyperspace() {
            if (hyperspaceActive) return;
            hyperspaceActive = true;
            hyperspaceStart = performance.now();
            hyperPrevFrame = 0;
            preHyperZoom = zoom;
            hyperStreaks.length = 0;
            for (let i = 0; i < 350; i++) {
                hyperStreaks.push(makeStreak(true));
            }
        }

        function renderHyperspace(timeMs) {
            const hElapsed = (timeMs - hyperspaceStart) / 1000;
            const hdt = hyperPrevFrame ? Math.min((timeMs - hyperPrevFrame) / 1000, 0.05) : 0.016;
            hyperPrevFrame = timeMs;

            if (hElapsed > HYPER_TOTAL) {
                hyperspaceActive = false;
                zoom = preHyperZoom;
                return;
            }

            const cxPx = display.width / 2;
            const cyPx = display.height / 2;
            const maxR = Math.sqrt(cxPx * cxPx + cyPx * cyPx) * 1.2;

            let phase, pt;
            if (hElapsed < HYPER_ENTRY) {
                phase = 0; pt = hElapsed / HYPER_ENTRY;
            } else if (hElapsed < HYPER_ENTRY + HYPER_WARP) {
                phase = 1; pt = (hElapsed - HYPER_ENTRY) / HYPER_WARP;
            } else {
                phase = 2; pt = (hElapsed - HYPER_ENTRY - HYPER_WARP) / HYPER_EXIT;
            }

            // Dark overlay dims the black hole underneath
            const darkA = phase === 0 ? pt * pt * 0.92 :
                          phase === 1 ? 0.92 :
                          0.92 * (1 - pt);
            ctx.fillStyle = `rgba(0,0,0,${darkA})`;
            ctx.fillRect(0, 0, display.width, display.height);

            // Transition flash at the entry→warp moment
            if (phase === 0 && pt > 0.85) {
                const fA = ((pt - 0.85) / 0.15) * 0.6;
                ctx.fillStyle = `rgba(180,210,255,${fA})`;
                ctx.fillRect(0, 0, display.width, display.height);
            } else if (phase === 1 && pt < 0.05) {
                const fA = (1 - pt / 0.05) * 0.6;
                ctx.fillStyle = `rgba(180,210,255,${fA})`;
                ctx.fillRect(0, 0, display.width, display.height);
            }

            // Speed & visibility multipliers per phase
            const sMul = phase === 0 ? 0.2 + pt * 1.8 :
                         phase === 1 ? 2.0 + Math.sin(hElapsed * 4) * 0.3 :
                         2.0 * (1 - pt);
            const sAlpha = phase === 0 ? pt :
                           phase === 1 ? 1.0 :
                           1 - pt;

            // Draw hyperspace ASCII streaks
            ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;

            for (const s of hyperStreaks) {
                s.dist += s.speed * hdt * sMul;

                // Recycle streaks that go off screen
                if (s.dist > 1.5) {
                    s.dist = 0.01;
                    s.angle = Math.random() * Math.PI * 2;
                    s.speed = 0.2 + Math.random() * 0.5;
                    s.char = ASCII[4 + Math.floor(Math.random() * (ASCII.length - 4))];
                    s.brightness = 0.3 + Math.random() * 0.7;
                }

                const headR = s.dist * maxR;
                const trailN = Math.min(Math.ceil(s.trailLen * sMul * 0.6), 14);
                const gap = charH * (0.6 + sMul * 0.3);

                for (let c = 0; c < trailN; c++) {
                    const r = headR - c * gap;
                    if (r < 0) break;

                    const px = cxPx + Math.cos(s.angle) * r;
                    const py = cyPx + Math.sin(s.angle) * r;

                    if (px < -charW || px > display.width + charW ||
                        py < -charH || py > display.height + charH) continue;

                    const fade = 1 - c / trailN;
                    ctx.globalAlpha = Math.min(1, fade * fade * s.brightness * sAlpha);
                    ctx.fillStyle = `rgb(${s.r},${s.g},${s.b})`;
                    ctx.fillText(s.char, px, py + charH * 0.85);
                }
            }
            ctx.globalAlpha = 1;
        }

        // Per-cell random values for natural debris scatter
        const cellRand = {};
        function getCellRand(x, y) {
            const key = x + ',' + y;
            if (!(key in cellRand)) {
                cellRand[key] = {
                    angle: Math.random() * Math.PI * 2,     // fully random direction
                    speed: 0.4 + Math.random() * 1.0,       // varied speeds
                    delay: Math.random() * 0.06              // tiny stagger
                };
            }
            return cellRand[key];
        }

        // Create explosion at a 3D world position
        function createExplosion(clientX, clientY) {
            const worldPos = clickToWorldPos(clientX, clientY);
            explosions.push({ worldPos, time: performance.now() });
        }

        // Detect click (short press, minimal movement) vs drag
        let clickDownX = 0, clickDownY = 0, clickDownTime = 0;
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#zoom-controls')) return;
            clickDownX = e.clientX;
            clickDownY = e.clientY;
            clickDownTime = performance.now();
        });
        window.addEventListener('mouseup', (e) => {
            const dx = Math.abs(e.clientX - clickDownX);
            const dy = Math.abs(e.clientY - clickDownY);
            const dt = performance.now() - clickDownTime;
            if (dx < 6 && dy < 6 && dt < 250) {
                if (hyperspaceActive) return;
                const bhSx = bhCellX * charW;
                const bhSy = bhCellY * charH;
                const dBH = Math.sqrt((e.clientX - bhSx) ** 2 + (e.clientY - bhSy) ** 2);
                if (dBH < BH_CLICK_RADIUS) {
                    triggerHyperspace();
                } else {
                    createExplosion(e.clientX, e.clientY);
                }
            }
        });

        // Touch tap support
        let tapX = 0, tapY = 0, tapTime = 0;
        window.addEventListener('touchstart', (e) => {
            tapX = e.touches[0].clientX;
            tapY = e.touches[0].clientY;
            tapTime = performance.now();
        }, { passive: true });
        window.addEventListener('touchend', (e) => {
            const dx = Math.abs(e.changedTouches[0].clientX - tapX);
            const dy = Math.abs(e.changedTouches[0].clientY - tapY);
            const dt = performance.now() - tapTime;
            if (dx < 12 && dy < 12 && dt < 300) {
                if (hyperspaceActive) return;
                const bhSx = bhCellX * charW;
                const bhSy = bhCellY * charH;
                const dBH = Math.sqrt((tapX - bhSx) ** 2 + (tapY - bhSy) ** 2);
                if (dBH < BH_CLICK_RADIUS) {
                    triggerHyperspace();
                } else {
                    createExplosion(tapX, tapY);
                }
            }
        });

        // Black hole center in screen-cell coords (updated each frame)
        let bhCellX = 0, bhCellY = 0;

        function getExplosionEffect(x, y, now) {
            let ox = 0, oy = 0, alpha = 1;

            for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                const elapsed = (now - exp.time) / 1000;

                if (elapsed > EXPLODE_DURATION) {
                    explosions.splice(i, 1);
                    continue;
                }

                if (!exp.visible) continue;

                const dx = x - exp.cx;
                const dy = y - exp.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > EXPLODE_RADIUS) continue;

                const rand = getCellRand(x, y);

                // Per-cell randomized threshold — natural jagged edge
                const threshold = EXPLODE_RADIUS * (0.5 + rand.speed * 0.5);
                if (dist > threshold) continue;

                // Pulsing wave: cells closer to center fire first
                const waveDelay = dist * 0.06 + rand.delay;
                const localT = Math.max(0, elapsed - waveDelay);

                if (localT < DEBRIS_TIME) {
                    const t = localT / DEBRIS_TIME;
                    const speed = rand.speed * 45;

                    // Direction toward black hole from this cell
                    const toBH_x = bhCellX - x;
                    const toBH_y = bhCellY - y;
                    const toBH_len = Math.sqrt(toBH_x * toBH_x + toBH_y * toBH_y) || 1;

                    // Gravity strength: stronger when explosion is near the BH
                    const expToBH = Math.sqrt((exp.cx - bhCellX) ** 2 + (exp.cy - bhCellY) ** 2);
                    const grav = Math.min(1, 12 / (expToBH + 4));

                    // Blend direction: random ↔ toward BH
                    const rx = Math.cos(rand.angle);
                    const ry = Math.sin(rand.angle);
                    const bx = toBH_x / toBH_len;
                    const by = toBH_y / toBH_len;
                    const fx = rx * (1 - grav) + bx * grav;
                    const fy = ry * (1 - grav) + by * grav;
                    const flen = Math.sqrt(fx * fx + fy * fy) || 1;

                    // Drift: decelerate when far, accelerate when pulled in
                    const normalDrift = t * (1.2 - 0.2 * t);
                    const gravDrift = t * t * 1.5;
                    const drift = normalDrift * (1 - grav) + gravDrift * grav;

                    ox += (fx / flen) * speed * drift;
                    oy += (fy / flen) * speed * drift;

                    const fadeT = Math.max(0, (t - 0.35) / 0.65);
                    alpha *= 1 - fadeT;
                } else if (localT < DEBRIS_TIME + GONE_TIME) {
                    // Dead — empty hole, no offset
                    alpha = 0;
                } else {
                    // Regen: fresh characters appear at original position
                    const t = (localT - DEBRIS_TIME - GONE_TIME) / REGEN_TIME;
                    alpha *= t * t * (3 - 2 * t);
                }
            }

            return { ox, oy, alpha: Math.max(0, Math.min(1, alpha)) };
        }

        /* ---- Touch support ---- */
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
            inertiaDx = 0;
            inertiaDy = 0;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = (e.touches[0].clientX - lastX) * 0.008;
            const dy = (e.touches[0].clientY - lastY) * 0.008;
            inertiaDx = dx;
            inertiaDy = dy;
            rotateCamera(dx, dy);
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        /* ===== Camera basis vectors (for 3D explosion tracking) ===== */
        const _camFwd   = new THREE.Vector3();
        const _camRight = new THREE.Vector3();
        const _camUpB   = new THREE.Vector3();
        const FOCAL = 1.1; // must match shader: fwd * 1.1

        // Screen cell → ray direction in world space
        function cellToRayDir(cx, cy) {
            const uvx = (cx * SS + SS / 2 - renderW * 0.5) / renderH;
            const uvy = ((renderH - 1 - (cy * SS + SS / 2)) - renderH * 0.5) / renderH;
            return new THREE.Vector3()
                .addScaledVector(_camFwd, FOCAL)
                .addScaledVector(_camRight, uvx)
                .addScaledVector(_camUpB, uvy)
                .normalize();
        }

        // Screen click → 3D world position (disk plane or background sphere)
        function clickToWorldPos(clientX, clientY) {
            const cx = clientX / charW;
            const cy = clientY / charH;
            const rd = cellToRayDir(cx, cy);
            const cam = _camPos.clone();

            // Try disk plane y=0
            if (Math.abs(rd.y) > 0.01) {
                const t = -cam.y / rd.y;
                if (t > 0) {
                    const hit = cam.clone().addScaledVector(rd, t);
                    const r = Math.sqrt(hit.x * hit.x + hit.z * hit.z);
                    if (r > 0.3 && r < 20) return hit;
                }
            }

            // Background: place on a large sphere (radius 40)
            const b = 2 * cam.dot(rd);
            const c = cam.lengthSq() - 40 * 40;
            const disc = b * b - 4 * c;
            if (disc >= 0) {
                const t = (-b + Math.sqrt(disc)) / 2;
                return cam.clone().addScaledVector(rd, Math.max(0.1, t));
            }
            return rd.clone().multiplyScalar(50);
        }

        // Project 3D world position → fractional cell coords
        function worldPosToCell(pos) {
            const toP = new THREE.Vector3().subVectors(pos, _camPos);
            const f = toP.dot(_camFwd);
            if (f <= 0.001) return null; // behind camera
            const r = toP.dot(_camRight);
            const u = toP.dot(_camUpB);
            const uvx = r * FOCAL / f;
            const uvy = u * FOCAL / f;
            const rpx = uvx * renderH + renderW * 0.5;
            const rpy = uvy * renderH + renderH * 0.5;
            return { cx: rpx / SS, cy: (renderH - 1 - rpy) / SS };
        }

        /* ===== Animation Loop ===== */
        const _camDir = new THREE.Vector3();
        const _camUp2 = new THREE.Vector3();
        const _camPos = new THREE.Vector3();

        function animate(time) {
            requestAnimationFrame(animate);

            const t = time * 0.001;

            /* Inertia + auto-rotate when not dragging */
            if (!isDragging) {
                inertiaDx *= 0.95;
                inertiaDy *= 0.95;
                rotateCamera(inertiaDx, inertiaDy);
                rotateCamera(0.004, 0);  // auto-spin
            }


            /* Hyperspace zoom override */
            if (hyperspaceActive) {
                const hE = (performance.now() - hyperspaceStart) / 1000;
                if (hE < HYPER_ENTRY) {
                    const ht = hE / HYPER_ENTRY;
                    zoom = preHyperZoom + (4 - preHyperZoom) * ht * ht;
                } else if (hE < HYPER_ENTRY + HYPER_WARP) {
                    zoom = 4;
                } else if (hE < HYPER_TOTAL) {
                    const ht = (hE - HYPER_ENTRY - HYPER_WARP) / HYPER_EXIT;
                    zoom = 4 + (preHyperZoom - 4) * (1 - (1 - ht) * (1 - ht));
                }
            }

            /* Compute camera vectors from quaternion */
            _camDir.set(0, 0, 1).applyQuaternion(camQuat);
            _camUp2.set(0, 1, 0).applyQuaternion(camQuat);
            _camPos.copy(_camDir).multiplyScalar(zoom);

            /* Camera basis for 3D explosion tracking (matches shader) */
            _camFwd.copy(_camPos).negate().normalize();
            _camRight.crossVectors(_camFwd, _camUp2).normalize();
            _camUpB.crossVectors(_camRight, _camFwd).normalize();

            /* Update uniforms */
            material.uniforms.uTime.value = t;
            material.uniforms.uCamPos.value.copy(_camPos);
            material.uniforms.uCamUp.value.copy(_camUp2);
            material.uniforms.uZoom.value = zoom;

            /* Render black hole shader to supersampled target */
            renderer.setRenderTarget(renderTarget);
            renderer.render(scene, cam);
            renderer.setRenderTarget(null);
            renderer.readRenderTargetPixels(renderTarget, 0, 0, renderW, renderH, pixelBuffer);

            /* ---- Draw ASCII with supersampled colors + background glow ---- */
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, display.width, display.height);

            const asciiLen = ASCII.length;
            const ss2 = SS * SS;

            const now = performance.now();
            const hasExplosions = explosions.length > 0;

            // Project black hole center to screen
            const bhProj = worldPosToCell(new THREE.Vector3(0, 0, 0));
            if (bhProj) { bhCellX = bhProj.cx; bhCellY = bhProj.cy; }

            // Project each explosion's 3D world position to screen cells
            if (hasExplosions) {
                for (const exp of explosions) {
                    const proj = worldPosToCell(exp.worldPos);
                    if (proj) {
                        exp.cx = proj.cx;
                        exp.cy = proj.cy;
                        exp.visible = true;
                    } else {
                        exp.visible = false;
                    }
                }
            }

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    // Average SS×SS pixel block for this cell
                    let rSum = 0, gSum = 0, bSum = 0;
                    for (let sy = 0; sy < SS; sy++) {
                        for (let sx = 0; sx < SS; sx++) {
                            const px = x * SS + sx;
                            const py = (renderH - 1) - (y * SS + sy);
                            const idx = (py * renderW + px) * 4;
                            rSum += pixelBuffer[idx];
                            gSum += pixelBuffer[idx + 1];
                            bSum += pixelBuffer[idx + 2];
                        }
                    }
                    const r = (rSum / ss2) | 0;
                    const g = (gSum / ss2) | 0;
                    const b = (bSum / ss2) | 0;

                    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255.0;
                    const ci  = Math.min(asciiLen - 1, Math.floor(lum * asciiLen));

                    // Explosion effect
                    let ox = 0, oy = 0, eAlpha = 1;
                    if (hasExplosions) {
                        const eff = getExplosionEffect(x, y, now);
                        ox = eff.ox;
                        oy = eff.oy;
                        eAlpha = eff.alpha;
                    }

                    if (eAlpha < 0.01) continue;

                    const drawX = x * charW + ox;
                    const drawY = y * charH + oy;

                    if (lum > 0.15) {
                        const bgAlpha = Math.min(0.35, lum * lum * 1.2) * eAlpha;
                        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + bgAlpha + ')';
                        ctx.fillRect(drawX, drawY, charW, charH);
                    }

                    if (ci > 0) {
                        ctx.globalAlpha = eAlpha;
                        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                        ctx.fillText(ASCII[ci], drawX, drawY + charH * 0.85);
                        ctx.globalAlpha = 1;
                    }
                }
            }

            // Hyperspace overlay
            if (hyperspaceActive) {
                renderHyperspace(performance.now());
            }
        }

        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
