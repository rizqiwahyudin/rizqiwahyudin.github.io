<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strange attractor</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas#display {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 14px; left: 14px;
            font: 14px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-decoration: none;
            color: rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 6px 14px;
            z-index: 10;
            transition: color 0.15s, border-color 0.15s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
        }
        #info {
            position: fixed;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.12);
            font: 11px 'DotGothic16', monospace;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 2px;
        }

        /* Tuner toggle */
        #tuner-toggle {
            position: fixed;
            bottom: 16px; right: 16px;
            z-index: 10000;
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-toggle:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }

        /* Tuner panel */
        #tuner-panel {
            position: fixed;
            bottom: 52px; right: 16px;
            z-index: 10000;
            width: 260px;
            max-height: calc(100vh - 68px);
            overflow-y: auto;
            font-family: 'DotGothic16', monospace;
            background: rgb(8 8 10 / 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            display: none;
        }
        #tuner-panel.open { display: block; }

        #tuner-panel .dt-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-row { margin-bottom: 10px; }
        #tuner-panel .dt-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 4px;
        }
        #tuner-panel .dt-val {
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.25);
        }
        #tuner-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            outline: none;
        }
        #tuner-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel input[type="range"]::-moz-range-thumb {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel .dt-actions {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-btn {
            flex: 1;
            font: 9px 'DotGothic16', monospace;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px;
            padding: 5px 0;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-panel .dt-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.2);
        }
        #tuner-panel .dt-copied {
            font-size: 9px;
            letter-spacing: 1.5px;
            text-align: center;
            color: #00e5ff;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #tuner-panel .dt-copied.show { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="display"></canvas>
    <a id="back-btn" href="index.html">&larr; back</a>
    <div id="info">strange attractor // lorenz system // bayer dither</div>

    <button id="tuner-toggle">&#9881; tuner</button>
    <div id="tuner-panel">
        <div class="dt-title">// tuner</div>
        <div class="dt-row">
            <div class="dt-label"><span>pixel size</span><span class="dt-val" id="dt-pix-val">5</span></div>
            <input type="range" id="dt-pix" min="2" max="10" step="1" value="5">
        </div>
        <div class="dt-row">
            <div class="dt-label"><span>fade rate</span><span class="dt-val" id="dt-fade-val">0.970</span></div>
            <input type="range" id="dt-fade" min="0.90" max="0.99" step="0.005" value="0.97">
        </div>
        <div class="dt-row">
            <div class="dt-label"><span>brightness</span><span class="dt-val" id="dt-deposit-val">0.060</span></div>
            <input type="range" id="dt-deposit" min="0.02" max="0.15" step="0.005" value="0.06">
        </div>
        <div class="dt-row">
            <div class="dt-label"><span>rotation speed</span><span class="dt-val" id="dt-rotspeed-val">0.0005</span></div>
            <input type="range" id="dt-rotspeed" min="0.0001" max="0.002" step="0.0001" value="0.0005">
        </div>
        <div class="dt-row">
            <div class="dt-label"><span>points per frame</span><span class="dt-val" id="dt-spawn-val">100</span></div>
            <input type="range" id="dt-spawn" min="40" max="200" step="10" value="100">
        </div>
        <div class="dt-actions">
            <button class="dt-btn" id="dt-copy">copy config</button>
            <button class="dt-btn" id="dt-reset">reset</button>
        </div>
        <div class="dt-copied" id="dt-copied">copied to clipboard</div>
    </div>

<script>
(function() {
    'use strict';

    // Bayer 4x4 matrix, normalized to [0, 1)
    const BAYER4 = [
         0/16,  8/16,  2/16, 10/16,
        12/16,  4/16, 14/16,  6/16,
         3/16, 11/16,  1/16,  9/16,
        15/16,  7/16, 13/16,  5/16
    ];

    // Lorenz params
    const DT    = 0.005;
    const SIGMA = 10.0;
    const RHO   = 28.0;
    const BETA  = 8.0 / 3.0;

    // Teal color for ON pixels
    const R_ON = 0;
    const G_ON = 255;
    const B_ON = 200;

    // Tuner defaults
    const DEFAULTS = {
        pix:      5,
        fade:     0.97,
        deposit:  0.06,
        rotspeed: 0.0005,
        spawn:    100
    };

    // Live tuner vars
    let tPix      = DEFAULTS.pix;
    let tFade     = DEFAULTS.fade;
    let tDeposit  = DEFAULTS.deposit;
    let tRotspeed = DEFAULTS.rotspeed;
    let tSpawn    = DEFAULTS.spawn;

    const canvas = document.getElementById('display');
    const ctx    = canvas.getContext('2d');

    let simW, simH;
    let bright;
    let imgData;

    function resize() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        canvas.width  = Math.floor(W / tPix);
        canvas.height = Math.floor(H / tPix);
        simW = canvas.width;
        simH = canvas.height;
        bright = new Float32Array(simW * simH);
        imgData = ctx.createImageData(simW, simH);
    }

    window.addEventListener('resize', resize);
    resize();

    // Lorenz state
    let lx = 0.1, ly = 0.0, lz = 0.0;

    function lorenzStep() {
        const dx = SIGMA * (ly - lx);
        const dy = lx * (RHO - lz) - ly;
        const dz = lx * ly - BETA * lz;
        lx += dx * DT;
        ly += dy * DT;
        lz += dz * DT;
    }

    let rotY = 0;

    function project(x, y, z) {
        const cosY = Math.cos(rotY);
        const sinY = Math.sin(rotY);
        const rx = x * cosY + z * sinY;
        const rz = -x * sinY + z * cosY;
        const px = (rx + 30) / 60 * simW;
        const py = (1.0 - rz / 50.0) * simH;
        return { px, py };
    }

    function frame() {
        requestAnimationFrame(frame);

        rotY += tRotspeed;

        // Fade brightness buffer
        for (let i = 0; i < bright.length; i++) {
            bright[i] *= tFade;
        }

        // Integrate Lorenz points and deposit brightness
        for (let s = 0; s < tSpawn; s++) {
            lorenzStep();
            const { px, py } = project(lx, ly, lz);
            const col = Math.floor(px);
            const row = Math.floor(py);
            if (col >= 0 && col < simW && row >= 0 && row < simH) {
                const idx = row * simW + col;
                bright[idx] = Math.min(1.0, bright[idx] + tDeposit);
            }
        }

        // Apply Bayer dither and write to imgData
        const d = imgData.data;
        for (let y = 0; y < simH; y++) {
            for (let x = 0; x < simW; x++) {
                const i   = y * simW + x;
                const b   = bright[i];
                const thr = BAYER4[(y % 4) * 4 + (x % 4)];
                const on  = b > thr;
                const p   = i * 4;
                d[p]     = on ? R_ON : 0;
                d[p + 1] = on ? G_ON : 0;
                d[p + 2] = on ? B_ON : 0;
                d[p + 3] = 255;
            }
        }

        ctx.imageSmoothingEnabled = false;
        ctx.putImageData(imgData, 0, 0);
    }

    requestAnimationFrame(frame);

    // --- Tuner wiring ---

    document.getElementById('tuner-toggle').addEventListener('click', () => {
        document.getElementById('tuner-panel').classList.toggle('open');
    });

    function fmt4(v) { return parseFloat(v).toFixed(4); }
    function fmt3(v) { return parseFloat(v).toFixed(3); }
    function fmtInt(v) { return Math.round(v).toString(); }

    document.getElementById('dt-pix').addEventListener('input', function() {
        tPix = parseInt(this.value);
        document.getElementById('dt-pix-val').textContent = fmtInt(tPix);
        resize();
    });

    document.getElementById('dt-fade').addEventListener('input', function() {
        tFade = parseFloat(this.value);
        document.getElementById('dt-fade-val').textContent = fmt3(tFade);
    });

    document.getElementById('dt-deposit').addEventListener('input', function() {
        tDeposit = parseFloat(this.value);
        document.getElementById('dt-deposit-val').textContent = fmt3(tDeposit);
    });

    document.getElementById('dt-rotspeed').addEventListener('input', function() {
        tRotspeed = parseFloat(this.value);
        document.getElementById('dt-rotspeed-val').textContent = fmt4(tRotspeed);
    });

    document.getElementById('dt-spawn').addEventListener('input', function() {
        tSpawn = parseInt(this.value);
        document.getElementById('dt-spawn-val').textContent = fmtInt(tSpawn);
    });

    document.getElementById('dt-reset').addEventListener('click', () => {
        tPix      = DEFAULTS.pix;
        tFade     = DEFAULTS.fade;
        tDeposit  = DEFAULTS.deposit;
        tRotspeed = DEFAULTS.rotspeed;
        tSpawn    = DEFAULTS.spawn;

        document.getElementById('dt-pix').value      = tPix;
        document.getElementById('dt-fade').value     = tFade;
        document.getElementById('dt-deposit').value  = tDeposit;
        document.getElementById('dt-rotspeed').value = tRotspeed;
        document.getElementById('dt-spawn').value    = tSpawn;

        document.getElementById('dt-pix-val').textContent      = fmtInt(tPix);
        document.getElementById('dt-fade-val').textContent     = fmt3(tFade);
        document.getElementById('dt-deposit-val').textContent  = fmt3(tDeposit);
        document.getElementById('dt-rotspeed-val').textContent = fmt4(tRotspeed);
        document.getElementById('dt-spawn-val').textContent    = fmtInt(tSpawn);

        resize();
    });

    document.getElementById('dt-copy').addEventListener('click', () => {
        const cfg = {
            pixelSize:      tPix,
            fadeRate:       tFade,
            brightness:     tDeposit,
            rotationSpeed:  tRotspeed,
            pointsPerFrame: tSpawn
        };
        navigator.clipboard.writeText(JSON.stringify(cfg, null, 2)).then(() => {
            const el = document.getElementById('dt-copied');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1800);
        });
    });
})();
</script>
</body>
</html>
