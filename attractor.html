<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strange attractor</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas#display {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 14px; left: 14px;
            font: 14px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-decoration: none;
            color: rgba(255,255,255,0.35);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 6px 14px;
            z-index: 10;
            transition: color 0.15s, border-color 0.15s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.3);
        }
        #info {
            position: fixed;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.12);
            font: 11px 'DotGothic16', monospace;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="display"></canvas>
    <a id="back-btn" href="index.html">&larr; back</a>
    <div id="info">strange attractor // lorenz system // bayer dither</div>

<script>
(function() {
    'use strict';

    // Bayer 4x4 matrix, normalized to [0, 1)
    const BAYER4 = [
         0/16,  8/16,  2/16, 10/16,
        12/16,  4/16, 14/16,  6/16,
         3/16, 11/16,  1/16,  9/16,
        15/16,  7/16, 13/16,  5/16
    ];

    // Sim grid resolution
    const PIX = 5;           // logical pixel size when scaled to canvas

    // Lorenz params
    const DT    = 0.005;
    const SIGMA = 10.0;
    const RHO   = 28.0;
    const BETA  = 8.0 / 3.0;
    const SPAWN = 100;       // points injected per frame
    const FADE  = 0.97;      // brightness buffer multiplied by this each frame
    const DEPOSIT = 0.06;    // brightness added per Lorenz point

    // Teal color for ON pixels
    const R_ON = 0;
    const G_ON = 255;
    const B_ON = 200;

    const canvas = document.getElementById('display');
    const ctx    = canvas.getContext('2d');

    let simW, simH;
    let bright;    // Float32Array brightness buffer
    let imgData;   // ImageData for the sim grid

    function resize() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        canvas.width  = Math.floor(W / PIX);
        canvas.height = Math.floor(H / PIX);
        simW = canvas.width;
        simH = canvas.height;
        bright = new Float32Array(simW * simH);
        imgData = ctx.createImageData(simW, simH);
    }

    window.addEventListener('resize', resize);
    resize();

    // Lorenz state
    let lx = 0.1, ly = 0.0, lz = 0.0;

    function lorenzStep() {
        const dx = SIGMA * (ly - lx);
        const dy = lx * (RHO - lz) - ly;
        const dz = lx * ly - BETA * lz;
        lx += dx * DT;
        ly += dy * DT;
        lz += dz * DT;
    }

    // Slow rotation around Y axis for visual interest
    let rotY = 0;

    function project(x, y, z) {
        // Rotate around Y axis
        const cosY = Math.cos(rotY);
        const sinY = Math.sin(rotY);
        const rx = x * cosY + z * sinY;
        const rz = -x * sinY + z * cosY;

        // Lorenz lives roughly in x: -25..25, y: -30..30, z: 0..50
        // Map rx [-30, 30] -> [0, simW], rz [0, 50] -> [simH, 0]
        const px = (rx + 30) / 60 * simW;
        const py = (1.0 - rz / 50.0) * simH;
        return { px, py };
    }

    function frame() {
        requestAnimationFrame(frame);

        rotY += 0.0004;

        // Fade brightness buffer
        for (let i = 0; i < bright.length; i++) {
            bright[i] *= FADE;
        }

        // Integrate Lorenz points and deposit brightness
        for (let s = 0; s < SPAWN; s++) {
            lorenzStep();
            const { px, py } = project(lx, ly, lz);
            const col = Math.floor(px);
            const row = Math.floor(py);
            if (col >= 0 && col < simW && row >= 0 && row < simH) {
                const idx = row * simW + col;
                bright[idx] = Math.min(1.0, bright[idx] + DEPOSIT);
            }
        }

        // Apply Bayer dither and write to imgData
        const d = imgData.data;
        for (let y = 0; y < simH; y++) {
            for (let x = 0; x < simW; x++) {
                const i   = y * simW + x;
                const b   = bright[i];
                const thr = BAYER4[(y % 4) * 4 + (x % 4)];
                const on  = b > thr;
                const p   = i * 4;
                d[p]     = on ? R_ON : 0;
                d[p + 1] = on ? G_ON : 0;
                d[p + 2] = on ? B_ON : 0;
                d[p + 3] = 255;
            }
        }

        ctx.imageSmoothingEnabled = false;
        ctx.putImageData(imgData, 0, 0);
    }

    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
