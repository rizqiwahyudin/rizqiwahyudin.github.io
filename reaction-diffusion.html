<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Diffusion</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #preset-btn {
            position: fixed;
            top: 16px; right: 20px;
            color: rgba(255,255,255,0.4);
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #preset-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #label {
            position: fixed;
            bottom: 16px; right: 20px;
            color: rgba(255,255,255,0.2);
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="index.html">&larr; back</a>
<button id="preset-btn">preset: coral</button>
<div id="label">canvas // gray-scott // bayer dither</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Bayer 4x4 matrix, normalized to [0, 1)
const BAYER4 = [
     0/16,  8/16,  2/16, 10/16,
    12/16,  4/16, 14/16,  6/16,
     3/16, 11/16,  1/16,  9/16,
    15/16,  7/16, 13/16,  5/16
];

// Teal color for ON pixels
const R_ON = 0;
const G_ON = 255;
const B_ON = 200;

const SIM_W = 256;
const SIM_H = 256;

const presets = [
    { name: 'coral',   Du: 0.2097, Dv: 0.105, f: 0.054,  k: 0.063  },
    { name: 'spots',   Du: 0.2097, Dv: 0.105, f: 0.035,  k: 0.065  },
    { name: 'mitosis', Du: 0.2097, Dv: 0.105, f: 0.0367, k: 0.0649 },
];
let presetIdx = 0;
let Du, Dv, f, k;

function applyPreset(idx) {
    const p = presets[idx];
    Du = p.Du; Dv = p.Dv; f = p.f; k = p.k;
    document.getElementById('preset-btn').textContent = 'preset: ' + p.name;
}

let bufA = new Float32Array(SIM_W * SIM_H * 2);
let bufB = new Float32Array(SIM_W * SIM_H * 2);

function cellIdx(x, y) {
    return (y * SIM_W + x) * 2;
}

function initBuffers() {
    for (let i = 0; i < SIM_W * SIM_H; i++) {
        bufA[i * 2]     = 1.0;
        bufA[i * 2 + 1] = 0.0;
    }
    for (let s = 0; s < 40; s++) {
        const cx = Math.floor(Math.random() * SIM_W);
        const cy = Math.floor(Math.random() * SIM_H);
        const r  = 4 + Math.floor(Math.random() * 6);
        for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
                if (dx*dx + dy*dy > r*r) continue;
                const x  = (cx + dx + SIM_W) % SIM_W;
                const y  = (cy + dy + SIM_H) % SIM_H;
                const i2 = cellIdx(x, y);
                bufA[i2]     = 0.5 + (Math.random() - 0.5) * 0.1;
                bufA[i2 + 1] = 0.25 + (Math.random() - 0.5) * 0.1;
            }
        }
    }
}

function step() {
    const src = bufA;
    const dst = bufB;

    for (let y = 0; y < SIM_H; y++) {
        for (let x = 0; x < SIM_W; x++) {
            const xL = (x - 1 + SIM_W) % SIM_W;
            const xR = (x + 1) % SIM_W;
            const yU = (y - 1 + SIM_H) % SIM_H;
            const yD = (y + 1) % SIM_H;

            const c = cellIdx(x,  y);
            const l = cellIdx(xL, y);
            const r = cellIdx(xR, y);
            const u = cellIdx(x,  yU);
            const d = cellIdx(x,  yD);

            const U = src[c];
            const V = src[c + 1];

            const lapU = 0.25 * (src[l] + src[r] + src[u] + src[d]) - U;
            const lapV = 0.25 * (src[l+1] + src[r+1] + src[u+1] + src[d+1]) - V;

            const UVV = U * V * V;

            dst[c]     = Math.max(0, Math.min(1, U + Du * lapU - UVV + f * (1 - U)));
            dst[c + 1] = Math.max(0, Math.min(1, V + Dv * lapV + UVV - (f + k) * V));
        }
    }

    const tmp = bufA;
    bufA = bufB;
    bufB = tmp;
}

const imgData = ctx.createImageData(SIM_W, SIM_H);
const pixels  = imgData.data;

function render() {
    for (let y = 0; y < SIM_H; y++) {
        for (let x = 0; x < SIM_W; x++) {
            const i   = y * SIM_W + x;
            const U   = bufA[i * 2];
            // Invert: low U (reacted area, high V) = bright
            const bri = 1.0 - U;
            const thr = BAYER4[(y % 4) * 4 + (x % 4)];
            const on  = bri > thr;
            const p   = i * 4;
            pixels[p]     = on ? R_ON : 0;
            pixels[p + 1] = on ? G_ON : 0;
            pixels[p + 2] = on ? B_ON : 0;
            pixels[p + 3] = 255;
        }
    }
    ctx.imageSmoothingEnabled = false;
    ctx.putImageData(imgData, 0, 0);
}

function resizeCanvas() {
    canvas.width  = SIM_W;
    canvas.height = SIM_H;
    canvas.style.width  = '100vw';
    canvas.style.height = '100vh';
}

function loop() {
    for (let i = 0; i < 8; i++) step();
    render();
    requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.location.href = 'index.html';
});

document.getElementById('preset-btn').addEventListener('click', () => {
    presetIdx = (presetIdx + 1) % presets.length;
    applyPreset(presetIdx);
    initBuffers();
});

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = Math.floor((e.clientX - rect.left) / rect.width  * SIM_W);
    const cy = Math.floor((e.clientY - rect.top)  / rect.height * SIM_H);
    const r  = 8;
    for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
            if (dx*dx + dy*dy > r*r) continue;
            const x  = (cx + dx + SIM_W) % SIM_W;
            const y  = (cy + dy + SIM_H) % SIM_H;
            const i2 = cellIdx(x, y);
            bufA[i2]     = 0.5;
            bufA[i2 + 1] = 0.25;
        }
    }
});

resizeCanvas();
applyPreset(0);
initBuffers();
loop();
</script>
</body>
</html>
