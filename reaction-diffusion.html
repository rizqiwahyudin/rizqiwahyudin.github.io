<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Diffusion</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #preset-bar {
            position: fixed;
            top: 16px; right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .preset-btn {
            color: rgba(255,255,255,0.4);
            font: 13px 'DotGothic16', monospace;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .preset-btn:hover, .preset-btn.active {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #label {
            position: fixed;
            bottom: 16px; left: 20px;
            color: rgba(255,255,255,0.2);
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* Tuner toggle */
        #tuner-toggle {
            position: fixed;
            bottom: 16px; right: 16px;
            z-index: 10000;
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-toggle:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }

        /* Tuner panel */
        #tuner-panel {
            position: fixed;
            bottom: 52px; right: 16px;
            z-index: 10000;
            width: 260px;
            max-height: calc(100vh - 68px);
            overflow-y: auto;
            font-family: 'DotGothic16', monospace;
            background: rgb(8 8 10 / 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            display: none;
        }
        #tuner-panel.open { display: block; }

        #tuner-panel .dt-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-row { margin-bottom: 10px; }
        #tuner-panel .dt-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 4px;
        }
        #tuner-panel .dt-val {
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.25);
        }
        #tuner-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            outline: none;
        }
        #tuner-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel input[type="range"]::-moz-range-thumb {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel .dt-actions {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-btn {
            flex: 1;
            font: 9px 'DotGothic16', monospace;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px;
            padding: 5px 0;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-panel .dt-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.2);
        }
        #tuner-panel .dt-copied {
            font-size: 9px;
            letter-spacing: 1.5px;
            text-align: center;
            color: #00e5ff;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #tuner-panel .dt-copied.show { opacity: 1; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="index.html">&larr; back</a>
<div id="preset-bar">
    <button class="preset-btn active" data-preset="0">coral</button>
    <button class="preset-btn" data-preset="1">spots</button>
    <button class="preset-btn" data-preset="2">mitosis</button>
</div>
<div id="label">canvas // gray-scott // bayer dither</div>

<button id="tuner-toggle">&#9881; tuner</button>
<div id="tuner-panel">
    <div class="dt-title">// tuner</div>
    <div class="dt-row">
        <div class="dt-label"><span>pixel size</span><span class="dt-val" id="dt-pix-val">2</span></div>
        <input type="range" id="dt-pix" min="1" max="6" step="1" value="2">
    </div>
    <div class="dt-row">
        <div class="dt-label"><span>feed rate (f)</span><span class="dt-val" id="dt-f-val">0.054</span></div>
        <input type="range" id="dt-f" min="0.01" max="0.09" step="0.001" value="0.054">
    </div>
    <div class="dt-row">
        <div class="dt-label"><span>kill rate (k)</span><span class="dt-val" id="dt-k-val">0.063</span></div>
        <input type="range" id="dt-k" min="0.04" max="0.08" step="0.001" value="0.063">
    </div>
    <div class="dt-row">
        <div class="dt-label"><span>diffusion U</span><span class="dt-val" id="dt-du-val">0.2097</span></div>
        <input type="range" id="dt-du" min="0.1" max="0.3" step="0.005" value="0.2097">
    </div>
    <div class="dt-row">
        <div class="dt-label"><span>steps / frame</span><span class="dt-val" id="dt-steps-val">8</span></div>
        <input type="range" id="dt-steps" min="1" max="20" step="1" value="8">
    </div>
    <div class="dt-actions">
        <button class="dt-btn" id="dt-copy">copy config</button>
        <button class="dt-btn" id="dt-reset">reset</button>
    </div>
    <div class="dt-copied" id="dt-copied">copied to clipboard</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Bayer 4x4 matrix, normalized to [0, 1)
const BAYER4 = [
     0/16,  8/16,  2/16, 10/16,
    12/16,  4/16, 14/16,  6/16,
     3/16, 11/16,  1/16,  9/16,
    15/16,  7/16, 13/16,  5/16
];

// Teal color for ON pixels
const R_ON = 0;
const G_ON = 255;
const B_ON = 200;

const SIM_W = 256;
const SIM_H = 256;

const presets = [
    { name: 'coral',   Du: 0.2097, Dv: 0.105, f: 0.054,  k: 0.063  },
    { name: 'spots',   Du: 0.2097, Dv: 0.105, f: 0.035,  k: 0.065  },
    { name: 'mitosis', Du: 0.2097, Dv: 0.105, f: 0.0367, k: 0.0649 },
];

// Tuner defaults
const DEFAULTS = {
    pix:   2,
    f:     0.054,
    k:     0.063,
    du:    0.2097,
    steps: 8
};

// Live tuner vars
let tPix   = DEFAULTS.pix;
let tF     = DEFAULTS.f;
let tK     = DEFAULTS.k;
let tDu    = DEFAULTS.du;
let tSteps = DEFAULTS.steps;
// Dv tracks Du at half ratio (standard Gray-Scott)
let tDv    = tDu * 0.5;

let bufA = new Float32Array(SIM_W * SIM_H * 2);
let bufB = new Float32Array(SIM_W * SIM_H * 2);

function cellIdx(x, y) {
    return (y * SIM_W + x) * 2;
}

function initBuffers() {
    for (let i = 0; i < SIM_W * SIM_H; i++) {
        bufA[i * 2]     = 1.0;
        bufA[i * 2 + 1] = 0.0;
    }
    for (let s = 0; s < 40; s++) {
        const cx = Math.floor(Math.random() * SIM_W);
        const cy = Math.floor(Math.random() * SIM_H);
        const r  = 4 + Math.floor(Math.random() * 6);
        for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
                if (dx*dx + dy*dy > r*r) continue;
                const x  = (cx + dx + SIM_W) % SIM_W;
                const y  = (cy + dy + SIM_H) % SIM_H;
                const i2 = cellIdx(x, y);
                bufA[i2]     = 0.5 + (Math.random() - 0.5) * 0.1;
                bufA[i2 + 1] = 0.25 + (Math.random() - 0.5) * 0.1;
            }
        }
    }
}

function step() {
    const src = bufA;
    const dst = bufB;

    for (let y = 0; y < SIM_H; y++) {
        for (let x = 0; x < SIM_W; x++) {
            const xL = (x - 1 + SIM_W) % SIM_W;
            const xR = (x + 1) % SIM_W;
            const yU = (y - 1 + SIM_H) % SIM_H;
            const yD = (y + 1) % SIM_H;

            const c = cellIdx(x,  y);
            const l = cellIdx(xL, y);
            const r = cellIdx(xR, y);
            const u = cellIdx(x,  yU);
            const d = cellIdx(x,  yD);

            const U = src[c];
            const V = src[c + 1];

            const lapU = 0.25 * (src[l] + src[r] + src[u] + src[d]) - U;
            const lapV = 0.25 * (src[l+1] + src[r+1] + src[u+1] + src[d+1]) - V;

            const UVV = U * V * V;

            dst[c]     = Math.max(0, Math.min(1, U + tDu * lapU - UVV + tF * (1 - U)));
            dst[c + 1] = Math.max(0, Math.min(1, V + tDv * lapV + UVV - (tF + tK) * V));
        }
    }

    const tmp = bufA;
    bufA = bufB;
    bufB = tmp;
}

const imgData = ctx.createImageData(SIM_W, SIM_H);
const pixels  = imgData.data;

function render() {
    for (let y = 0; y < SIM_H; y++) {
        for (let x = 0; x < SIM_W; x++) {
            const i   = y * SIM_W + x;
            const U   = bufA[i * 2];
            const bri = 1.0 - U;
            const thr = BAYER4[(y % 4) * 4 + (x % 4)];
            const on  = bri > thr;
            const p   = i * 4;
            pixels[p]     = on ? R_ON : 0;
            pixels[p + 1] = on ? G_ON : 0;
            pixels[p + 2] = on ? B_ON : 0;
            pixels[p + 3] = 255;
        }
    }
    ctx.imageSmoothingEnabled = false;
    ctx.putImageData(imgData, 0, 0);
}

function resizeCanvas() {
    canvas.width  = SIM_W;
    canvas.height = SIM_H;
    canvas.style.width  = '100vw';
    canvas.style.height = '100vh';
}

function loop() {
    for (let i = 0; i < tSteps; i++) step();
    render();
    requestAnimationFrame(loop);
}

function applyPreset(idx) {
    const p = presets[idx];
    tF  = p.f;
    tK  = p.k;
    tDu = p.Du;
    tDv = p.Dv;

    // Update sliders and display values
    document.getElementById('dt-f').value  = tF;
    document.getElementById('dt-k').value  = tK;
    document.getElementById('dt-du').value = tDu;
    document.getElementById('dt-f-val').textContent  = tF.toFixed(3);
    document.getElementById('dt-k-val').textContent  = tK.toFixed(3);
    document.getElementById('dt-du-val').textContent = tDu.toFixed(4);

    // Update preset button active state
    document.querySelectorAll('.preset-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
    });

    initBuffers();
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.location.href = 'index.html';
});

document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        applyPreset(parseInt(btn.dataset.preset));
    });
});

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = Math.floor((e.clientX - rect.left) / rect.width  * SIM_W);
    const cy = Math.floor((e.clientY - rect.top)  / rect.height * SIM_H);
    const r  = 8;
    for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
            if (dx*dx + dy*dy > r*r) continue;
            const x  = (cx + dx + SIM_W) % SIM_W;
            const y  = (cy + dy + SIM_H) % SIM_H;
            const i2 = cellIdx(x, y);
            bufA[i2]     = 0.5;
            bufA[i2 + 1] = 0.25;
        }
    }
});

// --- Tuner wiring ---

document.getElementById('tuner-toggle').addEventListener('click', () => {
    document.getElementById('tuner-panel').classList.toggle('open');
});

document.getElementById('dt-pix').addEventListener('input', function() {
    tPix = parseInt(this.value);
    document.getElementById('dt-pix-val').textContent = tPix.toString();
    // Canvas CSS scale only; SIM_W/SIM_H stay at 256x256
    // The canvas style already stretches to 100vw/100vh; pixel size is visual only
});

document.getElementById('dt-f').addEventListener('input', function() {
    tF = parseFloat(this.value);
    document.getElementById('dt-f-val').textContent = tF.toFixed(3);
    // Deselect presets since f changed manually
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
});

document.getElementById('dt-k').addEventListener('input', function() {
    tK = parseFloat(this.value);
    document.getElementById('dt-k-val').textContent = tK.toFixed(3);
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
});

document.getElementById('dt-du').addEventListener('input', function() {
    tDu = parseFloat(this.value);
    tDv = tDu * 0.5;
    document.getElementById('dt-du-val').textContent = tDu.toFixed(4);
});

document.getElementById('dt-steps').addEventListener('input', function() {
    tSteps = parseInt(this.value);
    document.getElementById('dt-steps-val').textContent = tSteps.toString();
});

document.getElementById('dt-reset').addEventListener('click', () => {
    tF     = DEFAULTS.f;
    tK     = DEFAULTS.k;
    tDu    = DEFAULTS.du;
    tDv    = tDu * 0.5;
    tSteps = DEFAULTS.steps;
    tPix   = DEFAULTS.pix;

    document.getElementById('dt-f').value     = tF;
    document.getElementById('dt-k').value     = tK;
    document.getElementById('dt-du').value    = tDu;
    document.getElementById('dt-steps').value = tSteps;
    document.getElementById('dt-pix').value   = tPix;

    document.getElementById('dt-f-val').textContent     = tF.toFixed(3);
    document.getElementById('dt-k-val').textContent     = tK.toFixed(3);
    document.getElementById('dt-du-val').textContent    = tDu.toFixed(4);
    document.getElementById('dt-steps-val').textContent = tSteps.toString();
    document.getElementById('dt-pix-val').textContent   = tPix.toString();

    // Reactivate coral preset button
    document.querySelectorAll('.preset-btn').forEach((b, i) => {
        b.classList.toggle('active', i === 0);
    });

    initBuffers();
});

document.getElementById('dt-copy').addEventListener('click', () => {
    const cfg = {
        pixelSize:  tPix,
        feedRate:   tF,
        killRate:   tK,
        diffusionU: tDu,
        stepsPerFrame: tSteps
    };
    navigator.clipboard.writeText(JSON.stringify(cfg, null, 2)).then(() => {
        const el = document.getElementById('dt-copied');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1800);
    });
});

resizeCanvas();
applyPreset(0);
initBuffers();
loop();
</script>
</body>
</html>
