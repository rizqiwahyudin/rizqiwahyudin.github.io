<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memento Mori</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas#dither-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        video#source-video {
            display: none;
        }
    </style>
</head>
<body>
<canvas id="dither-canvas"></canvas>
<video id="source-video" src="skull0000-0720.mp4" loop muted playsinline></video>
<a id="back-btn" href="index.html">&larr; back</a>

<script>
/* ========== CONFIG — PLAY WITH THESE ========== */
const PIXEL_SIZE    = 1.2;     // dither pixel size — lower = higher def
const PLAYBACK_SPEED = 2;  // video speed multiplier (1.0 = normal, 2.0 = double)
const BLACK_FLOOR   = 0.0035;  // luminance below this → pure black (0.0 = off, 0.1 = aggressive)
const COLOR_BOOST   = 0.8;   // boost color channels before dither (1.0 = normal, 1.5 = vivid)
const DITHER_SPREAD = 0.5;   // dither contrast (0.5 = tighter/more solid, 1.5 = more spread)

/* ========== Elements ========== */
const canvas = document.getElementById('dither-canvas');
const ctx    = canvas.getContext('2d', { willReadFrequently: true });
const video  = document.getElementById('source-video');

/* Offscreen canvas for sampling video frames */
const samplerCanvas = document.createElement('canvas');
const samplerCtx    = samplerCanvas.getContext('2d', { willReadFrequently: true });

let ditherW, ditherH, screenW, screenH;

function resize() {
    screenW = window.innerWidth;
    screenH = window.innerHeight;
    ditherW = Math.floor(screenW / PIXEL_SIZE);
    ditherH = Math.floor(screenH / PIXEL_SIZE);

    canvas.width  = ditherW;
    canvas.height = ditherH;
    canvas.style.width  = screenW + 'px';
    canvas.style.height = screenH + 'px';

    samplerCanvas.width  = ditherW;
    samplerCanvas.height = ditherH;
}

window.addEventListener('resize', resize);
resize();

/* ========== 8x8 Bayer dither matrix ========== */
const BAYER8 = new Float32Array([
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21
]);
for (let i = 0; i < 64; i++) BAYER8[i] /= 64.0;

/* ========== Video → Dither render loop ========== */
function frame() {
    requestAnimationFrame(frame);

    /* Don't render until video is playing */
    if (video.readyState < 2) return;

    const w = ditherW, h = ditherH;

    /* Draw video frame to sampler canvas (scaled to dither resolution) */
    /* Center the square video in the viewport */
    const vidAspect = video.videoWidth / video.videoHeight;
    const canAspect = w / h;

    let drawW, drawH, drawX, drawY;
    if (vidAspect > canAspect) {
        /* Video wider than canvas — fit height, center horizontally */
        drawH = h;
        drawW = h * vidAspect;
        drawX = (w - drawW) / 2;
        drawY = 0;
    } else {
        /* Video taller than canvas — fit width, center vertically */
        drawW = w;
        drawH = w / vidAspect;
        drawX = 0;
        drawY = (h - drawH) / 2;
    }

    samplerCtx.fillStyle = '#000';
    samplerCtx.fillRect(0, 0, w, h);
    samplerCtx.drawImage(video, drawX, drawY, drawW, drawH);

    /* Read video pixels */
    const srcData = samplerCtx.getImageData(0, 0, w, h);
    const src = srcData.data;

    /* Create dithered output */
    const outData = ctx.createImageData(w, h);
    const out = outData.data;

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const i = (y * w + x) * 4;

            /* Source RGB (0-1) */
            let r = src[i]     / 255.0;
            let g = src[i + 1] / 255.0;
            let b = src[i + 2] / 255.0;

            /* Black floor — crush near-black to pure black */
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            if (lum < BLACK_FLOOR) {
                out[i] = 0; out[i+1] = 0; out[i+2] = 0; out[i+3] = 255;
                continue;
            }

            /* Color boost */
            r = Math.min(1.0, r * COLOR_BOOST);
            g = Math.min(1.0, g * COLOR_BOOST);
            b = Math.min(1.0, b * COLOR_BOOST);

            /* Bayer threshold for this pixel */
            const bx = x & 7;
            const by = y & 7;
            const threshold = BAYER8[by * 8 + bx] * DITHER_SPREAD;

            /* Dither each channel independently — preserves color */
            out[i]     = r > threshold ? 255 : 0;
            out[i + 1] = g > threshold ? 255 : 0;
            out[i + 2] = b > threshold ? 255 : 0;
            out[i + 3] = 255;
        }
    }

    ctx.putImageData(outData, 0, 0);
}

/* ========== Start ========== */
video.playbackRate = PLAYBACK_SPEED;
video.play().then(() => {
    requestAnimationFrame(frame);
}).catch(() => {
    /* Autoplay blocked — start on first interaction */
    document.addEventListener('click', () => {
        video.play();
        requestAnimationFrame(frame);
    }, { once: true });
    document.addEventListener('touchstart', () => {
        video.play();
        requestAnimationFrame(frame);
    }, { once: true });
});

/* ========== Hide back button in iframe ========== */
if (window !== window.top) {
    const btn = document.getElementById('back-btn');
    if (btn) btn.style.display = 'none';
}
</script>
</body>
</html>
