<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memento Mori</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas#dither-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        video#source-video { display: none; }

        /* Back button */
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }

        /* Mode selector */
        #mode-select {
            position: fixed;
            top: 16px; left: 120px;
            z-index: 10;
            font: 14px 'DotGothic16', monospace;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 6px 14px;
            outline: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #mode-select:hover, #mode-select:focus {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #mode-select option {
            background: #111;
            color: #ccc;
        }

        /* Tuner toggle */
        #tuner-toggle {
            position: fixed;
            bottom: 16px; right: 16px;
            z-index: 10000;
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-toggle:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }

        /* Tuner panel */
        #tuner-panel {
            position: fixed;
            bottom: 52px; right: 16px;
            z-index: 10000;
            width: 260px;
            max-height: calc(100vh - 68px);
            overflow-y: auto;
            font-family: 'DotGothic16', monospace;
            background: rgb(8 8 10 / 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            display: none;
        }
        #tuner-panel.open { display: block; }

        #tuner-panel .dt-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-row { margin-bottom: 10px; }
        #tuner-panel .dt-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 4px;
        }
        #tuner-panel .dt-val {
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.25);
        }
        #tuner-panel input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            outline: none;
        }
        #tuner-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel input[type="range"]::-moz-range-thumb {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #c8c8c8;
            cursor: pointer;
            border: none;
        }
        #tuner-panel .dt-actions {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        #tuner-panel .dt-btn {
            flex: 1;
            font: 9px 'DotGothic16', monospace;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px;
            padding: 5px 0;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #tuner-panel .dt-btn:hover {
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.2);
        }
        #tuner-panel .dt-copied {
            font-size: 9px;
            letter-spacing: 1.5px;
            text-align: center;
            color: #00e5ff;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #tuner-panel .dt-copied.show { opacity: 1; }

        #tuner-panel .dt-section-label {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.15);
            margin: 12px 0 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        #mix-mode-select {
            width: 100%;
            font: 10px 'DotGothic16', monospace;
            letter-spacing: 1.5px;
            text-transform: lowercase;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 5px 8px;
            margin-bottom: 10px;
            outline: none;
        }
        #mix-mode-select option {
            background: #111;
            color: #ccc;
        }
    </style>
</head>
<body>
<canvas id="dither-canvas"></canvas>
<video id="source-video" src="skull0000-0720.mp4" loop muted playsinline></video>
<a id="back-btn" href="index.html">&larr; back</a>
<select id="mode-select"></select>

<button id="tuner-toggle">&#9881; tuner</button>
<div id="tuner-panel">
    <div class="dt-title">// tuner</div>
    <div class="dt-row">
        <div class="dt-label"><span>playback speed</span><span class="dt-val" id="dt-speed-val">2.00x</span></div>
        <input type="range" id="dt-speed" min="0.25" max="5" step="0.25" value="2">
    </div>
    <div class="dt-row">
        <div class="dt-label"><span>layer mix</span><span class="dt-val" id="mix-status-val">off</span></div>
        <input type="range" id="mix-toggle" min="0" max="1" step="1" value="0">
    </div>
    <div id="mix-controls" style="display:none">
        <select id="mix-mode-select"></select>
        <div class="dt-row">
            <div class="dt-label"><span>blend</span><span class="dt-val" id="mix-amount-val">0.50</span></div>
            <input type="range" id="mix-amount" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="dt-row">
            <div class="dt-label"><span>blend mode</span><span class="dt-val" id="mix-blend-val">mix</span></div>
            <input type="range" id="mix-blend" min="0" max="4" step="1" value="0">
        </div>
        <div class="dt-section-label">// layer params</div>
        <div id="mix-mode-params"></div>
    </div>
    <div class="dt-section-label">// mode params</div>
    <div id="tuner-mode-params"></div>
    <div class="dt-actions">
        <button class="dt-btn" id="dt-copy">copy config</button>
        <button class="dt-btn" id="dt-reset">reset</button>
    </div>
    <div class="dt-copied" id="dt-copied">copied to clipboard</div>
</div>

<script src="dither-modes.js"></script>
<script>initDitherEngine('dither-canvas', 'source-video');</script>
</body>
</html>
