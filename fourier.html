<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #shape-btn {
            position: fixed;
            top: 16px; right: 20px;
            color: rgba(255,255,255,0.4);
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #shape-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #label {
            position: fixed;
            bottom: 16px; right: 20px;
            color: rgba(255,255,255,0.2);
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="index.html">&larr; back</a>
<button id="shape-btn">shape: star</button>
<div id="label">canvas // mathematics</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TWO_PI = Math.PI * 2;

// ---- Shape generators ----
// Each returns an array of {x, y} points centered at origin, sampled uniformly.

function makeStar(N, outerR, innerR, points) {
    const pts = [];
    for (let i = 0; i < N; i++) {
        const t = i / N;
        const angle = t * TWO_PI - Math.PI / 2;
        const spikes = points * 2;
        const spikeAngle = (i % (N / points)) / (N / points);
        // Alternate between outer and inner radius smoothly
        const r = innerR + (outerR - innerR) * Math.pow(Math.cos(spikeAngle * Math.PI), 2);
        pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
    }
    return pts;
}

function makeTrefoil(N, R) {
    const pts = [];
    for (let i = 0; i < N; i++) {
        const t = (i / N) * TWO_PI;
        // Trefoil parametric
        const x = R * Math.sin(t) + R * 0.5 * Math.sin(2 * t);
        const y = R * Math.cos(t) - R * 0.5 * Math.cos(2 * t);
        pts.push({ x, y });
    }
    return pts;
}

function makeHeart(N, R) {
    const pts = [];
    for (let i = 0; i < N; i++) {
        const t = (i / N) * TWO_PI;
        const x =  R * 0.95 * Math.sin(t) * Math.sin(t) * Math.sin(t);
        const y = -R * (0.8125*Math.cos(t) - 0.3125*Math.cos(2*t) - 0.125*Math.cos(3*t) - 0.0625*Math.cos(4*t));
        pts.push({ x, y });
    }
    return pts;
}

function makeFigure8(N, R) {
    const pts = [];
    for (let i = 0; i < N; i++) {
        const t = (i / N) * TWO_PI;
        const x = R * Math.sin(t);
        const y = R * 0.6 * Math.sin(2 * t);
        pts.push({ x, y });
    }
    return pts;
}

// ---- DFT ----
// Returns array of {freq, amp, phase} sorted by amplitude descending.
// Input: array of complex numbers as {re, im}.
// We treat the path as complex: z[n] = x[n] + i*y[n].

function dft(signal) {
    const N = signal.length;
    const result = [];
    for (let k = 0; k < N; k++) {
        let re = 0, im = 0;
        for (let n = 0; n < N; n++) {
            const angle = (TWO_PI * k * n) / N;
            re += signal[n].re * Math.cos(angle) + signal[n].im * Math.sin(angle);
            im += signal[n].im * Math.cos(angle) - signal[n].re * Math.sin(angle);
        }
        re /= N;
        im /= N;
        const amp   = Math.sqrt(re*re + im*im);
        const phase = Math.atan2(im, re);
        // Map k to signed frequency: k <= N/2 -> k, k > N/2 -> k - N
        const freq  = k <= N / 2 ? k : k - N;
        result.push({ freq, amp, phase, re, im });
    }
    // Sort by amplitude descending so largest circles draw first
    result.sort((a, b) => b.amp - a.amp);
    return result;
}

// ---- Shapes ----
const N_SAMPLES = 128; // number of DFT components

const shapes = [
    {
        name: 'star',
        make: () => {
            const R = Math.min(canvas.width, canvas.height) * 0.28;
            return makeStar(N_SAMPLES, R, R * 0.45, 5);
        }
    },
    {
        name: 'trefoil',
        make: () => {
            const R = Math.min(canvas.width, canvas.height) * 0.26;
            return makeTrefoil(N_SAMPLES, R);
        }
    },
    {
        name: 'heart',
        make: () => {
            const R = Math.min(canvas.width, canvas.height) * 0.26;
            return makeHeart(N_SAMPLES, R);
        }
    },
    {
        name: 'figure-8',
        make: () => {
            const R = Math.min(canvas.width, canvas.height) * 0.3;
            return makeFigure8(N_SAMPLES, R);
        }
    }
];

let shapeIdx  = 0;
let components = [];
let trail     = [];
let angle     = 0;
let period    = 0; // full cycle in radians = TWO_PI

function buildDFT() {
    const pts = shapes[shapeIdx].make();
    const signal = pts.map(p => ({ re: p.x, im: p.y }));
    components = dft(signal);
    trail = [];
    angle = 0;
    document.getElementById('shape-btn').textContent = 'shape: ' + shapes[shapeIdx].name;
}

// Speed: complete one full revolution every ~8 seconds at 60fps = 480 frames
// angular step per frame: TWO_PI / 480
const SPEED = TWO_PI / 480;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;

    // Draw epicycle chain
    let x = cx;
    let y = cy;

    // Only draw the top N_DRAW components for performance and clarity
    const N_DRAW = Math.min(components.length, 64);

    for (let i = 0; i < N_DRAW; i++) {
        const c   = components[i];
        const nx  = x + c.amp * Math.cos(c.freq * angle + c.phase);
        const ny  = y + c.amp * Math.sin(c.freq * angle + c.phase);

        // Draw circle
        ctx.beginPath();
        ctx.arc(x, y, c.amp, 0, TWO_PI);
        ctx.strokeStyle = 'rgba(200, 200, 200, 0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw arm
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = 'rgba(200, 200, 200, 0.25)';
        ctx.lineWidth = 1;
        ctx.stroke();

        x = nx;
        y = ny;
    }

    // Accumulate tip position
    trail.push({ x, y });

    // Keep trail length to one full cycle worth of points
    const maxTrail = Math.floor(TWO_PI / SPEED) + 2;
    if (trail.length > maxTrail) {
        trail.shift();
    }

    // Draw trail
    if (trail.length > 1) {
        for (let i = 1; i < trail.length; i++) {
            const alpha = i / trail.length;
            ctx.beginPath();
            ctx.moveTo(trail[i-1].x, trail[i-1].y);
            ctx.lineTo(trail[i].x,   trail[i].y);
            ctx.strokeStyle = `rgba(0, 220, 200, ${alpha * 0.9})`;
            ctx.lineWidth   = 1.5;
            ctx.stroke();
        }
    }

    // Draw tip dot
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, TWO_PI);
    ctx.fillStyle = 'rgba(0, 230, 210, 1)';
    ctx.fill();

    // Advance angle
    angle += SPEED;
    if (angle >= TWO_PI) {
        angle -= TWO_PI;
    }
}

let running = true;

function loop() {
    if (!running) return;
    draw();
    requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.location.href = 'index.html';
});

document.getElementById('shape-btn').addEventListener('click', () => {
    shapeIdx = (shapeIdx + 1) % shapes.length;
    buildDFT();
});

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    buildDFT();
}

window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
