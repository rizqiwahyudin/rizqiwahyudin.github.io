<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #back-btn {
            position: fixed;
            top: 16px; left: 20px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            transition: color 0.2s, border-color 0.2s;
        }
        #back-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #shape-btn {
            position: fixed;
            top: 16px; right: 20px;
            color: rgba(255,255,255,0.4);
            font: 14px 'DotGothic16', monospace;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #shape-btn:hover {
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.2);
        }
        #label {
            position: fixed;
            bottom: 16px; right: 20px;
            color: rgba(255,255,255,0.2);
            font: 11px 'DotGothic16', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back-btn" href="index.html">&larr; back</a>
<button id="shape-btn">shape: star</button>
<div id="label">canvas // mathematics // bayer dither</div>

<script>
(function() {
    'use strict';

    // Bayer 4x4 matrix, normalized to [0, 1)
    const BAYER4 = [
         0/16,  8/16,  2/16, 10/16,
        12/16,  4/16, 14/16,  6/16,
         3/16, 11/16,  1/16,  9/16,
        15/16,  7/16, 13/16,  5/16
    ];

    // Teal for ON pixels
    const R_ON = 0;
    const G_ON = 255;
    const B_ON = 200;

    const TWO_PI = Math.PI * 2;
    const PIX    = 4;   // logical pixel size
    const FADE   = 0.985; // buffer fade per frame

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    let simW, simH;
    let bright;
    let imgData;

    function initBuffers() {
        simW    = Math.floor(window.innerWidth  / PIX);
        simH    = Math.floor(window.innerHeight / PIX);
        canvas.width  = simW;
        canvas.height = simH;
        bright  = new Float32Array(simW * simH);
        imgData = ctx.createImageData(simW, simH);
    }

    // Draw a circle outline into the brightness buffer at sim coords.
    function drawCircleBuffer(cx, cy, rad, bri) {
        if (rad < 0.5) return;
        // Sample the circumference proportional to radius for even coverage
        const steps = Math.max(16, Math.floor(rad * 2.5));
        for (let s = 0; s < steps; s++) {
            const a   = (s / steps) * TWO_PI;
            const px  = Math.floor(cx + Math.cos(a) * rad);
            const py  = Math.floor(cy + Math.sin(a) * rad);
            if (px >= 0 && px < simW && py >= 0 && py < simH) {
                const i = py * simW + px;
                bright[i] = Math.min(1.0, bright[i] + bri);
            }
        }
    }

    // Draw a filled square (radius ~1 sim pixel) as a bright point
    function drawPoint(px, py, bri) {
        const x = Math.floor(px);
        const y = Math.floor(py);
        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < simW && ny >= 0 && ny < simH) {
                    const i = ny * simW + nx;
                    bright[i] = Math.min(1.0, bright[i] + bri);
                }
            }
        }
    }

    // Shape generators
    function makeStar(N, outerR, innerR, points) {
        const pts = [];
        for (let i = 0; i < N; i++) {
            const t          = i / N;
            const angle      = t * TWO_PI - Math.PI / 2;
            const spikeAngle = (i % (N / points)) / (N / points);
            const r          = innerR + (outerR - innerR) * Math.pow(Math.cos(spikeAngle * Math.PI), 2);
            pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
        }
        return pts;
    }

    function makeTrefoil(N, R) {
        const pts = [];
        for (let i = 0; i < N; i++) {
            const t = (i / N) * TWO_PI;
            pts.push({
                x: R * Math.sin(t) + R * 0.5 * Math.sin(2 * t),
                y: R * Math.cos(t) - R * 0.5 * Math.cos(2 * t)
            });
        }
        return pts;
    }

    function makeHeart(N, R) {
        const pts = [];
        for (let i = 0; i < N; i++) {
            const t = (i / N) * TWO_PI;
            pts.push({
                x:  R * 0.95 * Math.sin(t) * Math.sin(t) * Math.sin(t),
                y: -R * (0.8125*Math.cos(t) - 0.3125*Math.cos(2*t) - 0.125*Math.cos(3*t) - 0.0625*Math.cos(4*t))
            });
        }
        return pts;
    }

    function makeFigure8(N, R) {
        const pts = [];
        for (let i = 0; i < N; i++) {
            const t = (i / N) * TWO_PI;
            pts.push({ x: R * Math.sin(t), y: R * 0.6 * Math.sin(2 * t) });
        }
        return pts;
    }

    function dft(signal) {
        const N = signal.length;
        const result = [];
        for (let kk = 0; kk < N; kk++) {
            let re = 0, im = 0;
            for (let n = 0; n < N; n++) {
                const angle = (TWO_PI * kk * n) / N;
                re += signal[n].re * Math.cos(angle) + signal[n].im * Math.sin(angle);
                im += signal[n].im * Math.cos(angle) - signal[n].re * Math.sin(angle);
            }
            re /= N;
            im /= N;
            const amp   = Math.sqrt(re*re + im*im);
            const phase = Math.atan2(im, re);
            const freq  = kk <= N / 2 ? kk : kk - N;
            result.push({ freq, amp, phase });
        }
        result.sort((a, b) => b.amp - a.amp);
        return result;
    }

    const N_SAMPLES = 128;
    const SPEED     = TWO_PI / 480;

    const shapes = [
        {
            name: 'star',
            make: () => {
                const R = Math.min(simW, simH) * 0.28;
                return makeStar(N_SAMPLES, R, R * 0.45, 5);
            }
        },
        {
            name: 'trefoil',
            make: () => {
                const R = Math.min(simW, simH) * 0.26;
                return makeTrefoil(N_SAMPLES, R);
            }
        },
        {
            name: 'heart',
            make: () => {
                const R = Math.min(simW, simH) * 0.26;
                return makeHeart(N_SAMPLES, R);
            }
        },
        {
            name: 'figure-8',
            make: () => {
                const R = Math.min(simW, simH) * 0.3;
                return makeFigure8(N_SAMPLES, R);
            }
        }
    ];

    let shapeIdx   = 0;
    let components = [];
    let angle      = 0;

    function buildDFT() {
        const pts    = shapes[shapeIdx].make();
        const signal = pts.map(p => ({ re: p.x, im: p.y }));
        components   = dft(signal);
        bright.fill(0);
        angle = 0;
        document.getElementById('shape-btn').textContent = 'shape: ' + shapes[shapeIdx].name;
    }

    function frame() {
        requestAnimationFrame(frame);

        // Fade brightness buffer
        for (let i = 0; i < bright.length; i++) {
            bright[i] *= FADE;
        }

        // Walk the epicycle chain in sim space
        const cx = simW / 2;
        const cy = simH / 2;
        let x = cx;
        let y = cy;

        const N_DRAW = Math.min(components.length, 64);

        for (let i = 0; i < N_DRAW; i++) {
            const c  = components[i];
            const nx = x + c.amp * Math.cos(c.freq * angle + c.phase);
            const ny = y + c.amp * Math.sin(c.freq * angle + c.phase);

            // Draw circle outline into buffer (dim)
            drawCircleBuffer(x, y, c.amp, 0.04);

            x = nx;
            y = ny;
        }

        // Bright point at tip
        drawPoint(x, y, 1.0);

        // Apply Bayer dither and render
        const d = imgData.data;
        for (let py = 0; py < simH; py++) {
            for (let px = 0; px < simW; px++) {
                const i   = py * simW + px;
                const thr = BAYER4[(py % 4) * 4 + (px % 4)];
                const on  = bright[i] > thr;
                const p   = i * 4;
                d[p]     = on ? R_ON : 0;
                d[p + 1] = on ? G_ON : 0;
                d[p + 2] = on ? B_ON : 0;
                d[p + 3] = 255;
            }
        }

        ctx.imageSmoothingEnabled = false;
        ctx.putImageData(imgData, 0, 0);

        angle += SPEED;
        if (angle >= TWO_PI) angle -= TWO_PI;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') window.location.href = 'index.html';
    });

    document.getElementById('shape-btn').addEventListener('click', () => {
        shapeIdx = (shapeIdx + 1) % shapes.length;
        buildDFT();
    });

    function resize() {
        initBuffers();
        buildDFT();
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
